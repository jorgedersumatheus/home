<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravador Multipista VOV</title>

<style>
body{
    background:#0f0f0f;
    color:#fff;
    font-family:Arial;
    text-align:center;
    margin:0;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

#tracks{
    max-width:900px;
    margin:0 auto;
}

.track{
    background:#1c1c1c;
    margin:10px 0;
    padding:10px;
    border-radius:6px;
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:center;
    gap:6px;
}

button{
    background:#fff;
    color:#000;
    border:none;
    padding:6px 12px;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#ddd;
}

progress{
    width:100%;
    height:8px;
}

.led{
    width:12px;
    height:12px;
    border-radius:50%;
    background:gray;
}

.timer{
    font-size:12px;
    color:#aaa;
}

.volume{
    width:80px;
}

.controls{
    margin-top:20px;
}
</style>
</head>

<body>

<h1>🎧 Gravador Multipista VOV</h1>

<div id="tracks"></div>

<div class="controls">
    <button onclick="addTrack()">+ Adicionar Pista</button>
</div>

<script>
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function formatTime(ms){
    let s = Math.floor(ms/1000);
    let m = Math.floor(s/60);
    s = s % 60;
    return m + ":" + (s<10?"0":"") + s;
}

function addTrack(){

    let track = document.createElement("div");
    track.className = "track";

    let led = document.createElement("div");
    led.className = "led";

    let progress = document.createElement("progress");
    progress.value = 0;
    progress.max = 100;

    let timer = document.createElement("div");
    timer.className = "timer";
    timer.innerText = "0:00";

    let audio = document.createElement("audio");

    let volume = document.createElement("input");
    volume.type = "range";
    volume.min = 0;
    volume.max = 1;
    volume.step = 0.01;
    volume.value = 1;
    volume.className = "volume";

    let recBtn = document.createElement("button");
    recBtn.innerText = "Gravar";

    let stopBtn = document.createElement("button");
    stopBtn.innerText = "Parar";

    let playBtn = document.createElement("button");
    playBtn.innerText = "Play";

    let pauseBtn = document.createElement("button");
    pauseBtn.innerText = "Pause";

    let delBtn = document.createElement("button");
    delBtn.innerText = "Apagar";

    let recorder, chunks=[], startTime;

    recBtn.onclick = async () => {
        let stream = await navigator.mediaDevices.getUserMedia({audio:true});
        recorder = new MediaRecorder(stream);

        chunks = [];
        recorder.start();
        startTime = Date.now();

        let source = audioCtx.createMediaStreamSource(stream);
        let analyser = audioCtx.createAnalyser();
        source.connect(analyser);

        let data = new Uint8Array(analyser.frequencyBinCount);

        recorder.ondataavailable = e => chunks.push(e.data);

        recorder.onstop = () => {
            let blob = new Blob(chunks, {type:'audio/webm'});
            audio.src = URL.createObjectURL(blob);
        };

        function animate(){
            if(recorder.state !== "recording") return;

            let elapsed = Date.now() - startTime;
            timer.innerText = formatTime(elapsed);
            progress.value = (elapsed/60000)*100;

            analyser.getByteFrequencyData(data);
            let avg = data.reduce((a,b)=>a+b)/data.length;

            led.style.background = avg>120 ? "red" : avg>60 ? "yellow" : "green";

            requestAnimationFrame(animate);
        }

        animate();
    };

    stopBtn.onclick = () => {
        if(recorder) recorder.stop();
        progress.value = 0;
    };

    playBtn.onclick = () => audio.play();
    pauseBtn.onclick = () => audio.pause();

    volume.oninput = () => audio.volume = volume.value;

    delBtn.onclick = () => track.remove();

    track.append(
        led,
        progress,
        timer,
        recBtn,
        stopBtn,
        playBtn,
        pauseBtn,
        delBtn,
        volume,
        audio
    );

    document.getElementById("tracks").appendChild(track);
}
</script>

</body>
</html>
