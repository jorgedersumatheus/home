<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Xadrez VOV Mestre</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css"/>

<style>
body{
    background:#0f0f0f;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

#board{
    width:92vw;
    max-width:420px;
    margin:20px auto;
}

.square-55d63 {
    transition:background 0.2s;
}

.highlight {
    background: radial-gradient(circle, #00ff88 30%, transparent 30%);
}

#status{
    margin-top:10px;
    font-size:18px;
    min-height:24px;
}

button{
    margin-top:10px;
    padding:10px 14px;
    font-size:16px;
}
</style>
</head>

<body>

<h2>♟️ Xadrez VOV IA Mestre</h2>

<div id="board"></div>
<div id="status"></div>
<button onclick="restartGame()">Reiniciar</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

<script>
let game = new Chess();
let board;
let gameOver = false;
let selectedSquare = null;

// ===== IA MESTRE (minimax + alpha-beta leve) =====
function evaluateBoard(game) {
    const values = { p:10, n:30, b:30, r:50, q:90, k:900 };
    let total = 0;

    game.board().forEach(row => {
        row.forEach(piece => {
            if (piece) {
                total += piece.color === 'b' ? values[piece.type] : -values[piece.type];
            }
        });
    });

    return total;
}

function minimax(game, depth, alpha, beta, isMaximizing) {
    if (depth === 0 || game.game_over()) {
        return evaluateBoard(game);
    }

    const moves = game.moves({ verbose:true });

    if (isMaximizing) {
        let maxEval = -9999;
        for (let move of moves) {
            let copy = new Chess(game.fen());
            copy.move(move);

            let eval = minimax(copy, depth-1, alpha, beta, false);
            maxEval = Math.max(maxEval, eval);
            alpha = Math.max(alpha, eval);

            if (beta <= alpha) break;
        }
        return maxEval;
    } else {
        let minEval = 9999;
        for (let move of moves) {
            let copy = new Chess(game.fen());
            copy.move(move);

            let eval = minimax(copy, depth-1, alpha, beta, true);
            minEval = Math.min(minEval, eval);
            beta = Math.min(beta, eval);

            if (beta <= alpha) break;
        }
        return minEval;
    }
}

function makeAIMove() {
    if (gameOver) return;

    let bestMove = null;
    let bestValue = -9999;

    let moves = game.moves({ verbose:true });

    for (let move of moves) {
        let copy = new Chess(game.fen());
        copy.move(move);

        let value = minimax(copy, 2, -10000, 10000, false);

        if (value > bestValue) {
            bestValue = value;
            bestMove = move;
        }
    }

    if (bestMove) {
        game.move(bestMove);
        board.position(game.fen());
        updateStatus();
    }
}

// ===== CLIQUE AO INVÉS DE ARRASTAR =====
function onSquareClick(square) {
    if (gameOver) return;

    removeHighlights();

    if (!selectedSquare) {
        let piece = game.get(square);

        if (piece && piece.color === 'w') {
            selectedSquare = square;
            highlightMoves(square);
        }
    } else {
        let move = game.move({
            from: selectedSquare,
            to: square,
            promotion: 'q'
        });

        selectedSquare = null;
        removeHighlights();

        if (move === null) return;

        board.position(game.fen());
        updateStatus();

        setTimeout(makeAIMove, 300);
    }
}

// ===== HIGHLIGHT =====
function highlightMoves(square) {
    let moves = game.moves({ square: square, verbose: true });

    moves.forEach(m => {
        document.querySelector('.square-' + m.to)
            .classList.add('highlight');
    });
}

function removeHighlights() {
    document.querySelectorAll('.highlight').forEach(el => {
        el.classList.remove('highlight');
    });
}

// ===== STATUS =====
function updateStatus() {
    let text = "";

    if (game.in_checkmate()) {
        gameOver = true;
        let winner = game.turn() === 'w' ? "Pretas (IA)" : "Você";
        text = "XEQUE-MATE! Vitória: " + winner;
    }
    else if (game.in_draw()) {
        gameOver = true;
        text = "Empate";
    }
    else {
        text = game.turn() === 'w' ? "Seu turno" : "IA pensando...";
    }

    document.getElementById("status").innerText = text;
}

// ===== RESET =====
function restartGame() {
    game = new Chess();
    gameOver = false;
    selectedSquare = null;
    board.start();
    updateStatus();
}

// ===== TABULEIRO =====
board = Chessboard('board', {
    draggable:false, // chave do mobile fix
    position:'start',
    pieceTheme: (piece) =>
        `https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/cburnett/${piece}.svg`
});

// capturar clique
document.getElementById('board').addEventListener('click', function(e) {
    const square = e.target.closest('[data-square]');
    if (square) {
        onSquareClick(square.getAttribute('data-square'));
    }
});

updateStatus();
</script>

</body>
</html>
