<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Xadrez VOV Mestre</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css"/>

<style>
body{
    background:#0f0f0f;
    color:#fff;
    font-family:Arial;
    text-align:center;
    margin:0;
}

#board{
    width:95vw;
    max-width:420px;
    margin:20px auto;
}

#status{
    margin-top:10px;
    font-size:18px;
}

.highlight{
    background: radial-gradient(circle, #00ff88 30%, transparent 30%);
}

footer{
    margin-top:30px;
    padding:15px;
    font-size:14px;
    opacity:0.7;
}

footer a{
    color:#00ff88;
    text-decoration:none;
}
</style>
</head>

<body>

<h2>♟️ Xadrez VOV IA Mestre</h2>

<div id="board"></div>
<div id="status"></div>

<button onclick="restartGame()">Reiniciar</button>

<footer>
    <a href="https://www.jorgematheus.mus.br" target="_blank">
        ← Voltar ao Portal VOV
    </a>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

<script>
let game, board, selectedSquare = null, gameOver = false;

// ===== IA =====
function evaluateBoard(game) {
    const v = {p:10,n:30,b:30,r:50,q:90,k:900};
    let score = 0;
    game.board().forEach(r => {
        r.forEach(p => {
            if(p) score += p.color==='b'?v[p.type]:-v[p.type];
        });
    });
    return score;
}

function minimax(game, depth, alpha, beta, max) {
    if(depth===0 || game.game_over()) return evaluateBoard(game);

    let moves = game.moves({verbose:true});

    if(max){
        let maxEval = -9999;
        for(let m of moves){
            let g = new Chess(game.fen());
            g.move(m);
            let eval = minimax(g, depth-1, alpha, beta, false);
            maxEval = Math.max(maxEval, eval);
            alpha = Math.max(alpha, eval);
            if(beta<=alpha) break;
        }
        return maxEval;
    } else {
        let minEval = 9999;
        for(let m of moves){
            let g = new Chess(game.fen());
            g.move(m);
            let eval = minimax(g, depth-1, alpha, beta, true);
            minEval = Math.min(minEval, eval);
            beta = Math.min(beta, eval);
            if(beta<=alpha) break;
        }
        return minEval;
    }
}

function makeAIMove(){
    if(gameOver) return;

    let moves = game.moves({verbose:true});
    let bestMove=null, bestValue=-9999;

    for(let m of moves){
        let g = new Chess(game.fen());
        g.move(m);
        let val = minimax(g, 2, -10000, 10000, false);

        if(val>bestValue){
            bestValue = val;
            bestMove = m;
        }
    }

    if(bestMove){
        game.move(bestMove);
        board.position(game.fen());
        updateStatus();
    }
}

// ===== CLIQUE =====
function onSquareClick(square){
    if(gameOver) return;

    removeHighlights();

    if(!selectedSquare){
        let piece = game.get(square);
        if(piece && piece.color==='w'){
            selectedSquare = square;
            highlightMoves(square);
        }
    } else {
        let move = game.move({
            from:selectedSquare,
            to:square,
            promotion:'q'
        });

        selectedSquare=null;
        removeHighlights();

        if(move===null) return;

        board.position(game.fen());
        updateStatus();

        setTimeout(makeAIMove,300);
    }
}

// ===== HIGHLIGHT =====
function highlightMoves(square){
    let moves = game.moves({square:square, verbose:true});
    moves.forEach(m=>{
        let el = document.querySelector(`[data-square='${m.to}']`);
        if(el) el.classList.add("highlight");
    });
}

function removeHighlights(){
    document.querySelectorAll(".highlight").forEach(e=>e.classList.remove("highlight"));
}

// ===== STATUS =====
function updateStatus(){
    let txt="";

    if(game.in_checkmate()){
        gameOver=true;
        txt = "XEQUE-MATE!";
    }
    else if(game.in_draw()){
        gameOver=true;
        txt = "Empate";
    }
    else{
        txt = game.turn()==='w' ? "Seu turno" : "IA pensando...";
    }

    document.getElementById("status").innerText = txt;
}

// ===== RESET =====
function restartGame(){
    game = new Chess();
    selectedSquare=null;
    gameOver=false;
    board.start();
    updateStatus();
}

// ===== INIT (ANTI-BUG) =====
window.onload = function(){
    game = new Chess();

    board = Chessboard('board',{
        draggable:false,
        position:'start',
        pieceTheme:(p)=>
        `https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/cburnett/${p}.svg`
    });

    // clique confiável
    document.getElementById("board").addEventListener("click", function(e){
        let el = e.target.closest("[data-square]");
        if(el){
            onSquareClick(el.getAttribute("data-square"));
        }
    });

    updateStatus();
};
</script>

</body>
</html>
