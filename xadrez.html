<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Xadrez Simples</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>

<style>
body{
  background:#000;
  color:#fff;
  text-align:center;
  font-family:Arial;
}

#board{
  display:grid;
  grid-template-columns:repeat(8,60px);
  width:480px;
  margin:20px auto;
}

.square{
  width:60px;
  height:60px;
  line-height:60px;
  font-size:32px;
  cursor:pointer;
}

.light{ background:#eee; color:#000; }
.dark{ background:#444; }

.selected{
  outline:3px solid yellow;
}

.move{
  background:#6a6 !important;
}
</style>
</head>

<body>

<h2>♟️ Xadrez Simples</h2>

<div id="board"></div>

<p>Turno: <span id="turn"></span></p>

<button onclick="novo()">Novo Jogo</button>

<script>

let game = new Chess();
let selected = null;
let moves = [];

function draw(){

  const board = document.getElementById("board");
  board.innerHTML = "";

  let b = game.board();

  for(let i=0;i<8;i++){
    for(let j=0;j<8;j++){

      let sq = document.createElement("div");

      let color = (i+j)%2==0 ? "light" : "dark";
      sq.className = "square " + color;

      let coord = String.fromCharCode(97+j) + (8-i);

      let piece = b[i][j];
      if(piece){
        sq.innerText = symbol(piece);
      }

      if(coord === selected){
        sq.classList.add("selected");
      }

      if(moves.includes(coord)){
        sq.classList.add("move");
      }

      sq.onclick = () => clickSquare(coord);

      board.appendChild(sq);
    }
  }

  document.getElementById("turn").innerText =
    game.turn() === "w" ? "Brancas" : "Pretas";
}

function symbol(p){
  const map = {
    p:"♟", r:"♜", n:"♞", b:"♝", q:"♛", k:"♚"
  };
  let s = map[p.type];
  return p.color === "w" ? s.toUpperCase() : s;
}

function clickSquare(c){

  if(!selected){
    let m = game.moves({square:c, verbose:true});
    if(m.length === 0) return;

    selected = c;
    moves = m.map(x=>x.to);
    draw();
    return;
  }

  let move = game.move({
    from:selected,
    to:c,
    promotion:'q'
  });

  selected = null;
  moves = [];

  if(move){
    draw();
    return;
  }

  draw();
}

function novo(){
  game = new Chess();
  selected = null;
  moves = [];
  draw();
}

draw();

</script>

</body>
</html>
