<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Xadrez VOV IA</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css"/>

<style>
body{
    background:#0f0f0f;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

#board{
    width:420px;
    margin:20px auto;
}

#status{
    margin-top:10px;
    font-size:18px;
    min-height:24px;
}

button{
    margin-top:10px;
    padding:10px 14px;
    cursor:pointer;
    font-size:16px;
}
</style>
</head>

<body>

<h2>♟️ Xadrez VOV IA Avançada</h2>

<div id="board"></div>
<div id="status">Carregando...</div>
<button onclick="restartGame()">Reiniciar</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

<script>
let game = new Chess();
let board = null;
let gameOver = false;

// ===== IA VOV (material evaluation simples) =====
function evaluateBoard(game) {
    const values = { p:10, n:30, b:30, r:50, q:90, k:900 };

    let score = 0;
    const boardState = game.board();

    for (let row of boardState) {
        for (let piece of row) {
            if (piece) {
                let value = values[piece.type];
                score += piece.color === 'b' ? value : -value;
            }
        }
    }
    return score;
}

// ===== STATUS =====
function updateStatus() {
    let text = "";

    if (game.in_checkmate()) {
        gameOver = true;
        let winner = game.turn() === 'w' ? "Pretas (IA VOV)" : "Brancas (Você)";
        text = "XEQUE-MATE! Vitória de " + winner;
        showVictory(winner);
    }
    else if (game.in_draw()) {
        gameOver = true;
        text = "Empate!";
    }
    else {
        text = "Turno: " + (game.turn() === 'w' ? "Brancas (Você)" : "IA VOV");
        if (game.in_check()) text += " - XEQUE!";
    }

    document.getElementById("status").innerText = text;
}

// ===== VITÓRIA VISUAL =====
function showVictory(winner) {
    const div = document.createElement("div");
    div.innerHTML = `
    <div style="
        position:fixed;top:0;left:0;width:100%;height:100%;
        background:rgba(0,0,0,0.92);
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        font-size:34px;
        z-index:9999;">
        ♔ XEQUE-MATE ♔
        <div style="font-size:22px;margin-top:10px;">
            Vitória de ${winner}
        </div>
    </div>`;
    document.body.appendChild(div);
}

// ===== MOVIMENTO IA VOV =====
function makeAIMove() {
    if (gameOver) return;

    const moves = game.moves({ verbose:true });
    if (moves.length === 0) return;

    let bestMove = null;
    let bestValue = -9999;

    for (let move of moves) {
        let gameCopy = new Chess(game.fen());
        gameCopy.move(move);

        let value = evaluateBoard(gameCopy);

        if (value > bestValue) {
            bestValue = value;
            bestMove = move;
        }
    }

    if (bestMove) {
        game.move(bestMove);
        board.position(game.fen());
        updateStatus();
    }
}

// ===== MOVIMENTO DO JOGADOR =====
function onDrop(source, target) {
    if (gameOver) return 'snapback';

    let move = game.move({
        from: source,
        to: target,
        promotion: 'q'
    });

    if (move === null) return 'snapback';

    board.position(game.fen());
    updateStatus();

    setTimeout(makeAIMove, 350);
}

// ===== REINICIAR =====
function restartGame() {
    game = new Chess();
    gameOver = false;
    board.start();
    updateStatus();
}

// ===== TABULEIRO =====
board = Chessboard('board', {
    draggable:true,
    position:'start',
    onDrop:onDrop,

    // peças pretas consistentes (VOV clean)
    pieceTheme: function(piece) {
        const color = piece.charAt(0);
        const type = piece.charAt(1);

        return `https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/cburnett/${color}${type}.svg`;
    }
});

updateStatus();
</script>

</body>
</html>
