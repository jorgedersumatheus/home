<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Xadrez VOV</title>

<style>
body{
  background:#0a0a0a;
  color:#f5f5f5;
  text-align:center;
  font-family: "Segoe UI", Arial;
}

h2{
  margin-top:20px;
  letter-spacing:1px;
}

#board{
  display:grid;
  grid-template-columns:repeat(8,70px);
  width:560px;
  margin:30px auto;
  border:4px solid #c9a227;
  border-radius:8px;
  overflow:hidden;
}

.square{
  width:70px;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  cursor:pointer;
  transition:0.2s;
}

.light{ background:#f0d9b5; }
.dark{ background:#b58863; }

.square:hover{
  filter:brightness(1.1);
}

.selected{
  outline:4px solid #ffd700;
}

.info{
  margin-top:10px;
  font-size:18px;
}

button{
  margin-top:15px;
  padding:10px 20px;
  font-size:16px;
  border:none;
  border-radius:6px;
  background:#c9a227;
  color:#000;
  cursor:pointer;
}

button:hover{
  background:#e0b84d;
}
</style>

</head>
<body>

<h2>♟️ Xadrez VOV</h2>

<div id="board"></div>

<div class="info">
Turno: <span id="turn"></span>
</div>

<button onclick="novo()">Novo Jogo</button>

<script>

// TABULEIRO
let board = [
["r","n","b","q","k","b","n","r"],
["p","p","p","p","p","p","p","p"],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["P","P","P","P","P","P","P","P"],
["R","N","B","Q","K","B","N","R"]
];

let turn = "w";
let selected = null;

// PEÇAS BONITAS
function simbolo(p){
  const pecas = {
    P:"♙", R:"♖", N:"♘", B:"♗", Q:"♕", K:"♔",
    p:"♟", r:"♜", n:"♞", b:"♝", q:"♛", k:"♚"
  };
  return pecas[p] || "";
}

// DESENHAR
function draw(){
  let el = document.getElementById("board");
  el.innerHTML="";

  for(let i=0;i<8;i++){
    for(let j=0;j<8;j++){

      let sq = document.createElement("div");
      sq.className = "square " + ((i+j)%2==0?"light":"dark");

      let piece = board[i][j];
      sq.innerText = simbolo(piece);

      if(selected && selected[0]==i && selected[1]==j){
        sq.classList.add("selected");
      }

      sq.onclick = ()=>clickSquare(i,j);

      el.appendChild(sq);
    }
  }

  document.getElementById("turn").innerText =
    turn==="w"?"Brancas" : "Pretas";
}

// MOVIMENTO BÁSICO
function isWhite(p){ return p === p.toUpperCase(); }

function validMove(i,j,ti,tj){

  let piece = board[i][j];
  if(!piece) return false;

  let dx = tj - j;
  let dy = ti - i;

  // peão
  if(piece.toLowerCase() === "p"){
    let dir = isWhite(piece) ? -1 : 1;

    if(dx===0 && dy===dir && board[ti][tj]==="") return true;

    if(Math.abs(dx)===1 && dy===dir && board[ti][tj] !== "") return true;
  }

  // torre
  if(piece.toLowerCase() === "r"){
    if(i===ti || j===tj) return true;
  }

  // bispo
  if(piece.toLowerCase() === "b"){
    if(Math.abs(dx) === Math.abs(dy)) return true;
  }

  // rainha
  if(piece.toLowerCase() === "q"){
    if(i===ti || j===tj || Math.abs(dx)===Math.abs(dy)) return true;
  }

  // rei
  if(piece.toLowerCase() === "k"){
    if(Math.abs(dx)<=1 && Math.abs(dy)<=1) return true;
  }

  // cavalo
  if(piece.toLowerCase() === "n"){
    if((Math.abs(dx)===2 && Math.abs(dy)===1) ||
       (Math.abs(dx)===1 && Math.abs(dy)===2)) return true;
  }

  return false;
}

// CLIQUE
function clickSquare(i,j){

  let piece = board[i][j];

  if(!selected){
    if(piece==="") return;

    if(turn==="w" && !isWhite(piece)) return;
    if(turn==="b" && isWhite(piece)) return;

    selected = [i,j];
    draw();
    return;
  }

  let [si,sj] = selected;

  if(validMove(si,sj,i,j)){

    if(board[i][j] !== ""){
      if(isWhite(board[i][j]) === isWhite(board[si][sj])){
        selected = null;
        draw();
        return;
      }
    }

    board[i][j] = board[si][sj];
    board[si][sj] = "";

    turn = turn==="w"?"b":"w";
  }

  selected = null;
  draw();
}

// NOVO JOGO
function novo(){
  location.reload();
}

// INICIAR
draw();

</script>

</body>
</html>
