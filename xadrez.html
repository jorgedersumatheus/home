<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Xadrez VOV</title>

<!-- TABULEIRO PRONTO -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard.min.js"></script>

<style>
body{
  background:#000;
  color:#fff;
  text-align:center;
  font-family:Arial;
}

#board{
  width:350px;
  margin:20px auto;
}

.panel{
  background:#111;
  padding:15px;
  border-radius:10px;
  max-width:350px;
  margin:auto;
}
</style>
</head>

<body>

<h1>♟️ Xadrez VOV</h1>

<div id="board"></div>

<div class="panel">
<div>Turno: <span id="turno"></span></div>
<div>FEN: <span id="fen"></span></div>
</div>

<button onclick="novoJogo()">Novo</button>

<script>

// MOTOR
var game = new Chess();

// TABULEIRO
var board = Chessboard('board', {
  draggable: true,
  position: 'start',
  onDrop: onDrop
});

// MOVIMENTO
function onDrop(source, target) {

  var move = game.move({
    from: source,
    to: target,
    promotion: 'q'
  });

  if (move === null) return 'snapback';

  atualizar();
}

// ATUALIZA
function atualizar(){
  document.getElementById("fen").innerText = game.fen();
  document.getElementById("turno").innerText =
    game.turn() === "w" ? "Brancas" : "Pretas";
}

// NOVO JOGO
function novoJogo(){
  game.reset();
  board.start();
  atualizar();
}

// INIT
atualizar();

</script>

</body>
</html>
