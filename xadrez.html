<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Xadrez Básico</title>

<style>
body{background:#000;color:#fff;text-align:center;font-family:Arial;}
#board{display:grid;grid-template-columns:repeat(8,60px);width:480px;margin:20px auto;}
.square{width:60px;height:60px;line-height:60px;font-size:30px;cursor:pointer;}
.light{background:#eee;color:#000;}
.dark{background:#444;}
.selected{outline:3px solid yellow;}
</style>

</head>
<body>

<h2>♟️ Xadrez (versão mínima)</h2>

<div id="board"></div>

<p>Turno: <span id="turn"></span></p>

<button onclick="novo()">Novo</button>

<script>

// TABULEIRO INICIAL SIMPLES
let board = [
["r","n","b","q","k","b","n","r"],
["p","p","p","p","p","p","p","p"],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["","","","","","","",""],
["P","P","P","P","P","P","P","P"],
["R","N","B","Q","K","B","N","R"]
];

let turn = "w";
let selected = null;

// DESENHAR
function draw(){
  let el = document.getElementById("board");
  el.innerHTML="";

  for(let i=0;i<8;i++){
    for(let j=0;j<8;j++){

      let sq = document.createElement("div");
      sq.className = "square " + ((i+j)%2==0?"light":"dark");

      let piece = board[i][j];
      sq.innerText = piece;

      let coord = [i,j];

      sq.onclick = ()=>clickSquare(coord);

      el.appendChild(sq);
    }
  }

  document.getElementById("turn").innerText =
    turn === "w" ? "Brancas" : "Pretas";
}

// CLIQUE (movimento livre simplificado)
function clickSquare(c){

  if(!selected){
    if(board[c[0]][c[1]]==="") return;
    selected = c;
    return;
  }

  // move simples (sem validação)
  board[c[0]][c[1]] = board[selected[0]][selected[1]];
  board[selected[0]][selected[1]] = "";

  selected = null;

  turn = turn==="w"?"b":"w";

  draw();
}

// NOVO
function novo(){
  location.reload();
}

// INIT
draw();

</script>

</body>
</html>
