<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Biblioteca VOV</title>

<style>
body{
  font-family:Arial;
  background:#000;
  color:#fff;
  text-align:center;
}

h1{
  margin-top:20px;
}

.card{
  background:#111;
  margin:15px auto;
  padding:15px;
  border-radius:12px;
  max-width:520px;
  text-align:left;
  box-shadow:0 0 10px rgba(255,255,255,0.05);
}

button{
  margin:5px;
  padding:8px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.log{
  background:#000;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  font-size:12px;
  max-height:120px;
  overflow:auto;
}

.topo{
  margin-bottom:20px;
}

a{
  color:#0af;
}
</style>
</head>

<body>

<h1>📚 Biblioteca VOV</h1>

<div class="topo">
<a href="index.html">🏠 Portal</a> |
<a href="xadrez.html">♟️ Xadrez Mestre</a>
</div>

<div id="lista"></div>

<script>

// ===== CARREGAR =====
function carregar(){

  let banco = JSON.parse(localStorage.getItem("vov_partidas")) || [];

  if(banco.length === 0){
    document.getElementById("lista").innerHTML = "<p><small>Nenhuma partida salva ainda.</small></p>";
    return;
  }

  let html = "";

  banco.slice().reverse().forEach(p=>{

    html += `
    <div class="card">

    <strong>📅 Data:</strong> ${p.data || "--"}<br>
    <strong>🔮 Hexagrama:</strong> ${p.hex || "--"}<br>
    <strong>📜 Leitura:</strong> ${p.leitura || "--"}<br>
    <strong>🧠 Avaliação:</strong> ${p.avaliacao || "--"}<br>

    <div class="log">
    ${ (p.movimentos || []).join(" ") }
    </div>

    <br>

    <button onclick="ver(${p.id})">👁 Ver</button>
    <button onclick="baixar(${p.id})">📄 PDF</button>
    <button onclick="excluir(${p.id})">🗑 Excluir</button>

    </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

// ===== VER DETALHE =====
function ver(id){

  let banco = JSON.parse(localStorage.getItem("vov_partidas")) || [];
  let p = banco.find(x=>x.id===id);

  if(!p){
    alert("Partida não encontrada.");
    return;
  }

  let texto = `
PARTIDA VOV

Data: ${p.data}
Hexagrama: ${p.hex}
Leitura: ${p.leitura}
Avaliação: ${p.avaliacao}

Movimentos:
${(p.movimentos || []).join(" ")}

FEN:
${p.fen || "--"}
  `;

  alert(texto);
}

// ===== BAIXAR =====
function baixar(id){

  let banco = JSON.parse(localStorage.getItem("vov_partidas")) || [];
  let p = banco.find(x=>x.id===id);

  if(!p){
    alert("Partida não encontrada.");
    return;
  }

  let texto = `
PARTIDA VOV

Data: ${p.data}
Hexagrama: ${p.hex}
Leitura: ${p.leitura}
Avaliação: ${p.avaliacao}

Movimentos:
${(p.movimentos || []).join(" ")}

FEN:
${p.fen || "--"}

Portal:
https://jorgematheus.mus.br
  `;

  let blob = new Blob([texto], {type: "text/plain"});

  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "partida-vov.txt";
  a.click();
}

// ===== EXCLUIR =====
function excluir(id){

  if(!confirm("Excluir esta partida?")) return;

  let banco = JSON.parse(localStorage.getItem("vov_partidas")) || [];

  banco = banco.filter(x=>x.id !== id);

  localStorage.setItem("vov_partidas", JSON.stringify(banco));

  carregar();
}

// ===== INIT =====
carregar();

</script>

</body>
</html>
