<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal VOV</title>
<style>
  /* Reset básico */
  * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
  body { background-color:#000; color:#fff; min-height:100vh; }

  /* Header */
  header { background-color:#111; padding:15px 20px; text-align:center; }
  header nav a { color:#fff; margin:0 10px; text-decoration:none; font-weight:bold; }
  header nav a:hover { text-decoration: underline; }

  /* Seções */
  section { padding:40px 20px; text-align:center; }

  /* Cards de vídeo/playlists */
  .cards { display:flex; flex-wrap:wrap; justify-content:center; gap:15px; }
  .card { width:180px; background:#111; border-radius:8px; overflow:hidden; cursor:pointer; transition: transform 0.2s; }
  .card img { width:100%; display:block; }
  .card p { padding:8px; font-size:14px; color:#fff; text-align:center; }
  .card:hover { transform: scale(1.05); }

  /* Player de áudio */
  #audioPlayer { width:90%; margin:20px auto; display:block; }

  /* Formulários discretos */
  .form-section { background:#111; padding:30px 20px; border-radius:8px; display:inline-block; margin-top:20px; }
  .form-section input { padding:8px; margin:5px; width:200px; border-radius:4px; border:none; }
  .form-section button { padding:8px 15px; margin-top:10px; border:none; border-radius:4px; background:#0066cc; color:#fff; cursor:pointer; }
  .form-section button:hover { background:#004999; }

  /* Footer */
  footer { background:#111; padding:20px; text-align:center; margin-top:30px; font-size:14px; }

  @media(max-width:600px) { .cards { flex-direction:column; align-items:center; } .card { width:90%; } .form-section input { width:90%; } }
</style>
</head>
<body>

<!-- Header -->
<header>
  <h1>Portal VOV</h1>
  <nav>
    <a href="#videos">Vídeos</a>
    <a href="#playlists">Playlists</a>
    <a href="#landing">Newsletter</a>
    <a href="contato.html">Contato</a>
  </nav>
</header>

<!-- Vídeos em destaque -->
<section id="videos">
  <h2>Vídeos em Destaque</h2>
  <div class="cards">
    <div class="card" onclick="playPlaylist('tomjobim')">
      <img src="https://img.youtube.com/vi/ID_DO_TOMJOBIM/0.jpg" alt="Tom Jobim">
      <p>Playlist Tom Jobim</p>
    </div>
    <div class="card" onclick="playPlaylist('blackvox')">
      <img src="https://img.youtube.com/vi/ID_DO_BLACKVOX/0.jpg" alt="BlackVox">
      <p>Playlist BlackVox</p>
    </div>
    <div class="card" onclick="playPlaylist('iching')">
      <img src="https://img.youtube.com/vi/ID_DO_ICHING/0.jpg" alt="I Ching">
      <p>Playlist I Ching</p>
    </div>
  </div>
  <audio id="audioPlayer" controls></audio>
  <div id="audioName" style="margin-top:10px;"></div>
</section>

<!-- Landing / Newsletter -->
<section id="landing">
  <h2>Receba novidades do VOV</h2>
  <form class="form-section formulario" data-page="landing">
    <input type="text" name="name" placeholder="Seu nome" required>
    <input type="email" name="email" placeholder="Seu e-mail" required>
    <input type="hidden" name="page" value="landing">
    <button type="submit">Cadastrar</button>
  </form>
</section>

<!-- Footer -->
<footer>
  <p>Ver Ouvir Vendas – VOV</p>
  <p>Contato: verouvirvendas@jorgematheus.mus.br</p>
  <p>&copy; 2026 Jorge LA Matheus</p>
</footer>

<script>
  // Playlists simplificadas
  const playlists = {
    tomjobim: ['URL_DO_AUDIO_1', 'URL_DO_AUDIO_2'],
    blackvox: ['URL_DO_AUDIO_1', 'URL_DO_AUDIO_2'],
    iching: ['URL_DO_AUDIO_1', 'URL_DO_AUDIO_2']
  };

  function playPlaylist(name) {
    const audioPlayer = document.getElementById('audioPlayer');
    const audioName = document.getElementById('audioName');
    if(playlists[name] && playlists[name].length > 0){
      audioPlayer.src = playlists[name][0];
      audioPlayer.style.display = 'block';
      audioName.textContent = `Tocando: ${name}`;
      audioPlayer.play();
    } else { alert('Playlist vazia'); }
  }

  // Formulários discretos
  const forms = document.querySelectorAll('.formulario');
  forms.forEach(form => {
    form.addEventListener('submit', async function(e){
      e.preventDefault();
      const data = { 
        name: this.name.value,
        email: this.email.value,
        page: this.page.value
      };
      try {
        const response = await fetch('https://SEU-LINK-DE-WEBHOOK', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(data)
        });
        if(response.ok){ alert('Cadastro enviado!'); this.reset(); }
        else alert('Erro no envio, tente novamente.');
      } catch(err){ alert('Erro de conexão.'); console.error(err); }
    });
  });
</script>

</body>
</html>
