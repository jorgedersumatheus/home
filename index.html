<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOV | Jorge LA Matheus</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #000, #111);
  color: white;
  text-align: center;
  padding: 30px 20px;
}

.logo {
  font-size: 14px;
  letter-spacing: 4px;
  color: #FFD700;
  margin-bottom: 20px;
}

h1 {
  font-size: 26px;
  margin-bottom: 10px;
}

p {
  color: #aaa;
  font-size: 15px;
  margin-bottom: 30px;
}

.box {
  background: #111;
  padding: 25px;
  border-radius: 16px;
  max-width: 420px;
  margin: auto;
  box-shadow: 0 0 20px rgba(255,215,0,0.1);
}

input {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 15px;
  border-radius: 10px;
  border: none;
  background: #FFD700;
  color: black;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
}

button:active {
  transform: scale(0.98);
}

.loading {
  display: none;
  margin-top: 10px;
  font-size: 14px;
  color: #FFD700;
}

footer {
  margin-top: 30px;
  font-size: 12px;
  color: #666;
}
</style>
</head>

<body>

<div class="logo">V O V</div>

<h1>🎶 Você sentiu, não foi?</h1>

<p>Se essa música te tocou,<br>
deixa seu contato.<br>
Eu te encontro de novo.</p>

<div class="box">

<form id="form">
  <input type="text" name="name" placeholder="Seu nome" required>
  <input type="email" name="email" placeholder="Seu melhor e-mail" required>

  <button type="submit">Receber conteúdos</button>

  <div class="loading" id="loading">Enviando...</div>
</form>

</div>

<footer>
Ver Ouvir Vendas • Jorge LA Matheus
</footer>

<script>
const form = document.getElementById("form");
const loading = document.getElementById("loading");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  loading.style.display = "block";

  const data = {
    name: this.name.value,
    email: this.email.value
  };

  try {
    await fetch("https://n8n-vov.onrender.com/webhook/vov-show", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    window.location.href = "/obrigado.html";

  } catch (err) {
    loading.innerText = "Erro ao enviar. Tente novamente.";
  }
});
</script>

</body>
</html>
