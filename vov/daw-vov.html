<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>DAW VOV</title><style>body{    margin:0;    font-family:Arial;    background:#0f0f0f;    color:#fff;    text-align:center;}button{    margin:5px;    padding:10px;    background:#1e1e1e;    color:#fff;    border:1px solid #444;    border-radius:6px;}#timeline{    height:60px;    background:#1a1a1a;    position:relative;}#playhead{    width:2px;    height:100%;    background:red;    position:absolute;    left:0;}.track{    background:#1c1c1c;    margin:10px;    padding:10px;}</style></head><body><h2>🎧 DAW VOV</h2><button onclick="play()">Play</button><button onclick="stop()">Stop</button><button onclick="rec()">Rec</button><div id="timeline">    <div id="playhead"></div></div><div id="tracks"></div><button onclick="addTrack()">+ Pista</button><script>let audioCtx = new (window.AudioContext || window.webkitAudioContext)();let tracks = [];let isPlaying=false;let startTime=0;function play(){    isPlaying=true;    startTime=audioCtx.currentTime;    animate();    tracks.forEach(t=>{        if(t.buffer){            let src=audioCtx.createBufferSource();            src.buffer=t.buffer;            src.connect(audioCtx.destination);            src.start();            t.src=src;        }    });}function stop(){    isPlaying=false;    tracks.forEach(t=>{        if(t.src){            try{t.src.stop();}catch(e){}        }    });    document.getElementById("playhead").style.left="0px";}function animate(){    if(!isPlaying) return;    let t=audioCtx.currentTime-startTime;    document.getElementById("playhead").style.left=(t*100)+"px";    requestAnimationFrame(animate);}function addTrack(){    let div=document.createElement("div");    div.className="track";    let recBtn=document.createElement("button");    recBtn.innerText="Gravar";    let stopBtn=document.createElement("button");    stopBtn.innerText="Parar";    let chunks=[];    let recorder;    recBtn.onclick=async ()=>{        let stream=await navigator.mediaDevices.getUserMedia({audio:true});        recorder=new MediaRecorder(stream);        recorder.ondataavailable=e=>chunks.push(e.data);        recorder.onstop=async ()=>{            let blob=new Blob(chunks);            let arr=await blob.arrayBuffer();            let buffer=await audioCtx.decodeAudioData(arr);            track.buffer=buffer;            chunks=[];        };        recorder.start();    };    stopBtn.onclick=()=>{        if(recorder) recorder.stop();    };    div.append(recBtn,stopBtn);    document.getElementById("tracks").appendChild(div);    let track={buffer:null};    tracks.push(track);}function rec(){    alert("Use o botão de cada pista para gravar");}</script></body></html>
