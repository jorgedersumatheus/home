<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAW VOV</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:#fff;
    text-align:center;
}

button{
    margin:5px;
    padding:10px;
    background:#2a2a2a;
    color:#fff;
    border:1px solid #555;
    border-radius:10px;
    box-shadow: inset 0 0 5px #000, 0 2px 5px #000;
}

.track{
    background:linear-gradient(145deg,#1a1a1a,#2a2a2a);
    margin:10px;
    padding:10px;
    border-radius:12px;
    box-shadow: inset 0 0 10px #000;
}

input[type=range]{
    width:150px;
}
</style>
</head>

<body>

<h2>🎧 DAW VOV — Export PRO</h2>

<button onclick="playAll()">▶ Play Geral</button>
<button onclick="stopAll()">■ Stop</button>
<button onclick="exportTracks()">⬇ Exportar Faixas</button>

<div id="tracks"></div>

<button onclick="addTrack()">+ Pista</button>

<script>

let tracks = [];
let currentRecorder = null;
let currentStream = null;

// PLAY GERAL
function playAll(){
    tracks.forEach(t=>{
        if(t.audio.src){
            t.audio.currentTime = 0;
            t.audio.play();
        }
    });
}

// PLAY PARA GRAVAÇÃO
function playForRecording(){
    tracks.forEach(t=>{
        if(t.audio.src){
            t.audio.currentTime = 0;
            t.audio.play();
        }
    });
}

// STOP
function stopAll(){
    tracks.forEach(t=>{
        t.audio.pause();
        t.audio.currentTime = 0;
    });

    if(currentRecorder){
        currentRecorder.stop();
    }
}

// REMOVER
function removeTrack(index){
    tracks[index].audio.pause();
    tracks.splice(index,1);
    render();
}

// EXPORTAR TODAS AS FAIXAS
function exportTracks(){

    tracks.forEach((t, i)=>{

        if(!t.audio.src) return;

        let a = document.createElement("a");
        a.href = t.audio.src;

        // nomes organizados
        a.download = "VOV_track_" + (i+1) + ".webm";

        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    });

    alert("Faixas exportadas! Importe no REAPER.");
}

// RENDER
function render(){

    const container = document.getElementById("tracks");
    container.innerHTML = "";

    tracks.forEach((track, index)=>{

        let div = document.createElement("div");
        div.className = "track";

        let rec = document.createElement("button");
        rec.innerText = "Gravar";

        let stop = document.createElement("button");
        stop.innerText = "Parar";

        let play = document.createElement("button");
        play.innerText = "▶";

        let del = document.createElement("button");
        del.innerText = "Remover";

        let volume = document.createElement("input");
        volume.type = "range";
        volume.min = 0;
        volume.max = 1;
        volume.step = 0.01;
        volume.value = track.volume;

        // VOLUME
        volume.oninput = ()=>{
            track.volume = volume.value;
            track.audio.volume = track.volume;
        };

        // PLAY INDIVIDUAL
        play.onclick = ()=>{
            if(track.audio.src){
                track.audio.currentTime = 0;
                track.audio.play();
            }
        };

        // GRAVAÇÃO COM OVERDUB
        rec.onclick = async ()=>{

            if(currentRecorder){
                alert("Já gravando");
                return;
            }

            playForRecording();

            try{
                currentStream = await navigator.mediaDevices.getUserMedia({
                    audio:{
                        echoCancellation:true,
                        noiseSuppression:true,
                        autoGainControl:false
                    }
                });

                let recorder = new MediaRecorder(currentStream);
                currentRecorder = recorder;

                let chunks = [];

                recorder.ondataavailable = e => chunks.push(e.data);

                recorder.onstop = ()=>{
                    let blob = new Blob(chunks,{type:"audio/webm"});
                    track.audio.src = URL.createObjectURL(blob);

                    currentStream.getTracks().forEach(t=>t.stop());
                    currentRecorder = null;
                };

                recorder.start();
                rec.style.background="red";

            }catch(err){
                alert("Erro no microfone: " + err.message);
            }
        };

        // PARAR
        stop.onclick = ()=>{
            if(currentRecorder){
                currentRecorder.stop();
                rec.style.background="#2a2a2a";
            }
        };

        del.onclick = ()=> removeTrack(index);

        div.append(
            rec,
            stop,
            play,
            volume,
            del,
            track.audio
        );

        container.appendChild(div);
    });
}

// NOVA PISTA
function addTrack(){

    let audio = document.createElement("audio");
    audio.controls = true;
    audio.volume = 0.8;

    tracks.push({
        audio: audio,
        volume: 0.8
    });

    render();
}

</script>

</body>
</html>
