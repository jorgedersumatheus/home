<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAW VOV Estável</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:#fff;
    text-align:center;
}

button{
    margin:5px;
    padding:10px;
    background:#1e1e1e;
    color:#fff;
    border:1px solid #444;
    border-radius:6px;
}

.track{
    background:#1c1c1c;
    margin:10px;
    padding:10px;
    border-radius:6px;
}
</style>
</head>

<body>

<h2>🎧 DAW VOV (Estável)</h2>

<button onclick="playAll()">▶ Play Geral</button>
<button onclick="stopAll()">■ Stop</button>

<div id="tracks"></div>

<button onclick="addTrack()">+ Pista</button>

<script>

let tracks = [];
let currentRecorder = null;
let currentStream = null;

// PLAY
function playAll(){
    tracks.forEach(t=>{
        if(t.audio.src){
            t.audio.pause();
            t.audio.currentTime = 0;
            t.audio.play();
        }
    });
}

// STOP
function stopAll(){
    tracks.forEach(t=>{
        t.audio.pause();
        t.audio.currentTime = 0;
    });
}

// REMOVER
function removeTrack(index){
    tracks.splice(index,1);
    render();
}

// UI
function render(){
    const container = document.getElementById("tracks");
    container.innerHTML = "";

    tracks.forEach((track, index)=>{

        let div = document.createElement("div");
        div.className = "track";

        let rec = document.createElement("button");
        rec.innerText = "Gravar";

        let stop = document.createElement("button");
        stop.innerText = "Parar";

        let del = document.createElement("button");
        del.innerText = "Remover";

        let audio = document.createElement("audio");
        audio.controls = true;

        track.audio = audio;

        // GRAVAR
        rec.onclick = async ()=>{

            if(currentRecorder){
                alert("Já gravando");
                return;
            }

            try{
                currentStream = await navigator.mediaDevices.getUserMedia({
                    audio:{
                        echoCancellation:true,
                        noiseSuppression:true,
                        autoGainControl:false
                    }
                });

                let recorder = new MediaRecorder(currentStream);
                currentRecorder = recorder;

                let chunks = [];

                recorder.ondataavailable = e => chunks.push(e.data);

                recorder.onstop = ()=>{
                    let blob = new Blob(chunks,{type:"audio/webm"});
                    audio.src = URL.createObjectURL(blob);

                    currentStream.getTracks().forEach(t=>t.stop());
                    currentRecorder = null;
                };

                recorder.start();
                rec.style.background="red";

            }catch(err){
                alert("Erro microfone: " + err.message);
            }
        };

        // PARAR
        stop.onclick = ()=>{
            if(currentRecorder){
                currentRecorder.stop();
                rec.style.background="#1e1e1e";
            }
        };

        del.onclick = ()=> removeTrack(index);

        div.append(rec, stop, del, audio);
        container.appendChild(div);
    });
}

// NOVA PISTA
function addTrack(){
    tracks.push({});
    render();
}

</script>

</body>
</html>
