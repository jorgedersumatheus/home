<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAW VOV</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:#fff;
    text-align:center;
}

button{
    margin:5px;
    padding:10px 15px;
    background:#1e1e1e;
    color:#fff;
    border:1px solid #444;
    border-radius:6px;
}

.track{
    background:#1c1c1c;
    margin:10px;
    padding:10px;
    border-radius:6px;
}
</style>
</head>

<body>

<h2>🎧 DAW VOV</h2>

<div>
    <button onclick="playAll()">▶ Play Geral</button>
    <button onclick="stopAll()">■ Stop</button>
</div>

<div id="tracks"></div>

<button onclick="addTrack()">+ Pista</button>


<script>
let tracks = [];
let currentRecorder = null;
let currentStream = null;

// PLAY GERAL (com controle real)
function playAll(){
    tracks.forEach(t=>{
        if(t.audio.src){
            t.audio.pause();
            t.audio.currentTime = 0;
            t.audio.play();
        }
    });
}

// STOP GERAL (corrigido)
function stopAll(){
    tracks.forEach(t=>{
        if(t.audio){
            t.audio.pause();
            t.audio.currentTime = 0;
        }
    });
}

// CRIAR PISTA
function addTrack(){

    let div = document.createElement("div");
    div.className = "track";

    let recBtn = document.createElement("button");
    recBtn.innerText = "Gravar";

    let stopBtn = document.createElement("button");
    stopBtn.innerText = "Parar";

    let audio = document.createElement("audio");
    audio.controls = true;
    audio.volume = 0.8; // evita distorção

    let recorder = null;
    let chunks = [];

    let track = { audio };
    tracks.push(track);

    // GRAVAR
    recBtn.onclick = async () => {

        if(currentRecorder){
            alert("Já está gravando outra pista");
            return;
        }

        try{
            currentStream = await navigator.mediaDevices.getUserMedia({
                audio:{
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: false // 🔥 chave para evitar volume louco
                }
            });

            recorder = new MediaRecorder(currentStream);
            currentRecorder = recorder;

            chunks = [];

            recorder.ondataavailable = e => chunks.push(e.data);

            recorder.onstop = () => {

                const blob = new Blob(chunks, { type:"audio/webm" });
                const url = URL.createObjectURL(blob);

                audio.src = url;

                // encerra microfone
                currentStream.getTracks().forEach(t => t.stop());

                currentRecorder = null;

                recBtn.style.background = "#1e1e1e";
            };

            recorder.start();
            recBtn.style.background = "red";

        }catch(err){
            alert("Erro: " + err.message);
        }
    };

    // PARAR GRAVAÇÃO
    stopBtn.onclick = () => {
        if(recorder && recorder.state === "recording"){
            recorder.stop();
        }
    };

    div.append(recBtn, stopBtn, audio);
    document.getElementById("tracks").appendChild(div);
}
</script>
</body>
</html>
