<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAW VOV PRO</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:#fff;
    text-align:center;
}

button{
    margin:5px;
    padding:10px;
    background:#1e1e1e;
    color:#fff;
    border:1px solid #444;
    border-radius:6px;
}

.track{
    background:#1c1c1c;
    margin:10px;
    padding:10px;
    border-radius:6px;
}

input[type=range]{
    width:120px;
}
</style>
</head>

<body>

<h2>🎧 DAW VOV PRO</h2>

<button onclick="playAll()">▶ Play</button>
<button onclick="stopAll()">■ Stop</button>

<div id="tracks"></div>

<button onclick="addTrack()">+ Pista</button>

<script>
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let tracks = [];

let currentRecorder = null;
let currentStream = null;

// PLAY
function playAll(){
    tracks.forEach(t=>{
        if(t.buffer){
            let src = audioCtx.createBufferSource();
            src.buffer = t.buffer;

            src.connect(t.gainNode);
            t.gainNode.connect(audioCtx.destination);

            src.start();
            t.src = src;
        }
    });
}

// STOP
function stopAll(){
    tracks.forEach(t=>{
        if(t.src){
            try{ t.src.stop(); }catch(e){}
        }
    });
}

// CRIAR PISTA
function addTrack(){

    let div = document.createElement("div");
    div.className = "track";

    let recBtn = document.createElement("button");
    recBtn.innerText = "Rec";

    let stopBtn = document.createElement("button");
    stopBtn.innerText = "Stop";

    let muteBtn = document.createElement("button");
    muteBtn.innerText = "Mute";

    let soloBtn = document.createElement("button");
    soloBtn.innerText = "Solo";

    let volume = document.createElement("input");
    volume.type = "range";
    volume.min = 0;
    volume.max = 1;
    volume.step = 0.01;
    volume.value = 0.8;

    let recorder = null;
    let chunks = [];

    let gainNode = audioCtx.createGain();
    gainNode.gain.value = volume.value;

    let track = {
        buffer:null,
        gainNode:gainNode,
        muted:false,
        solo:false
    };

    tracks.push(track);

    // VOLUME
    volume.oninput = () => {
        gainNode.gain.value = volume.value;
    };

    // MUTE
    muteBtn.onclick = () => {
        track.muted = !track.muted;
        gainNode.gain.value = track.muted ? 0 : volume.value;
        muteBtn.style.background = track.muted ? "red" : "#1e1e1e";
    };

    // SOLO
    soloBtn.onclick = () => {
        track.solo = !track.solo;

        tracks.forEach(t=>{
            if(track.solo){
                t.gainNode.gain.value = (t === track) ? volume.value : 0;
            }else{
                t.gainNode.gain.value = t.muted ? 0 : volume.value;
            }
        });

        soloBtn.style.background = track.solo ? "yellow" : "#1e1e1e";
    };

    // GRAVAR
    recBtn.onclick = async () => {

        if(currentRecorder){
            alert("Já está gravando");
            return;
        }

        currentStream = await navigator.mediaDevices.getUserMedia({
            audio:{
                echoCancellation:true,
                noiseSuppression:true,
                autoGainControl:false
            }
        });

        recorder = new MediaRecorder(currentStream);
        currentRecorder = recorder;

        chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);

        recorder.onstop = async () => {

            let blob = new Blob(chunks);
            let arrayBuffer = await blob.arrayBuffer();

            track.buffer = await audioCtx.decodeAudioData(arrayBuffer);

            currentStream.getTracks().forEach(t=>t.stop());
            currentRecorder = null;

            recBtn.style.background = "#1e1e1e";
        };

        recorder.start();
        recBtn.style.background = "red";
    };

    stopBtn.onclick = () => {
        if(recorder){
            recorder.stop();
        }
    };

    div.append(recBtn, stopBtn, muteBtn, soloBtn, volume);
    document.getElementById("tracks").appendChild(div);
}
</script>

</body>
</html>
