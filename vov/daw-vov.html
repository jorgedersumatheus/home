<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAW VOV PRO</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:#fff;
    text-align:center;
}

button{
    margin:5px;
    padding:10px;
    background:#1e1e1e;
    color:#fff;
    border:1px solid #444;
    border-radius:6px;
}

.track{
    background:#1c1c1c;
    margin:10px;
    padding:10px;
    border-radius:6px;
}

input[type=range]{
    width:120px;
}
</style>
</head>

<body>

<h2>🎧 DAW VOV PRO</h2>

<button onclick="playAll()">▶ Play</button>
<button onclick="stopAll()">■ Stop</button>
<button onclick="exportMP3()">💾 Exportar MP3</button>

<div id="tracks"></div>

<button onclick="addTrack()">+ Pista</button>

<!-- encoder MP3 -->
<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>

<script>
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let tracks = [];
let currentRecorder = null;
let currentStream = null;

// PLAY
function playAll(){
    tracks.forEach(t=>{
        if(t.buffer){
            let src = audioCtx.createBufferSource();
            src.buffer = t.buffer;
            src.connect(t.gainNode);
            t.gainNode.connect(audioCtx.destination);
            src.start();
            t.src = src;
        }
    });
}

// STOP
function stopAll(){
    tracks.forEach(t=>{
        if(t.src){
            try{ t.src.stop(); }catch(e){}
        }
    });
}

// REMOVER PISTA
function removeTrack(index){
    tracks.splice(index,1);
    renderTracks();
}

// RENDER UI
function renderTracks(){
    let container = document.getElementById("tracks");
    container.innerHTML = "";

    tracks.forEach((track, index)=>{

        let div = document.createElement("div");
        div.className = "track";

        let recBtn = document.createElement("button");
        recBtn.innerText = "Rec";

        let stopBtn = document.createElement("button");
        stopBtn.innerText = "Stop";

        let muteBtn = document.createElement("button");
        muteBtn.innerText = "Mute";

        let soloBtn = document.createElement("button");
        soloBtn.innerText = "Solo";

        let delBtn = document.createElement("button");
        delBtn.innerText = "Remover";

        let volume = document.createElement("input");
        volume.type = "range";
        volume.min = 0;
        volume.max = 1;
        volume.step = 0.01;
        volume.value = track.volume;

        volume.oninput = ()=>{
            track.volume = volume.value;
            track.gainNode.gain.value = track.muted ? 0 : track.volume;
        };

        muteBtn.onclick = ()=>{
            track.muted = !track.muted;
            track.gainNode.gain.value = track.muted ? 0 : track.volume;
        };

        soloBtn.onclick = ()=>{
            track.solo = !track.solo;

            tracks.forEach(t=>{
                if(track.solo){
                    t.gainNode.gain.value = (t===track)?t.volume:0;
                }else{
                    t.gainNode.gain.value = t.muted?0:t.volume;
                }
            });
        };

        delBtn.onclick = ()=> removeTrack(index);

        // GRAVAÇÃO
        recBtn.onclick = async ()=>{
            if(currentRecorder){
                alert("Já gravando");
                return;
            }

            currentStream = await navigator.mediaDevices.getUserMedia({
                audio:{autoGainControl:false}
            });

            let recorder = new MediaRecorder(currentStream);
            currentRecorder = recorder;

            let chunks=[];

            recorder.ondataavailable=e=>chunks.push(e.data);

            recorder.onstop = async ()=>{
                let blob = new Blob(chunks);
                let arrayBuffer = await blob.arrayBuffer();
                track.buffer = await audioCtx.decodeAudioData(arrayBuffer);

                currentStream.getTracks().forEach(t=>t.stop());
                currentRecorder=null;
            };

            recorder.start();
        };

        stopBtn.onclick = ()=>{
            if(currentRecorder) currentRecorder.stop();
        };

        div.append(recBtn, stopBtn, muteBtn, soloBtn, volume, delBtn);
        container.appendChild(div);
    });
}

// NOVA PISTA
function addTrack(){
    let gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.8;

    tracks.push({
        buffer:null,
        gainNode:gainNode,
        volume:0.8,
        muted:false,
        solo:false
    });

    renderTracks();
}

// EXPORTAR MP3 (MIX FINAL)
async function exportMP3(){

    let length = 0;

    tracks.forEach(t=>{
        if(t.buffer){
            length = Math.max(length, t.buffer.length);
        }
    });

    let offlineCtx = new OfflineAudioContext(1, length, 44100);

    tracks.forEach(t=>{
        if(t.buffer){
            let src = offlineCtx.createBufferSource();
            src.buffer = t.buffer;

            let gain = offlineCtx.createGain();
            gain.gain.value = t.muted ? 0 : t.volume;

            src.connect(gain);
            gain.connect(offlineCtx.destination);

            src.start();
        }
    });

    let rendered = await offlineCtx.startRendering();
    let data = rendered.getChannelData(0);

    let mp3encoder = new lamejs.Mp3Encoder(1, 44100, 128);

    let samples = new Int16Array(data.length);
    for(let i=0;i<data.length;i++){
        samples[i]=data[i]*32767;
    }

    let mp3Data = mp3encoder.encodeBuffer(samples);
    let blob = new Blob(mp3Data, {type:"audio/mp3"});

    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "mix_vov.mp3";
    a.click();
}
</script>

</body>
</html>
