<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>VOV Align Core v1</title>

<style>
body {
    margin: 0;
    background: #0a0a0a;
    color: white;
    font-family: Arial;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 20px;
}

h2 { opacity: 0.8; }

.track {
    width: 360px;
    background: #111;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}

.rec {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #333;
    color: white;
}

.rec.active {
    background: red;
}

.slider {
    width: 100%;
    margin-top: 8px;
}

.label {
    font-size: 12px;
    opacity: 0.7;
}

#play {
    margin-top: 20px;
    padding: 10px 16px;
    background: green;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>VOV Align Core v1</h2>

<div id="tracks"></div>

<button id="play">PLAY SYNC</button>

<script>

let tracks = {
    voz: [],
    cavaquinho: []
};

let mediaRecorders = {};
let streams = {};

/* =========================
   CREATE TRACK UI
========================= */
function createTrack(name) {

    const container = document.createElement("div");
    container.className = "track";

    container.innerHTML = `
        <h3>${name}</h3>

        <button class="rec" id="rec_${name}">REC</button>

        <div class="label">OFFSET (ajuste de sincronização)</div>
        <input type="range" min="-1" max="1" step="0.01" value="0"
               class="slider" id="offset_${name}">

        <div id="list_${name}" style="margin-top:10px;font-size:12px;"></div>
    `;

    document.getElementById("tracks").appendChild(container);

    setupTrack(name);
}

/* =========================
   REC SYSTEM
========================= */
function setupTrack(name) {

    const btn = document.getElementById("rec_" + name);
    const slider = document.getElementById("offset_" + name);
    const list = document.getElementById("list_" + name);

    let offset = 0;

    slider.oninput = (e) => {
        offset = parseFloat(e.target.value);
    };

    btn.onclick = async () => {

        if (!mediaRecorders[name]) {

            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            streams[name] = stream;

            const recorder = new MediaRecorder(stream);
            const chunks = [];

            recorder.ondataavailable = e => chunks.push(e.data);

            recorder.onstop = () => {

                const blob = new Blob(chunks, { type: "audio/webm" });
                const url = URL.createObjectURL(blob);

                tracks[name].push({
                    url,
                    offset: offset
                });

                render(name, list);
            };

            recorder.start();

            mediaRecorders[name] = recorder;

            btn.classList.add("active");

        } else {

            mediaRecorders[name].stop();
            streams[name].getTracks().forEach(t => t.stop());

            mediaRecorders[name] = null;

            btn.classList.remove("active");
        }
    };
}

/* =========================
   RENDER LIST
========================= */
function render(name, list) {

    list.innerHTML = "";

    tracks[name].forEach((t, i) => {

        const div = document.createElement("div");

        div.innerText = `take ${i + 1} | offset: ${t.offset}s`;

        list.appendChild(div);
    });
}

/* =========================
   SYNC PLAYBACK ENGINE
========================= */
document.getElementById("play").onclick = () => {

    const audioContext = new AudioContext();
    const start = audioContext.currentTime;

    Object.keys(tracks).forEach(name => {

        tracks[name].forEach(t => {

            const audio = new Audio(t.url);

            const delay = Math.max(0, t.offset) * 1000;

            setTimeout(() => {
                audio.play();
            }, delay);

        });

    });

    console.log("SYNC PLAY (ALIGN CORE)");
};

/* INIT */
createTrack("voz");
createTrack("cavaquinho");

</script>

</body>
</html>
