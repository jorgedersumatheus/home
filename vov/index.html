<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>VOV Mixer Core</title>

<style>
body {
    margin: 0;
    background: #0a0a0a;
    color: white;
    font-family: Arial;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 20px;
}

#transport {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

button {
    padding: 10px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

#play { background: green; color: white; }
#stop { background: red; color: white; }
#reset { background: #444; color: white; }

.track {
    width: 360px;
    background: #111;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}

.controls {
    display: flex;
    gap: 5px;
    margin-top: 8px;
}

.mute, .solo {
    background: #333;
    color: white;
}

.active {
    background: yellow;
    color: black;
}
</style>
</head>

<body>

<div id="transport">
    <button id="play">PLAY</button>
    <button id="stop">STOP</button>
    <button id="reset">RESET</button>
</div>

<div id="tracks"></div>

<script>

let audioContext = new AudioContext();

let tracks = {
    voz: [],
    cavaquinho: []
};

let state = {
    playing: false,
    soloTrack: null
};

/* =========================
   CREATE TRACK UI
========================= */
function createTrack(name) {

    const container = document.createElement("div");
    container.className = "track";

    container.innerHTML = `
        <h3>${name}</h3>
        <button onclick="record('${name}')">REC</button>

        <div class="controls">
            <button onclick="toggleMute('${name}', this)">MUTE</button>
            <button onclick="toggleSolo('${name}')">SOLO</button>
        </div>
    `;

    document.getElementById("tracks").appendChild(container);
}

/* =========================
   RECORD
========================= */
async function record(name) {

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    const recorder = new MediaRecorder(stream);
    const chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);

    recorder.onstop = () => {

        const blob = new Blob(chunks, { type: "audio/webm" });
        const url = URL.createObjectURL(blob);

        tracks[name].push({
            url,
            muted: false
        });

        console.log("RECORDED:", name);
    };

    recorder.start();

    setTimeout(() => recorder.stop(), 5000); // gravação simples controlada
}

/* =========================
   PLAY ENGINE (CORE FIX)
========================= */
document.getElementById("play").onclick = () => {

    state.playing = true;

    Object.keys(tracks).forEach(name => {

        if (state.soloTrack && state.soloTrack !== name) return;

        tracks[name].forEach(t => {

            const audio = new Audio(t.url);

            if (t.muted) return;

            audio.play();
        });
    });
};

/* =========================
   STOP ALL (CRÍTICO)
========================= */
document.getElementById("stop").onclick = () => {
    state.playing = false;

    // força interrupção geral (simplificado)
    window.location.reload();
};

/* =========================
   RESET
========================= */
document.getElementById("reset").onclick = () => {
    tracks = { voz: [], cavaquinho: [] };
    window.location.reload();
};

/* =========================
   MUTE / SOLO
========================= */
function toggleMute(name, btn) {
    tracks[name].forEach(t => t.muted = !t.muted);
    btn.classList.toggle("active");
}

function toggleSolo(name) {
    state.soloTrack = state.soloTrack === name ? null : name;
}

/* INIT */
createTrack("voz");
createTrack("cavaquinho");

</script>

</body>
</html>
