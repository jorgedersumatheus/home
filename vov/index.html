<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>VOV Multi-Track Core</title>

<style>
body {
    margin: 0;
    background: #0a0a0a;
    color: white;
    font-family: Arial;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 40px;
}

h2 { opacity: 0.8; }

/* TRACK BLOCK */
.track {
    width: 320px;
    padding: 10px;
    margin: 10px;
    background: #111;
    border-radius: 10px;
}

button {
    margin: 5px;
    padding: 8px 12px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
}

/* REC */
.rec {
    background: #333;
    color: white;
}

.rec.active {
    background: red;
}

/* PLAY */
#play {
    margin-top: 20px;
    background: green;
    color: white;
}

/* STATUS */
#status {
    margin-top: 10px;
    opacity: 0.7;
}
</style>
</head>

<body>

<h2>VOV Multi-Track Core</h2>

<div class="track">
    <h3>Voz</h3>
    <button class="rec" id="rec1">REC</button>
</div>

<div class="track">
    <h3>Cavaquinho</h3>
    <button class="rec" id="rec2">REC</button>
</div>

<div class="track">
    <h3>Extra</h3>
    <button class="rec" id="rec3">REC</button>
</div>

<button id="play">PLAY ALL</button>
<div id="status">IDLE</div>

<script>
let audioContext = new AudioContext();

let tracks = {
    1: [],
    2: [],
    3: []
};

let mediaRecorders = {};
let streams = {};
let chunks = {};

function setupTrack(id, buttonId) {
    const btn = document.getElementById(buttonId);

    btn.onclick = async () => {

        if (!mediaRecorders[id]) {
            startRec(id, btn);
        } else {
            stopRec(id, btn);
        }
    };
}

/* =========================
   START REC
========================= */
async function startRec(id, btn) {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    streams[id] = stream;

    const recorder = new MediaRecorder(stream);

    chunks[id] = [];

    recorder.ondataavailable = e => chunks[id].push(e.data);

    recorder.onstop = () => {
        const blob = new Blob(chunks[id], { type: "audio/webm" });
        const url = URL.createObjectURL(blob);

        tracks[id].push(url);

        console.log("Track " + id + " recorded");
    };

    recorder.start();

    mediaRecorders[id] = recorder;

    btn.classList.add("active");
}

/* =========================
   STOP REC
========================= */
function stopRec(id, btn) {
    mediaRecorders[id].stop();

    streams[id].getTracks().forEach(t => t.stop());

    mediaRecorders[id] = null;

    btn.classList.remove("active");
}

/* =========================
   PLAY ALL (simples e funcional)
========================= */
document.getElementById("play").onclick = () => {

    document.getElementById("status").innerText = "PLAYING";

    Object.keys(tracks).forEach(id => {
        tracks[id].forEach(url => {
            const audio = new Audio(url);
            audio.play();
        });
    });
};

/* INIT */
setupTrack(1, "rec1");
setupTrack(2, "rec2");
setupTrack(3, "rec3");
</script>

</body>
</html>
