<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAW VOV</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🎧 DAW VOV</h1>

    <div class="transport">
        <button id="playBtn">▶</button>
        <button id="stopBtn">■</button>
        <button id="addTrackBtn">＋ Pista</button>
        <span id="timeDisplay">0.0</span>
    </div>
</header>

<main id="workspace">

    <aside id="mixer"></aside>

    <section id="timeline-container">

        <div id="timeline-ruler"></div>

        <div id="timeline">
            <div id="playhead"></div>
            <div id="tracks"></div>
        </div>

    </section>

</main>

<script src="app.js"></script>
</body>
</html>
