<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>VOV Precision Engine v1</title>

<style>
body{
    margin:0;
    background:#0a0a0a;
    color:white;
    font-family:Arial;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:20px;
}

.track{
    width:360px;
    background:#111;
    margin:10px;
    padding:10px;
    border-radius:10px;
}

button{
    padding:8px 12px;
    margin:4px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.rec.active{
    background:red;
    color:white;
}

.slider{
    width:100%;
}
</style>
</head>

<body>

<h2>VOV Precision Engine v1</h2>

<div id="tracks"></div>

<button id="play">PLAY SYNC</button>
<button id="stop">STOP</button>

<script>

const audioContext = new AudioContext();

const tracks = {
    voz: [],
    cavaquinho: []
};

const activeSources = [];

let mediaRecorders = {};
let streams = {};

/* =========================
   CREATE TRACKS
========================= */
function createTrack(name){

    const div = document.createElement("div");
    div.className = "track";

    div.innerHTML = `
        <h3>${name}</h3>

        <button class="rec" id="rec_${name}">REC</button>

        <div>OFFSET</div>
        <input type="range"
               min="-2"
               max="2"
               value="0"
               step="0.01"
               class="slider"
               id="offset_${name}">
    `;

    document.getElementById("tracks").appendChild(div);

    setupTrack(name);
}

/* =========================
   RECORD
========================= */
function setupTrack(name){

    const btn = document.getElementById("rec_" + name);
    const slider = document.getElementById("offset_" + name);

    let offset = 0;

    slider.oninput = e => {
        offset = parseFloat(e.target.value);
    };

    btn.onclick = async () => {

        if(!mediaRecorders[name]){

            const stream = await navigator.mediaDevices.getUserMedia({
                audio:true
            });

            streams[name] = stream;

            const recorder = new MediaRecorder(stream);

            const chunks = [];

            recorder.ondataavailable = e => {
                chunks.push(e.data);
            };

            recorder.onstop = async () => {

                const blob = new Blob(chunks);

                const arrayBuffer = await blob.arrayBuffer();

                const audioBuffer =
                    await audioContext.decodeAudioData(arrayBuffer);

                tracks[name].push({
                    buffer: audioBuffer,
                    offset
                });

                console.log("BUFFER READY", name);
            };

            recorder.start();

            mediaRecorders[name] = recorder;

            btn.classList.add("active");

        }else{

            mediaRecorders[name].stop();

            streams[name]
                .getTracks()
                .forEach(t => t.stop());

            mediaRecorders[name] = null;

            btn.classList.remove("active");
        }
    };
}

/* =========================
   PLAY SYNC
========================= */
document.getElementById("play").onclick = () => {

    const startAt = audioContext.currentTime + 0.2;

    Object.keys(tracks).forEach(name => {

        tracks[name].forEach(t => {

            const source =
                audioContext.createBufferSource();

            source.buffer = t.buffer;

            const gain =
                audioContext.createGain();

            source.connect(gain);
            gain.connect(audioContext.destination);

            source.start(
                startAt + t.offset
            );

            activeSources.push(source);
        });
    });

    console.log("PRECISION PLAY");
};

/* =========================
   STOP
========================= */
document.getElementById("stop").onclick = () => {

    activeSources.forEach(s => {
        try{
            s.stop();
        }catch(e){}
    });

    activeSources.length = 0;

    console.log("STOP ALL");
};

/* INIT */
createTrack("voz");
createTrack("cavaquinho");

</script>

</body>
</html>
