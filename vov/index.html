<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>VOV Memory Blocks v1</title>

<style>
body {
    margin: 0;
    background: #0a0a0a;
    color: white;
    font-family: Arial;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 30px;
}

h2 {
    opacity: 0.8;
}

/* TRACK AREA */
#tracks {
    width: 360px;
}

/* TRACK */
.track {
    background: #111;
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
}

/* REC BUTTON */
.rec {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #333;
    color: white;
}

.rec.active {
    background: red;
}

/* MEMORY BLOCK */
.memory {
    margin-top: 8px;
    padding: 8px;
    background: #222;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
}

.memory:hover {
    background: #333;
}

/* PLAY ALL */
#playAll {
    margin-top: 20px;
    padding: 10px 16px;
    background: green;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>VOV Memory Blocks</h2>

<div id="tracks"></div>

<button id="playAll">PLAY ALL</button>

<script>
let tracks = {
    voz: [],
    cavaquinho: [],
    extra: []
};

let mediaRecorders = {};
let streams = {};
let chunks = {};

/* =========================
   CREATE UI TRACKS
========================= */
function createTrack(name) {
    const container = document.createElement("div");
    container.className = "track";

    const title = document.createElement("div");
    title.innerText = name.toUpperCase();

    const btn = document.createElement("button");
    btn.className = "rec";
    btn.innerText = "REC";

    const memList = document.createElement("div");

    container.appendChild(title);
    container.appendChild(btn);
    container.appendChild(memList);

    document.getElementById("tracks").appendChild(container);

    setupRecorder(name, btn, memList);
}

/* =========================
   REC SYSTEM
========================= */
function setupRecorder(name, btn, memList) {

    btn.onclick = async () => {

        if (!mediaRecorders[name]) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

            streams[name] = stream;

            const recorder = new MediaRecorder(stream);

            chunks[name] = [];

            recorder.ondataavailable = e => chunks[name].push(e.data);

            recorder.onstop = () => {

                const blob = new Blob(chunks[name], { type: "audio/webm" });
                const url = URL.createObjectURL(blob);

                const memory = {
                    url,
                    time: new Date().toLocaleTimeString()
                };

                tracks[name].push(memory);

                renderMemories(name, memList);
            };

            recorder.start();

            mediaRecorders[name] = recorder;

            btn.classList.add("active");

        } else {
            mediaRecorders[name].stop();

            streams[name].getTracks().forEach(t => t.stop());

            mediaRecorders[name] = null;

            btn.classList.remove("active");
        }
    };
}

/* =========================
   RENDER MEMORIES
========================= */
function renderMemories(name, memList) {

    memList.innerHTML = "";

    tracks[name].forEach((m, index) => {

        const div = document.createElement("div");
        div.className = "memory";

        div.innerText = "MEM " + (index + 1) + " - " + m.time;

        div.onclick = () => {
            const audio = new Audio(m.url);
            audio.play();
        };

        memList.appendChild(div);
    });
}

/* =========================
   PLAY ALL (simples mix)
========================= */
document.getElementById("playAll").onclick = () => {

    Object.keys(tracks).forEach(track => {

        tracks[track].forEach(m => {
            const audio = new Audio(m.url);
            audio.play();
        });

    });
};

/* INIT TRACKS */
createTrack("voz");
createTrack("cavaquinho");
createTrack("extra");
</script>

</body>
</html>
