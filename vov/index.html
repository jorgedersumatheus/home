<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,initial-scale=1.0">

<title>VOV FLOW MEMORY v3</title>

<style>

body{
    margin:0;
    background:#0a0a0a;
    color:white;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

/* =====================================
TOPBAR
===================================== */

#topbar{
    height:60px;
    background:#111;
    border-bottom:1px solid #222;
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 12px;
    box-sizing:border-box;
}

button{
    border:none;
    border-radius:8px;
    background:#222;
    color:#fff;
    padding:10px 14px;
    font-weight:bold;
    cursor:pointer;
    font-size:14px;
}

#playBtn{
    background:green;
}

#stopBtn{
    background:#aa0000;
}

#addTrackBtn{
    background:#333;
}

.recActive{
    background:red !important;
}

.muteActive{
    background:#555 !important;
}

.soloActive{
    background:gold !important;
    color:black !important;
}

/* =====================================
TIMELINE
===================================== */

#timelineWrapper{
    width:100%;
    height:calc(100vh - 60px);
    overflow:auto;
    position:relative;
}

#timeline{
    position:relative;
    width:50000px;
    min-height:100%;
    background:#090909;
}

/* =====================================
GRID
===================================== */

.gridLine{
    position:absolute;
    top:0;
    width:1px;
    height:100%;
    background:#151515;
}

.gridText{
    position:absolute;
    top:0;
    color:#444;
    font-size:10px;
    padding-left:4px;
}

/* =====================================
TRACK
===================================== */

.track{
    position:relative;
    height:120px;
    border-bottom:1px solid #1d1d1d;
}

.trackHeader{
    position:absolute;
    left:0;
    top:0;
    width:180px;
    height:100%;
    background:#111;
    border-right:1px solid #222;
    padding:10px;
    box-sizing:border-box;
    z-index:100;
}

.trackTitle{
    margin-bottom:10px;
}

.trackButtons{
    display:flex;
    flex-wrap:wrap;
    gap:5px;
}

.trackLane{
    position:absolute;
    left:180px;
    top:0;
    right:0;
    height:100%;
}

/* =====================================
AUDIO BLOCK
===================================== */

.audioBlock{
    position:absolute;
    top:20px;
    height:80px;
    background:#181818;
    border:2px solid #333;
    border-radius:10px;
    overflow:hidden;
    cursor:grab;
    touch-action:none;
}

.audioBlock.selected{
    border-color:#00ff99;
}

/* =====================================
HANDLES
===================================== */

.handle{
    position:absolute;
    top:0;
    width:12px;
    height:100%;
    background:#00ff99;
    z-index:20;
}

.leftHandle{
    left:0;
    cursor:ew-resize;
}

.rightHandle{
    right:0;
    cursor:ew-resize;
}

/* =====================================
WAVEFORM
===================================== */

.waveCanvas{
    width:100%;
    height:100%;
    display:block;
}

/* =====================================
CURSOR
===================================== */

.takeCursor{
    position:absolute;
    top:0;
    left:0;
    width:2px;
    height:100%;
    background:#00ff99;
    pointer-events:none;
}

/* =====================================
PLAYHEAD
===================================== */

#playhead{
    position:absolute;
    top:0;
    left:180px;
    width:2px;
    height:100%;
    background:red;
    z-index:999;
}

/* =====================================
MENU
===================================== */

#menu{
    position:absolute;
    background:#111;
    border:1px solid #333;
    border-radius:8px;
    overflow:hidden;
    display:none;
    z-index:999999;
    min-width:180px;
}

.menuItem{
    padding:10px;
    border-bottom:1px solid #222;
    cursor:pointer;
}

.menuItem:hover{
    background:#222;
}

</style>
</head>

<body>

<!-- =====================================
TOPBAR
===================================== -->

<div id="topbar">

    <button id="addTrackBtn">
        TRACK
    </button>

    <button id="playBtn">
        PLAY
    </button>

    <button id="stopBtn">
        STOP
    </button>

</div>

<!-- =====================================
TIMELINE
===================================== -->

<div id="timelineWrapper">

    <div id="timeline">

        <div id="playhead"></div>

    </div>

</div>

<div id="menu"></div>

<script>

/* =====================================
AUDIO
===================================== */

const audioContext =
    new AudioContext();

const PIXELS_PER_SECOND = 120;

/* =====================================
DOM
===================================== */

const timeline =
    document.getElementById(
        "timeline"
    );

const timelineWrapper =
    document.getElementById(
        "timelineWrapper"
    );

const playhead =
    document.getElementById(
        "playhead"
    );

const menu =
    document.getElementById(
        "menu"
    );

/* =====================================
STATE
===================================== */

let tracks = [];

let trackCount = 0;

let selectedTake = null;

let playing = false;

let playStart = 0;

let activeSources = [];

/* =====================================
GRID
===================================== */

for(let i=0;i<300;i++){

    const line =
        document.createElement("div");

    line.className =
        "gridLine";

    line.style.left =
        (
            180 +
            i *
            PIXELS_PER_SECOND
        ) + "px";

    timeline.appendChild(line);

    const text =
        document.createElement("div");

    text.className =
        "gridText";

    text.style.left =
        (
            183 +
            i *
            PIXELS_PER_SECOND
        ) + "px";

    text.innerText =
        i + "s";

    timeline.appendChild(text);
}

/* =====================================
TRACK CREATE
===================================== */

document.getElementById(
    "addTrackBtn"
).onclick = () => {

    createTrack();
};

function createTrack(){

    trackCount++;

    const track = {

        id:trackCount,

        takes:[],

        recorder:null,

        stream:null,

        muted:false,

        solo:false
    };

    tracks.push(track);

    renderTrack(track);
}

/* =====================================
TRACK RENDER
===================================== */

function renderTrack(track){

    const div =
        document.createElement("div");

    div.className =
        "track";

    div.id =
        "track_" + track.id;

    div.innerHTML = `

        <div class="trackHeader">

            <div class="trackTitle">
                TRACK ${track.id}
            </div>

            <div class="trackButtons">

                <button id="rec_${track.id}">
                    REC
                </button>

                <button id="mute_${track.id}">
                    M
                </button>

                <button id="solo_${track.id}">
                    S
                </button>

            </div>

        </div>

        <div class="trackLane"
             id="lane_${track.id}">
        </div>

    `;

    timeline.appendChild(div);

    bindTrack(track);
}

/* =====================================
TRACK BIND
===================================== */

function bindTrack(track){

    const recBtn =
        document.getElementById(
            "rec_" + track.id
        );

    const muteBtn =
        document.getElementById(
            "mute_" + track.id
        );

    const soloBtn =
        document.getElementById(
            "solo_" + track.id
        );

    /* =====================================
    REC
    ===================================== */

    recBtn.onclick = async () => {

        if(!track.recorder){

            const stream =
                await navigator
                .mediaDevices
                .getUserMedia({
                    audio:true
                });

            track.stream =
                stream;

            const recorder =
                new MediaRecorder(
                    stream
                );

            const chunks = [];

            recorder.ondataavailable =
                e => {
                    chunks.push(e.data);
                };

            recorder.onstop = async () => {

                const blob =
                    new Blob(chunks);

                const arrayBuffer =
                    await blob.arrayBuffer();

                const audioBuffer =
                    await audioContext
                    .decodeAudioData(
                        arrayBuffer
                    );

                const take = {

                    id:Date.now(),

                    buffer:audioBuffer,

                    startOffset:0,

                    endOffset:
                        audioBuffer.duration,

                    timelinePosition:0,

                    source:null,

                    cursor:null,

                    playing:false
                };

                track.takes.push(
                    take
                );

                renderTake(
                    track,
                    take
                );
            };

            recorder.start();

            track.recorder =
                recorder;

            recBtn.classList.add(
                "recActive"
            );

        }else{

            track.recorder.stop();

            track.stream
                .getTracks()
                .forEach(t => t.stop());

            track.recorder = null;

            recBtn.classList.remove(
                "recActive"
            );
        }
    };

    /* =====================================
    MUTE
    ===================================== */

    muteBtn.onclick = () => {

        track.muted =
            !track.muted;

        muteBtn.classList.toggle(
            "muteActive"
        );
    };

    /* =====================================
    SOLO
    ===================================== */

    soloBtn.onclick = () => {

        track.solo =
            !track.solo;

        soloBtn.classList.toggle(
            "soloActive"
        );
    };
}

/* =====================================
RENDER TAKE
===================================== */

function renderTake(track,take){

    const lane =
        document.getElementById(
            "lane_" + track.id
        );

    const block =
        document.createElement("div");

    block.className =
        "audioBlock";

    updateTakeVisual(
        block,
        take
    );

    /* =====================================
    HANDLES
    ===================================== */

    const leftHandle =
        document.createElement("div");

    leftHandle.className =
        "handle leftHandle";

    const rightHandle =
        document.createElement("div");

    rightHandle.className =
        "handle rightHandle";

    block.appendChild(leftHandle);
    block.appendChild(rightHandle);

    /* =====================================
    WAVEFORM
    ===================================== */

    const canvas =
        document.createElement("canvas");

    canvas.className =
        "waveCanvas";

    block.appendChild(canvas);

    renderWaveform(
        canvas,
        take
    );

    /* =====================================
    CURSOR
    ===================================== */

    const cursor =
        document.createElement("div");

    cursor.className =
        "takeCursor";

    block.appendChild(cursor);

    take.cursor =
        cursor;

    lane.appendChild(block);

    /* =====================================
    SELECT
    ===================================== */

    block.addEventListener(
        "pointerdown",
        e => {

            if(
                e.target === leftHandle ||
                e.target === rightHandle
            ) return;

            document
                .querySelectorAll(
                    ".audioBlock"
                )
                .forEach(b => {
                    b.classList.remove(
                        "selected"
                    );
                });

            block.classList.add(
                "selected"
            );

            selectedTake =
                take;
        }
    );

    /* =====================================
    MOVE
    ===================================== */

    let dragging = false;

    let startPointerX = 0;

    let startTimelinePosition = 0;

    block.addEventListener(
        "pointerdown",
        e => {

            if(
                e.target === leftHandle ||
                e.target === rightHandle
            ) return;

            dragging = true;

            block.setPointerCapture(
                e.pointerId
            );

            startPointerX =
                e.clientX;

            startTimelinePosition =
                take.timelinePosition;
        }
    );

    block.addEventListener(
        "pointermove",
        e => {

            if(!dragging)
                return;

            const deltaX =
                e.clientX -
                startPointerX;

            let newPosition =
                startTimelinePosition +
                (
                    deltaX /
                    PIXELS_PER_SECOND
                );

            if(newPosition < 0)
                newPosition = 0;

            take.timelinePosition =
                newPosition;

            updateTakeVisual(
                block,
                take
            );
        }
    );

    block.addEventListener(
        "pointerup",
        () => {

            dragging = false;
        }
    );

    /* =====================================
    LEFT TRIM
    ===================================== */

    let trimLeft = false;

    leftHandle.addEventListener(
        "pointerdown",
        e => {

            e.stopPropagation();

            trimLeft = true;

            leftHandle.setPointerCapture(
                e.pointerId
            );
        }
    );

    leftHandle.addEventListener(
        "pointermove",
        e => {

            if(!trimLeft)
                return;

            const delta =
                e.movementX /
                PIXELS_PER_SECOND;

            take.startOffset +=
                delta;

            if(take.startOffset < 0)
                take.startOffset = 0;

            if(
                take.startOffset >
                take.endOffset - 0.2
            ){
                take.startOffset =
                take.endOffset - 0.2;
            }

            updateTakeVisual(
                block,
                take
            );

            renderWaveform(
                canvas,
                take
            );
        }
    );

    leftHandle.addEventListener(
        "pointerup",
        () => {

            trimLeft = false;
        }
    );

    /* =====================================
    RIGHT TRIM
    ===================================== */

    let trimRight = false;

    rightHandle.addEventListener(
        "pointerdown",
        e => {

            e.stopPropagation();

            trimRight = true;

            rightHandle.setPointerCapture(
                e.pointerId
            );
        }
    );

    rightHandle.addEventListener(
        "pointermove",
        e => {

            if(!trimRight)
                return;

            const delta =
                e.movementX /
                PIXELS_PER_SECOND;

            take.endOffset +=
                delta;

            if(
                take.endOffset >
                take.buffer.duration
            ){
                take.endOffset =
                take.buffer.duration;
            }

            if(
                take.endOffset <
                take.startOffset + 0.2
            ){
                take.endOffset =
                take.startOffset + 0.2;
            }

            updateTakeVisual(
                block,
                take
            );

            renderWaveform(
                canvas,
                take
            );
        }
    );

    rightHandle.addEventListener(
        "pointerup",
        () => {

            trimRight = false;
        }
    );

    /* =====================================
    MENU
    ===================================== */

    block.oncontextmenu = e => {

        e.preventDefault();

        openMenu(
            e.clientX,
            e.clientY,
            track,
            take,
            block
        );
    };
}

/* =====================================
VISUAL
===================================== */

function updateTakeVisual(
    block,
    take
){

    const duration =
        take.endOffset -
        take.startOffset;

    block.style.left =
        (
            take.timelinePosition *
            PIXELS_PER_SECOND
        ) + "px";

    block.style.width =
        (
            duration *
            PIXELS_PER_SECOND
        ) + "px";
}

/* =====================================
WAVEFORM
===================================== */

function renderWaveform(
    canvas,
    take
){

    const duration =
        take.endOffset -
        take.startOffset;

    canvas.width =
        duration *
        PIXELS_PER_SECOND;

    canvas.height =
        80;

    const ctx =
        canvas.getContext("2d");

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.fillStyle =
        "#181818";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.strokeStyle =
        "#00ff99";

    ctx.beginPath();

    const data =
        take.buffer.getChannelData(0);

    const startSample =
        Math.floor(
            take.startOffset *
            take.buffer.sampleRate
        );

    const endSample =
        Math.floor(
            take.endOffset *
            take.buffer.sampleRate
        );

    const samples =
        data.slice(
            startSample,
            endSample
        );

    const step =
        Math.ceil(
            samples.length /
            canvas.width
        );

    const amp =
        canvas.height / 2;

    for(let i=0;i<canvas.width;i++){

        let min = 1;
        let max = -1;

        for(let j=0;j<step;j++){

            const datum =
                samples[
                    (i*step)+j
                ] || 0;

            if(datum < min)
                min = datum;

            if(datum > max)
                max = datum;
        }

        ctx.moveTo(
            i,
            (1+min)*amp
        );

        ctx.lineTo(
            i,
            (1+max)*amp
        );
    }

    ctx.stroke();
}

/* =====================================
PLAYBACK
===================================== */

document.getElementById(
    "playBtn"
).onclick = () => {

    stopAll();

    const now =
        audioContext.currentTime;

    playStart =
        now;

    playing = true;

    const soloTracks =
        tracks.filter(
            t => t.solo
        );

    const hasSolo =
        soloTracks.length > 0;

    tracks.forEach(track => {

        if(hasSolo && !track.solo)
            return;

        if(track.muted)
            return;

        track.takes.forEach(take => {

            const source =
                audioContext
                .createBufferSource();

            source.buffer =
                take.buffer;

            source.connect(
                audioContext.destination
            );

            const duration =
                take.endOffset -
                take.startOffset;

            source.start(

                now +
                take.timelinePosition,

                take.startOffset,

                duration
            );

            take.source =
                source;

            take.playing =
                true;

            animateCursor(
                take
            );

            activeSources.push(
                source
            );
        });
    });

    animateTimeline();
};

/* =====================================
STOP
===================================== */

function stopAll(){

    activeSources.forEach(s => {

        try{
            s.stop();
        }catch(e){}
    });

    activeSources = [];

    playing = false;

    playhead.style.left =
        "180px";

    tracks.forEach(track => {

        track.takes.forEach(take => {

            take.playing = false;

            if(take.cursor){

                take.cursor.style.left =
                    "0px";
            }
        });
    });
}

document.getElementById(
    "stopBtn"
).onclick = stopAll;

/* =====================================
CURSOR
===================================== */

function animateCursor(take){

    const duration =
        take.endOffset -
        take.startOffset;

    const start =
        audioContext.currentTime;

    function loop(){

        if(!take.playing)
            return;

        const elapsed =
            audioContext.currentTime -
            start;

        const progress =
            elapsed / duration;

        take.cursor.style.left =
            (
                progress *
                (
                    duration *
                    PIXELS_PER_SECOND
                )
            ) + "px";

        if(progress >= 1){

            take.playing =
                false;

            take.cursor.style.left =
                "0px";

            return;
        }

        requestAnimationFrame(
            loop
        );
    }

    loop();
}

/* =====================================
PLAYHEAD
===================================== */

function animateTimeline(){

    function loop(){

        if(!playing)
            return;

        const elapsed =
            audioContext.currentTime -
            playStart;

        const x =
            elapsed *
            PIXELS_PER_SECOND;

        playhead.style.left =
            (
                180 + x
            ) + "px";

        timelineWrapper.scrollLeft =
            Math.max(
                0,
                x - 300
            );

        requestAnimationFrame(
            loop
        );
    }

    loop();
}

/* =====================================
MENU
===================================== */

function openMenu(
    x,
    y,
    track,
    take,
    block
){

    menu.innerHTML = "";

    menu.style.display =
        "block";

    menu.style.left =
        x + "px";

    menu.style.top =
        y + "px";

    const actions = [

        {
            label:"PLAY TAKE",
            action:() => {

                playSingleTake(
                    take
                );
            }
        },

        {
            label:"DELETE TAKE",
            action:() => {

                block.remove();

                track.takes =
                    track.takes.filter(
                        t => t.id !== take.id
                    );
            }
        }

    ];

    actions.forEach(item => {

        const div =
            document.createElement("div");

        div.className =
            "menuItem";

        div.innerText =
            item.label;

        div.onclick = () => {

            item.action();

            menu.style.display =
                "none";
        };

        menu.appendChild(div);
    });
}

/* =====================================
PLAY SINGLE
===================================== */

function playSingleTake(take){

    const source =
        audioContext
        .createBufferSource();

    source.buffer =
        take.buffer;

    source.connect(
        audioContext.destination
    );

    const duration =
        take.endOffset -
        take.startOffset;

    source.start(
        0,
        take.startOffset,
        duration
    );
}

/* =====================================
INIT
===================================== */

createTrack();

</script>

</body>
</html>
