<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>VOV Monitor Core v1</title>

<style>

body{
    margin:0;
    background:#0a0a0a;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
}

h1{
    font-size:22px;
    opacity:0.9;
    margin-bottom:20px;
}

#topbar{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

button{
    border:none;
    border-radius:8px;
    padding:10px 14px;
    cursor:pointer;
    font-weight:bold;
}

#addTrack{
    background:#1f1f1f;
    color:white;
}

#playAll{
    background:green;
    color:white;
}

#stopAll{
    background:#aa0000;
    color:white;
}

.track{
    width:380px;
    background:#111;
    border-radius:12px;
    padding:12px;
    margin-bottom:14px;
    box-sizing:border-box;
}

.trackTitle{
    font-size:14px;
    opacity:0.8;
    margin-bottom:10px;
}

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:10px;
}

.rec.active{
    background:red;
    color:white;
}

.monitor.active{
    background:#ffd000;
    color:black;
}

.mute.active{
    background:#666;
    color:white;
}

.solo.active{
    background:#00aaff;
    color:white;
}

.sliderWrap{
    margin-top:10px;
}

.sliderWrap label{
    font-size:12px;
    opacity:0.7;
}

.slider{
    width:100%;
}

.memories{
    margin-top:10px;
    font-size:11px;
    opacity:0.8;
}

.memoryItem{
    padding:5px;
    background:#1b1b1b;
    border-radius:6px;
    margin-top:4px;
}

</style>
</head>

<body>

<h1>VOV Monitor Core v1</h1>

<div id="topbar">
    <button id="addTrack">ADD TRACK</button>
    <button id="playAll">PLAY</button>
    <button id="stopAll">STOP</button>
</div>

<div id="tracks"></div>

<script>

const audioContext = new AudioContext();

const tracks = [];

const activeSources = [];

let trackCount = 0;

/* =========================================
   ADD TRACK
========================================= */

document.getElementById("addTrack").onclick = () => {
    createTrack();
};

function createTrack(){

    trackCount++;

    const track = {
        id: trackCount,
        takes: [],
        offset: 0,
        muted: false,
        solo: false,
        monitor: true,
        recorder: null,
        stream: null
    };

    tracks.push(track);

    renderTrack(track);
}

/* =========================================
   RENDER TRACK
========================================= */

function renderTrack(track){

    const div = document.createElement("div");
    div.className = "track";
    div.id = "track_" + track.id;

    div.innerHTML = `

        <div class="trackTitle">
            TRACK ${track.id}
        </div>

        <div class="controls">

            <button class="rec"
                    id="rec_${track.id}">
                    REC
            </button>

            <button class="monitor active"
                    id="monitor_${track.id}">
                    MONITOR
            </button>

            <button class="mute"
                    id="mute_${track.id}">
                    MUTE
            </button>

            <button class="solo"
                    id="solo_${track.id}">
                    SOLO
            </button>

        </div>

        <div class="sliderWrap">
            <label>OFFSET</label>

            <input type="range"
                   min="-2"
                   max="2"
                   value="0"
                   step="0.01"
                   class="slider"
                   id="offset_${track.id}">
        </div>

        <div class="memories"
             id="memories_${track.id}">
        </div>

    `;

    document.getElementById("tracks").appendChild(div);

    bindTrack(track);
}

/* =========================================
   BIND TRACK
========================================= */

function bindTrack(track){

    const recBtn =
        document.getElementById("rec_" + track.id);

    const muteBtn =
        document.getElementById("mute_" + track.id);

    const soloBtn =
        document.getElementById("solo_" + track.id);

    const monitorBtn =
        document.getElementById("monitor_" + track.id);

    const offsetSlider =
        document.getElementById("offset_" + track.id);

    /* =========================
       OFFSET
    ========================= */

    offsetSlider.oninput = e => {
        track.offset = parseFloat(e.target.value);
    };

    /* =========================
       MUTE
    ========================= */

    muteBtn.onclick = () => {

        track.muted = !track.muted;

        muteBtn.classList.toggle("active");
    };

    /* =========================
       SOLO
    ========================= */

    soloBtn.onclick = () => {

        track.solo = !track.solo;

        soloBtn.classList.toggle("active");
    };

    /* =========================
       MONITOR
    ========================= */

    monitorBtn.onclick = () => {

        track.monitor = !track.monitor;

        monitorBtn.classList.toggle("active");
    };

    /* =========================
       RECORD
    ========================= */

    recBtn.onclick = async () => {

        if(!track.recorder){

            const stream =
                await navigator.mediaDevices
                .getUserMedia({
                    audio:true
                });

            track.stream = stream;

            const recorder =
                new MediaRecorder(stream);

            const chunks = [];

            recorder.ondataavailable = e => {
                chunks.push(e.data);
            };

            recorder.onstop = async () => {

                const blob =
                    new Blob(chunks);

                const arrayBuffer =
                    await blob.arrayBuffer();

                const audioBuffer =
                    await audioContext
                    .decodeAudioData(arrayBuffer);

                track.takes.push({
                    buffer: audioBuffer,
                    offset: track.offset
                });

                renderMemories(track);
            };

            recorder.start();

            track.recorder = recorder;

            recBtn.classList.add("active");

            /* =========================
               MONITOR PLAYBACK
            ========================= */

            if(track.monitor){

                playSessionForMonitor(track.id);
            }

        }else{

            track.recorder.stop();

            track.stream
                .getTracks()
                .forEach(t => t.stop());

            track.recorder = null;

            recBtn.classList.remove("active");

            stopAllSources();
        }
    };
}

/* =========================================
   MEMORY UI
========================================= */

function renderMemories(track){

    const div =
        document.getElementById(
            "memories_" + track.id
        );

    div.innerHTML = "";

    track.takes.forEach((take, index) => {

        const mem =
            document.createElement("div");

        mem.className = "memoryItem";

        mem.innerText =
            "TAKE " + (index + 1);

        div.appendChild(mem);
    });
}

/* =========================================
   PLAY SESSION
========================================= */

document.getElementById("playAll")
.onclick = () => {

    stopAllSources();

    const startAt =
        audioContext.currentTime + 0.1;

    const soloTracks =
        tracks.filter(t => t.solo);

    const usingSolo =
        soloTracks.length > 0;

    tracks.forEach(track => {

        if(track.muted) return;

        if(usingSolo && !track.solo) return;

        track.takes.forEach(take => {

            const source =
                audioContext
                .createBufferSource();

            source.buffer =
                take.buffer;

            const gain =
                audioContext
                .createGain();

            source.connect(gain);

            gain.connect(
                audioContext.destination
            );

            source.start(
                startAt + take.offset
            );

            activeSources.push(source);
        });
    });
};

/* =========================================
   MONITOR PLAYBACK
========================================= */

function playSessionForMonitor(recordingTrackId){

    const startAt =
        audioContext.currentTime + 0.05;

    const soloTracks =
        tracks.filter(t => t.solo);

    const usingSolo =
        soloTracks.length > 0;

    tracks.forEach(track => {

        if(track.id === recordingTrackId)
            return;

        if(track.muted) return;

        if(usingSolo && !track.solo)
            return;

        track.takes.forEach(take => {

            const source =
                audioContext
                .createBufferSource();

            source.buffer =
                take.buffer;

            const gain =
                audioContext
                .createGain();

            source.connect(gain);

            gain.connect(
                audioContext.destination
            );

            source.start(
                startAt + take.offset
            );

            activeSources.push(source);
        });
    });
}

/* =========================================
   STOP ALL
========================================= */

document.getElementById("stopAll")
.onclick = () => {
    stopAllSources();
};

function stopAllSources(){

    activeSources.forEach(source => {

        try{
            source.stop();
        }catch(e){}

    });

    activeSources.length = 0;
}

/* =========================================
   INIT
========================================= */

createTrack();

</script>

</body>
</html>
