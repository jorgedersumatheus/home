Split + drag real + trim + edição
========================================================

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>VOV Edit Core v2</title>

<style>

body{
    margin:0;
    background:#080808;
    color:white;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

/* =========================================
TOPBAR
========================================= */

#topbar{
    height:60px;
    background:#111;
    border-bottom:1px solid #222;
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 15px;
    box-sizing:border-box;
}

button{
    border:none;
    border-radius:8px;
    padding:10px 14px;
    cursor:pointer;
    font-weight:bold;
}

#addTrack{
    background:#1f1f1f;
    color:white;
}

#playAll{
    background:green;
    color:white;
}

#stopAll{
    background:#aa0000;
    color:white;
}

#exportAll{
    background:#004cff;
    color:white;
}

/* =========================================
TIMELINE
========================================= */

#timelineWrapper{
    position:relative;
    width:100%;
    height:calc(100vh - 60px);
    overflow:auto;
}

#timeline{
    position:relative;
    width:50000px;
    height:100%;
}

/* =========================================
GRID
========================================= */

.gridLine{
    position:absolute;
    top:0;
    width:1px;
    height:100%;
    background:#161616;
}

.gridLabel{
    position:absolute;
    top:0;
    font-size:10px;
    color:#444;
    padding-left:3px;
}

/* =========================================
TRACK
========================================= */

.track{
    position:relative;
    height:120px;
    border-bottom:1px solid #1b1b1b;
}

.trackHeader{
    position:absolute;
    left:0;
    top:0;
    width:180px;
    height:100%;
    background:#111;
    border-right:1px solid #222;
    padding:10px;
    box-sizing:border-box;
    z-index:50;
}

.trackTitle{
    font-size:13px;
    opacity:0.8;
    margin-bottom:10px;
}

.trackControls{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
}

.trackLane{
    position:absolute;
    left:180px;
    right:0;
    top:0;
    height:100%;
}

/* =========================================
TAKE
========================================= */

.audioBlock{
    position:absolute;
    top:20px;
    height:80px;
    background:#181818;
    border:1px solid #444;
    border-radius:10px;
    overflow:hidden;
    user-select:none;
}

.audioBlock.selected{
    border:2px solid #00ff99;
}

/* =========================================
WAVE
========================================= */

.waveCanvas{
    width:100%;
    height:100%;
    display:block;
}

/* =========================================
CURSOR
========================================= */

.takeCursor{
    position:absolute;
    top:0;
    left:0;
    width:2px;
    height:100%;
    background:#00ff99;
    pointer-events:none;
}

/* =========================================
PLAYHEAD
========================================= */

#playhead{
    position:absolute;
    top:0;
    left:180px;
    width:2px;
    height:100%;
    background:red;
    z-index:999;
}

/* =========================================
MENU
========================================= */

#menu{
    position:absolute;
    background:#111;
    border:1px solid #333;
    border-radius:8px;
    overflow:hidden;
    display:none;
    z-index:999999;
    min-width:180px;
}

.menuItem{
    padding:10px;
    border-bottom:1px solid #222;
    cursor:pointer;
}

.menuItem:hover{
    background:#222;
}

.recActive{
    background:red !important;
    color:white;
}

</style>
</head>

<body>

<div id="topbar">

    <button id="addTrack">
        ADD TRACK
    </button>

    <button id="playAll">
        PLAY
    </button>

    <button id="stopAll">
        STOP
    </button>

    <button id="exportAll">
        EXPORT
    </button>

</div>

<div id="timelineWrapper">

    <div id="timeline">

        <div id="playhead"></div>

    </div>

</div>

<div id="menu"></div>

<script>

/* =========================================
AUDIO
========================================= */

const audioContext =
    new AudioContext();

const timeline =
    document.getElementById(
        "timeline"
    );

const timelineWrapper =
    document.getElementById(
        "timelineWrapper"
    );

const playhead =
    document.getElementById(
        "playhead"
    );

const menu =
    document.getElementById(
        "menu"
    );

const PIXELS_PER_SECOND = 120;

let tracks = [];

let trackCount = 0;

let activeSources = [];

let playing = false;

let playStart = 0;

/* =========================================
GRID
========================================= */

for(let i=0;i<300;i++){

    const line =
        document.createElement("div");

    line.className = "gridLine";

    line.style.left =
        (180 + i * PIXELS_PER_SECOND)
        + "px";

    const label =
        document.createElement("div");

    label.className = "gridLabel";

    label.style.left =
        (183 + i * PIXELS_PER_SECOND)
        + "px";

    label.innerText = i + "s";

    timeline.appendChild(line);
    timeline.appendChild(label);
}

/* =========================================
TRACK
========================================= */

document.getElementById("addTrack")
.onclick = () => {

    createTrack();
};

function createTrack(){

    trackCount++;

    const track = {

        id:trackCount,

        takes:[],

        recorder:null,

        stream:null
    };

    tracks.push(track);

    renderTrack(track);
}

function renderTrack(track){

    const div =
        document.createElement("div");

    div.className = "track";

    div.id = "track_" + track.id;

    div.innerHTML = `

        <div class="trackHeader">

            <div class="trackTitle">
                TRACK ${track.id}
            </div>

            <div class="trackControls">

                <button id="rec_${track.id}">
                    REC
                </button>

                <button id="del_${track.id}">
                    DEL
                </button>

            </div>

        </div>

        <div class="trackLane"
             id="lane_${track.id}">
        </div>

    `;

    timeline.appendChild(div);

    bindTrack(track);
}

/* =========================================
BIND
========================================= */

function bindTrack(track){

    const recBtn =
        document.getElementById(
            "rec_" + track.id
        );

    const delBtn =
        document.getElementById(
            "del_" + track.id
        );

    /* =========================
    REC
    ========================= */

    recBtn.onclick = async () => {

        if(!track.recorder){

            const stream =
                await navigator
                .mediaDevices
                .getUserMedia({
                    audio:true
                });

            track.stream = stream;

            const recorder =
                new MediaRecorder(stream);

            const chunks = [];

            recorder.ondataavailable =
                e => chunks.push(e.data);

            recorder.onstop = async () => {

                const blob =
                    new Blob(chunks);

                const arrayBuffer =
                    await blob.arrayBuffer();

                const audioBuffer =
                    await audioContext
                    .decodeAudioData(arrayBuffer);

                const take = {

                    id:Date.now(),

                    buffer:audioBuffer,

                    position:0,

                    width:
                        audioBuffer.duration *
                        PIXELS_PER_SECOND,

                    source:null,

                    cursor:null,

                    playing:false
                };

                track.takes.push(take);

                renderTake(track, take);
            };

            recorder.start();

            track.recorder = recorder;

            recBtn.classList.add(
                "recActive"
            );

        }else{

            track.recorder.stop();

            track.stream
                .getTracks()
                .forEach(t => t.stop());

            track.recorder = null;

            recBtn.classList.remove(
                "recActive"
            );
        }
    };

    /* =========================
    DELETE TRACK
    ========================= */

    delBtn.onclick = () => {

        document
            .getElementById(
                "track_" + track.id
            )
            .remove();

        tracks =
            tracks.filter(
                t => t.id !== track.id
            );
    };
}

/* =========================================
RENDER TAKE
========================================= */

function renderTake(track, take){

    const lane =
        document.getElementById(
            "lane_" + track.id
        );

    const block =
        document.createElement("div");

    block.className = "audioBlock";

    block.style.left =
        take.position + "px";

    block.style.width =
        take.width + "px";

    /* =========================
    CANVAS
    ========================= */

    const canvas =
        document.createElement("canvas");

    canvas.className = "waveCanvas";

    canvas.width = take.width;

    canvas.height = 80;

    block.appendChild(canvas);

    drawWaveform(canvas, take.buffer);

    /* =========================
    CURSOR
    ========================= */

    const cursor =
        document.createElement("div");

    cursor.className = "takeCursor";

    block.appendChild(cursor);

    take.cursor = cursor;

    lane.appendChild(block);

    /* =========================
    SELECT
    ========================= */

    block.onclick = e => {

        e.stopPropagation();

        document
            .querySelectorAll(".audioBlock")
            .forEach(b => {
                b.classList.remove(
                    "selected"
                );
            });

        block.classList.add(
            "selected"
        );
    };

    /* =========================
    MENU
    ========================= */

    block.oncontextmenu = e => {

        e.preventDefault();

        openMenu(
            e.clientX,
            e.clientY,
            track,
            take,
            block
        );
    };

    /* =========================
    DRAG REAL
    ========================= */

    let dragging = false;

    let offsetX = 0;

    block.addEventListener(
        "mousedown",
        e => {

            if(e.button !== 0)
                return;

            dragging = true;

            offsetX =
                e.clientX -
                block.offsetLeft;
        }
    );

    document.addEventListener(
        "mousemove",
        e => {

            if(!dragging)
                return;

            let x =
                e.clientX -
                offsetX;

            if(x < 0)
                x = 0;

            /* SNAP */

            x =
                Math.round(
                    x / 10
                ) * 10;

            take.position = x;

            block.style.left =
                x + "px";
        }
    );

    document.addEventListener(
        "mouseup",
        () => {

            dragging = false;
        }
    );
}

/* =========================================
MENU
========================================= */

function openMenu(
    x,
    y,
    track,
    take,
    block
){

    menu.innerHTML = "";

    menu.style.display = "block";

    menu.style.left = x + "px";

    menu.style.top = y + "px";

    const actions = [

        {
            label:"PLAY TAKE",
            action:() => {
                playTake(take);
            }
        },

        {
            label:"STOP TAKE",
            action:() => {
                stopTake(take);
            }
        },

        {
            label:"CUT TAKE",
            action:() => {
                splitTake(
                    track,
                    take,
                    block
                );
            }
        },

        {
            label:"EXPORT TAKE",
            action:() => {
                exportTake(take);
            }
        },

        {
            label:"DELETE",
            action:() => {

                block.remove();

                track.takes =
                    track.takes.filter(
                        t => t.id !== take.id
                    );
            }
        }

    ];

    actions.forEach(item => {

        const div =
            document.createElement("div");

        div.className = "menuItem";

        div.innerText = item.label;

        div.onclick = () => {

            item.action();

            menu.style.display = "none";
        };

        menu.appendChild(div);
    });
}

/* =========================================
CUT / SPLIT
========================================= */

function splitTake(
    track,
    take,
    block
){

    const splitTime =
        take.buffer.duration / 2;

    const sampleRate =
        take.buffer.sampleRate;

    const splitIndex =
        Math.floor(
            splitTime *
            sampleRate
        );

    const ch0 =
        take.buffer.getChannelData(0);

    const first =
        audioContext.createBuffer(
            1,
            splitIndex,
            sampleRate
        );

    const second =
        audioContext.createBuffer(
            1,
            ch0.length - splitIndex,
            sampleRate
        );

    first
        .getChannelData(0)
        .set(
            ch0.slice(0, splitIndex)
        );

    second
        .getChannelData(0)
        .set(
            ch0.slice(splitIndex)
        );

    const takeA = {

        id:Date.now(),

        buffer:first,

        position:take.position,

        width:
            first.duration *
            PIXELS_PER_SECOND
    };

    const takeB = {

        id:Date.now()+1,

        buffer:second,

        position:
            take.position +
            takeA.width,

        width:
            second.duration *
            PIXELS_PER_SECOND
    };

    block.remove();

    track.takes =
        track.takes.filter(
            t => t.id !== take.id
        );

    track.takes.push(takeA);
    track.takes.push(takeB);

    renderTake(track, takeA);
    renderTake(track, takeB);
}

/* =========================================
PLAY TAKE
========================================= */

function playTake(take){

    stopTake(take);

    const source =
        audioContext
        .createBufferSource();

    source.buffer =
        take.buffer;

    source.connect(
        audioContext.destination
    );

    source.start();

    take.source = source;

    take.playing = true;

    animateTakeCursor(take);
}

/* =========================================
STOP TAKE
========================================= */

function stopTake(take){

    if(take.source){

        try{
            take.source.stop();
        }catch(e){}
    }

    take.playing = false;

    if(take.cursor){

        take.cursor.style.left =
            "0px";
    }
}

/* =========================================
TAKE CURSOR
========================================= */

function animateTakeCursor(take){

    const start =
        audioContext.currentTime;

    function loop(){

        if(!take.playing)
            return;

        const elapsed =
            audioContext.currentTime -
            start;

        const progress =
            elapsed /
            take.buffer.duration;

        take.cursor.style.left =
            (progress * take.width)
            + "px";

        if(progress >= 1){

            take.playing = false;

            take.cursor.style.left =
                "0px";

            return;
        }

        requestAnimationFrame(loop);
    }

    loop();
}

/* =========================================
WAVEFORM
========================================= */

function drawWaveform(
    canvas,
    buffer
){

    const ctx =
        canvas.getContext("2d");

    const data =
        buffer.getChannelData(0);

    const step =
        Math.ceil(
            data.length /
            canvas.width
        );

    const amp =
        canvas.height / 2;

    ctx.fillStyle = "#181818";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.beginPath();

    ctx.strokeStyle = "#00ff99";

    for(let i=0;i<canvas.width;i++){

        let min = 1.0;
        let max = -1.0;

        for(let j=0;j<step;j++){

            const datum =
                data[(i*step)+j];

            if(datum < min)
                min = datum;

            if(datum > max)
                max = datum;
        }

        ctx.moveTo(
            i,
            (1 + min) * amp
        );

        ctx.lineTo(
            i,
            (1 + max) * amp
        );
    }

    ctx.stroke();
}

/* =========================================
PLAY ALL
========================================= */

document.getElementById("playAll")
.onclick = () => {

    stopAll();

    const now =
        audioContext.currentTime;

    playStart = now;

    playing = true;

    tracks.forEach(track => {

        track.takes.forEach(take => {

            const source =
                audioContext
                .createBufferSource();

            source.buffer =
                take.buffer;

            source.connect(
                audioContext.destination
            );

            source.start(
                now +
                take.position /
                PIXELS_PER_SECOND
            );

            take.source = source;

            take.playing = true;

            animateTakeCursor(take);

            activeSources.push(source);
        });
    });

    animateTimeline();
};

/* =========================================
TIMELINE
========================================= */

function animateTimeline(){

    function loop(){

        if(!playing)
            return;

        const elapsed =
            audioContext.currentTime -
            playStart;

        const x =
            elapsed *
            PIXELS_PER_SECOND;

        playhead.style.left =
            (180 + x) + "px";

        timelineWrapper.scrollLeft =
            Math.max(
                0,
                x - 300
            );

        requestAnimationFrame(loop);
    }

    loop();
}

/* =========================================
STOP ALL
========================================= */

document.getElementById("stopAll")
.onclick = () => {

    stopAll();
};

function stopAll(){

    activeSources.forEach(s => {

        try{
            s.stop();
        }catch(e){}
    });

    activeSources = [];

    playing = false;

    playhead.style.left =
        "180px";

    tracks.forEach(track => {

        track.takes.forEach(take => {

            take.playing = false;

            if(take.cursor){

                take.cursor.style.left =
                    "0px";
            }
        });
    });
}

/* =========================================
EXPORT TAKE
========================================= */

function exportTake(take){

    exportBufferToWav(
        take.buffer,
        "take.wav"
    );
}

/* =========================================
EXPORT MIX
========================================= */

document.getElementById("exportAll")
.onclick = async () => {

    await exportMix();
};

async function exportMix(){

    let maxDuration = 0;

    tracks.forEach(track => {

        track.takes.forEach(take => {

            const end =
                take.buffer.duration +
                (
                    take.position /
                    PIXELS_PER_SECOND
                );

            if(end > maxDuration)
                maxDuration = end;
        });
    });

    const offline =
        new OfflineAudioContext(
            2,
            maxDuration * 44100,
            44100
        );

    tracks.forEach(track => {

        track.takes.forEach(take => {

            const source =
                offline
                .createBufferSource();

            source.buffer =
                take.buffer;

            source.connect(
                offline.destination
            );

            source.start(
                take.position /
                PIXELS_PER_SECOND
            );
        });
    });

    const rendered =
        await offline.startRendering();

    exportBufferToWav(
        rendered,
        "vov-mix.wav"
    );
}

/* =========================================
WAV
========================================= */

function exportBufferToWav(
    buffer,
    filename
){

    const wav =
        bufferToWave(
            buffer,
            buffer.length
        );

    const blob =
        new Blob(
            [wav],
            {
                type:"audio/wav"
            }
        );

    const url =
        URL.createObjectURL(blob);

    const a =
        document.createElement("a");

    a.href = url;

    a.download = filename;

    a.click();
}

function bufferToWave(
    abuffer,
    len
){

    const numOfChan =
        abuffer.numberOfChannels;

    const length =
        len * numOfChan * 2 + 44;

    const buffer =
        new ArrayBuffer(length);

    const view =
        new DataView(buffer);

    let channels = [];

    let offset = 0;

    let pos = 0;

    setUint32(0x46464952);
    setUint32(length - 8);
    setUint32(0x45564157);

    setUint32(0x20746d66);
    setUint32(16);
    setUint16(1);
    setUint16(numOfChan);
    setUint32(abuffer.sampleRate);
    setUint32(
        abuffer.sampleRate *
        2 *
        numOfChan
    );

    setUint16(numOfChan * 2);
    setUint16(16);

    setUint32(0x61746164);
    setUint32(length - pos - 4);

    for(let i=0;i<numOfChan;i++){

        channels.push(
            abuffer.getChannelData(i)
        );
    }

    while(pos < length){

        for(let i=0;i<numOfChan;i++){

            let sample =
                Math.max(
                    -1,
                    Math.min(
                        1,
                        channels[i][offset]
                    )
                );

            sample =
                sample < 0
                ? sample * 0x8000
                : sample * 0x7FFF;

            view.setInt16(
                pos,
                sample,
                true
            );

            pos += 2;
        }

        offset++;
    }

    return buffer;

    function setUint16(data){

        view.setUint16(
            pos,
            data,
            true
        );

        pos += 2;
    }

    function setUint32(data){

        view.setUint32(
            pos,
            data,
            true
        );

        pos += 4;
    }
}

/* =========================================
INIT
========================================= */

createTrack();

</script>

</body>
</html>
