<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>VOV Edit Engine v1</title>

<style>

body{
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

/* =========================================
   TOPBAR
========================================= */

#topbar{
    height:60px;
    background:#111;
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 15px;
    border-bottom:1px solid #222;
    box-sizing:border-box;
}

button{
    border:none;
    border-radius:8px;
    padding:10px 14px;
    cursor:pointer;
    font-weight:bold;
}

#addTrack{
    background:#222;
    color:white;
}

#playAll{
    background:green;
    color:white;
}

#stopAll{
    background:#aa0000;
    color:white;
}

/* =========================================
   TIMELINE
========================================= */

#timeline{
    position:relative;
    width:100%;
    height:calc(100vh - 60px);
    overflow:auto;
    background:#0b0b0b;
}

/* =========================================
   GRID
========================================= */

.gridLine{
    position:absolute;
    top:0;
    width:1px;
    height:100%;
    background:#1a1a1a;
}

.gridLabel{
    position:absolute;
    top:0;
    font-size:10px;
    color:#555;
    padding-left:3px;
}

/* =========================================
   TRACK
========================================= */

.track{
    position:relative;
    height:120px;
    border-bottom:1px solid #1f1f1f;
}

.trackHeader{
    position:absolute;
    left:0;
    top:0;
    width:160px;
    height:100%;
    background:#111;
    border-right:1px solid #222;
    box-sizing:border-box;
    padding:10px;
    z-index:50;
}

.trackTitle{
    font-size:13px;
    opacity:0.8;
    margin-bottom:10px;
}

.trackControls{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
}

.trackLane{
    position:absolute;
    left:160px;
    right:0;
    top:0;
    height:100%;
}

/* =========================================
   AUDIO BLOCK
========================================= */

.audioBlock{
    position:absolute;
    top:20px;
    height:80px;
    background:#1b1b1b;
    border:1px solid #444;
    border-radius:10px;
    overflow:hidden;
    cursor:grab;
    user-select:none;
}

.audioBlock.selected{
    border:2px solid #00ff99;
}

.waveCanvas{
    width:100%;
    height:100%;
    display:block;
}

/* =========================================
   TAKE CURSOR
========================================= */

.takeCursor{
    position:absolute;
    top:0;
    left:0;
    width:2px;
    height:100%;
    background:#00ff99;
    pointer-events:none;
}

/* =========================================
   GLOBAL PLAYHEAD
========================================= */

#playhead{
    position:absolute;
    top:0;
    left:160px;
    width:2px;
    height:100%;
    background:red;
    z-index:999;
    pointer-events:none;
}

/* =========================================
   MENU
========================================= */

#menu{
    position:absolute;
    background:#111;
    border:1px solid #333;
    border-radius:8px;
    display:none;
    z-index:9999;
    overflow:hidden;
    min-width:160px;
}

.menuItem{
    padding:10px;
    cursor:pointer;
    border-bottom:1px solid #222;
}

.menuItem:hover{
    background:#222;
}

.recActive{
    background:red !important;
    color:white;
}

</style>
</head>

<body>

<div id="topbar">

    <button id="addTrack">
        ADD TRACK
    </button>

    <button id="playAll">
        PLAY ALL
    </button>

    <button id="stopAll">
        STOP ALL
    </button>

</div>

<div id="timeline">

    <div id="playhead"></div>

</div>

<div id="menu"></div>

<script>

/* =========================================
   AUDIO ENGINE
========================================= */

const audioContext =
    new AudioContext();

const timeline =
    document.getElementById("timeline");

const playhead =
    document.getElementById("playhead");

const menu =
    document.getElementById("menu");

const PIXELS_PER_SECOND = 120;

let tracks = [];

let trackCount = 0;

let activeSources = [];

let playing = false;

let playStart = 0;

let animationFrame;

/* =========================================
   GRID
========================================= */

for(let i=0;i<300;i++){

    const line =
        document.createElement("div");

    line.className = "gridLine";

    line.style.left =
        (160 + i * PIXELS_PER_SECOND)
        + "px";

    const label =
        document.createElement("div");

    label.className = "gridLabel";

    label.style.left =
        (163 + i * PIXELS_PER_SECOND)
        + "px";

    label.innerText = i + "s";

    timeline.appendChild(line);
    timeline.appendChild(label);
}

/* =========================================
   ADD TRACK
========================================= */

document.getElementById("addTrack")
.onclick = () => {
    createTrack();
};

function createTrack(){

    trackCount++;

    const track = {

        id:trackCount,

        takes:[],

        recorder:null,

        stream:null
    };

    tracks.push(track);

    renderTrack(track);
}

/* =========================================
   RENDER TRACK
========================================= */

function renderTrack(track){

    const div =
        document.createElement("div");

    div.className = "track";

    div.id = "track_" + track.id;

    div.innerHTML = `

        <div class="trackHeader">

            <div class="trackTitle">
                TRACK ${track.id}
            </div>

            <div class="trackControls">

                <button id="rec_${track.id}">
                    REC
                </button>

                <button id="del_${track.id}">
                    DEL
                </button>

            </div>

        </div>

        <div class="trackLane"
             id="lane_${track.id}">
        </div>

    `;

    timeline.appendChild(div);

    bindTrack(track);
}

/* =========================================
   BIND TRACK
========================================= */

function bindTrack(track){

    const recBtn =
        document.getElementById(
            "rec_" + track.id
        );

    const delBtn =
        document.getElementById(
            "del_" + track.id
        );

    /* =========================
       REC
    ========================= */

    recBtn.onclick = async () => {

        if(!track.recorder){

            const stream =
                await navigator
                .mediaDevices
                .getUserMedia({
                    audio:true
                });

            track.stream = stream;

            const recorder =
                new MediaRecorder(stream);

            const chunks = [];

            recorder.ondataavailable =
                e => chunks.push(e.data);

            recorder.onstop = async () => {

                const blob =
                    new Blob(chunks);

                const arrayBuffer =
                    await blob.arrayBuffer();

                const audioBuffer =
                    await audioContext
                    .decodeAudioData(arrayBuffer);

                const take = {

                    id:Date.now(),

                    buffer:audioBuffer,

                    position:0,

                    width:
                        audioBuffer.duration *
                        PIXELS_PER_SECOND,

                    selected:false,

                    source:null,

                    cursor:null,

                    playing:false
                };

                track.takes.push(take);

                renderTake(track, take);
            };

            recorder.start();

            track.recorder = recorder;

            recBtn.classList.add(
                "recActive"
            );

        }else{

            track.recorder.stop();

            track.stream
                .getTracks()
                .forEach(t => t.stop());

            track.recorder = null;

            recBtn.classList.remove(
                "recActive"
            );
        }
    };

    /* =========================
       DELETE TRACK
    ========================= */

    delBtn.onclick = () => {

        document
            .getElementById(
                "track_" + track.id
            )
            .remove();

        tracks =
            tracks.filter(
                t => t.id !== track.id
            );
    };
}

/* =========================================
   RENDER TAKE
========================================= */

function renderTake(track, take){

    const lane =
        document.getElementById(
            "lane_" + track.id
        );

    const block =
        document.createElement("div");

    block.className = "audioBlock";

    block.style.left =
        take.position + "px";

    block.style.width =
        take.width + "px";

    /* =========================
       WAVEFORM
    ========================= */

    const canvas =
        document.createElement("canvas");

    canvas.className = "waveCanvas";

    canvas.width = take.width;

    canvas.height = 80;

    block.appendChild(canvas);

    /* =========================
       TAKE CURSOR
    ========================= */

    const cursor =
        document.createElement("div");

    cursor.className = "takeCursor";

    block.appendChild(cursor);

    take.cursor = cursor;

    lane.appendChild(block);

    drawWaveform(canvas, take.buffer);

    /* =========================
       SELECT
    ========================= */

    block.onclick = e => {

        e.stopPropagation();

        document
            .querySelectorAll(".audioBlock")
            .forEach(b => {
                b.classList.remove(
                    "selected"
                );
            });

        block.classList.add(
            "selected"
        );
    };

    /* =========================
       CONTEXT MENU
    ========================= */

    block.oncontextmenu = e => {

        e.preventDefault();

        openMenu(
            e.clientX,
            e.clientY,
            track,
            take,
            block
        );
    };

    /* =========================
       DRAG
    ========================= */

    let dragging = false;

    let offsetX = 0;

    block.onmousedown = e => {

        dragging = true;

        offsetX =
            e.clientX -
            block.offsetLeft;
    };

    document.onmousemove = e => {

        if(!dragging) return;

        let x =
            e.clientX - offsetX;

        if(x < 0) x = 0;

        take.position = x;

        block.style.left =
            x + "px";
    };

    document.onmouseup = () => {

        dragging = false;
    };
}

/* =========================================
   CONTEXT MENU
========================================= */

function openMenu(
    x,
    y,
    track,
    take,
    block
){

    menu.innerHTML = "";

    menu.style.display = "block";

    menu.style.left = x + "px";

    menu.style.top = y + "px";

    const items = [

        {
            label:"PLAY TAKE",
            action:() => {
                playTake(take);
            }
        },

        {
            label:"STOP TAKE",
            action:() => {
                stopTake(take);
            }
        },

        {
            label:"DUPLICATE",
            action:() => {

                const clone = {

                    ...take,

                    id:Date.now(),

                    position:
                        take.position + 40
                };

                track.takes.push(clone);

                renderTake(track, clone);
            }
        },

        {
            label:"DELETE TAKE",
            action:() => {

                block.remove();

                track.takes =
                    track.takes.filter(
                        t => t.id !== take.id
                    );
            }
        }

    ];

    items.forEach(item => {

        const div =
            document.createElement("div");

        div.className = "menuItem";

        div.innerText = item.label;

        div.onclick = () => {

            item.action();

            menu.style.display = "none";
        };

        menu.appendChild(div);
    });
}

/* =========================================
   CLOSE MENU
========================================= */

document.body.onclick = () => {

    menu.style.display = "none";
};

/* =========================================
   PLAY TAKE
========================================= */

function playTake(take){

    stopTake(take);

    const source =
        audioContext
        .createBufferSource();

    source.buffer =
        take.buffer;

    source.connect(
        audioContext.destination
    );

    source.start();

    take.source = source;

    take.playing = true;

    animateTakeCursor(take);
}

/* =========================================
   STOP TAKE
========================================= */

function stopTake(take){

    if(take.source){

        try{
            take.source.stop();
        }catch(e){}

        take.source = null;
    }

    take.playing = false;

    if(take.cursor){

        take.cursor.style.left = "0px";
    }
}

/* =========================================
   TAKE CURSOR
========================================= */

function animateTakeCursor(take){

    const start =
        audioContext.currentTime;

    function loop(){

        if(!take.playing) return;

        const elapsed =
            audioContext.currentTime -
            start;

        const progress =
            elapsed /
            take.buffer.duration;

        take.cursor.style.left =
            (progress * take.width)
            + "px";

        if(progress >= 1){

            take.playing = false;

            take.cursor.style.left = "0px";

            return;
        }

        requestAnimationFrame(loop);
    }

    loop();
}

/* =========================================
   WAVEFORM
========================================= */

function drawWaveform(
    canvas,
    buffer
){

    const ctx =
        canvas.getContext("2d");

    const data =
        buffer.getChannelData(0);

    const step =
        Math.ceil(
            data.length /
            canvas.width
        );

    const amp =
        canvas.height / 2;

    ctx.fillStyle = "#1b1b1b";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.beginPath();

    ctx.strokeStyle = "#00ff99";

    for(let i=0;i<canvas.width;i++){

        let min = 1.0;
        let max = -1.0;

        for(let j=0;j<step;j++){

            const datum =
                data[(i*step)+j];

            if(datum < min)
                min = datum;

            if(datum > max)
                max = datum;
        }

        ctx.moveTo(
            i,
            (1 + min) * amp
        );

        ctx.lineTo(
            i,
            (1 + max) * amp
        );
    }

    ctx.stroke();
}

/* =========================================
   PLAY ALL
========================================= */

document.getElementById("playAll")
.onclick = () => {

    stopAll();

    const now =
        audioContext.currentTime;

    playStart = now;

    playing = true;

    tracks.forEach(track => {

        track.takes.forEach(take => {

            const source =
                audioContext
                .createBufferSource();

            source.buffer =
                take.buffer;

            source.connect(
                audioContext.destination
            );

            source.start(
                now +
                take.position /
                PIXELS_PER_SECOND
            );

            take.source = source;

            take.playing = true;

            animateTakeCursor(take);

            activeSources.push(source);
        });
    });

    animateGlobalPlayhead();
};

/* =========================================
   GLOBAL PLAYHEAD
========================================= */

function animateGlobalPlayhead(){

    function loop(){

        if(!playing) return;

        const elapsed =
            audioContext.currentTime -
            playStart;

        playhead.style.left =
            (160 +
            elapsed *
            PIXELS_PER_SECOND)
            + "px";

        animationFrame =
            requestAnimationFrame(loop);
    }

    loop();
}

/* =========================================
   STOP ALL
========================================= */

document.getElementById("stopAll")
.onclick = () => {

    stopAll();
};

function stopAll(){

    activeSources.forEach(s => {

        try{
            s.stop();
        }catch(e){}
    });

    activeSources = [];

    playing = false;

    cancelAnimationFrame(
        animationFrame
    );

    playhead.style.left = "160px";

    tracks.forEach(track => {

        track.takes.forEach(take => {

            take.playing = false;

            if(take.cursor){

                take.cursor.style.left = "0px";
            }
        });
    });
}

/* =========================================
   INIT
========================================= */

createTrack();

</script>

</body>
</html>
