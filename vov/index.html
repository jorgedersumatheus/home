<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>VOV Wave Engine v1</title>

<style>

body{
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

/* =========================================
   TOPBAR
========================================= */

#topbar{
    height:60px;
    background:#111;
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 15px;
    border-bottom:1px solid #222;
    box-sizing:border-box;
}

button{
    border:none;
    border-radius:8px;
    padding:10px 14px;
    cursor:pointer;
    font-weight:bold;
}

#addTrack{
    background:#222;
    color:white;
}

#playAll{
    background:green;
    color:white;
}

#stopAll{
    background:#aa0000;
    color:white;
}

/* =========================================
   TIMELINE
========================================= */

#timeline{
    position:relative;
    width:100%;
    height:calc(100vh - 60px);
    overflow:auto;
    background:#0b0b0b;
}

/* GRID */

.gridLine{
    position:absolute;
    top:0;
    width:1px;
    height:100%;
    background:#1b1b1b;
}

.gridLabel{
    position:absolute;
    top:0;
    font-size:10px;
    color:#444;
    padding-left:4px;
}

/* =========================================
   TRACK
========================================= */

.track{
    position:relative;
    height:120px;
    border-bottom:1px solid #1f1f1f;
}

.trackHeader{
    position:absolute;
    left:0;
    top:0;
    width:160px;
    height:100%;
    background:#111;
    border-right:1px solid #222;
    padding:10px;
    box-sizing:border-box;
    z-index:20;
}

.trackTitle{
    font-size:13px;
    opacity:0.8;
    margin-bottom:10px;
}

.trackControls{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
}

.trackLane{
    position:absolute;
    left:160px;
    right:0;
    top:0;
    height:100%;
}

/* =========================================
   BLOCK
========================================= */

.audioBlock{
    position:absolute;
    top:20px;
    height:80px;
    background:#1f1f1f;
    border:1px solid #444;
    border-radius:10px;
    overflow:hidden;
    cursor:grab;
    user-select:none;
}

.audioBlock:active{
    cursor:grabbing;
}

.waveCanvas{
    width:100%;
    height:100%;
    display:block;
}

/* =========================================
   PLAYHEAD
========================================= */

#playhead{
    position:absolute;
    top:0;
    left:160px;
    width:2px;
    height:100%;
    background:red;
    z-index:999;
    pointer-events:none;
}

.recActive{
    background:red !important;
    color:white;
}

</style>
</head>

<body>

<div id="topbar">

    <button id="addTrack">
        ADD TRACK
    </button>

    <button id="playAll">
        PLAY ALL
    </button>

    <button id="stopAll">
        STOP ALL
    </button>

</div>

<div id="timeline">

    <div id="playhead"></div>

</div>

<script>

/* =========================================
   AUDIO ENGINE
========================================= */

const audioContext =
    new AudioContext();

const timeline =
    document.getElementById("timeline");

const playhead =
    document.getElementById("playhead");

const PIXELS_PER_SECOND = 120;

let tracks = [];

let trackCount = 0;

let activeSources = [];

let animationFrame;

let playing = false;

let playStart = 0;

/* =========================================
   GRID
========================================= */

for(let i=0;i<300;i++){

    const line =
        document.createElement("div");

    line.className = "gridLine";

    line.style.left =
        (160 + i * PIXELS_PER_SECOND) + "px";

    const label =
        document.createElement("div");

    label.className = "gridLabel";

    label.style.left =
        (163 + i * PIXELS_PER_SECOND) + "px";

    label.innerText = i + "s";

    timeline.appendChild(line);
    timeline.appendChild(label);
}

/* =========================================
   ADD TRACK
========================================= */

document.getElementById("addTrack")
.onclick = () => {

    createTrack();
};

function createTrack(){

    trackCount++;

    const track = {

        id: trackCount,

        takes: [],

        recorder:null,

        stream:null,

        currentSource:null
    };

    tracks.push(track);

    renderTrack(track);
}

/* =========================================
   RENDER TRACK
========================================= */

function renderTrack(track){

    const div =
        document.createElement("div");

    div.className = "track";

    div.id = "track_" + track.id;

    div.innerHTML = `

        <div class="trackHeader">

            <div class="trackTitle">
                TRACK ${track.id}
            </div>

            <div class="trackControls">

                <button id="rec_${track.id}">
                    REC
                </button>

                <button id="play_${track.id}">
                    PLAY
                </button>

                <button id="stop_${track.id}">
                    STOP
                </button>

                <button id="del_${track.id}">
                    DEL
                </button>

            </div>

        </div>

        <div class="trackLane"
             id="lane_${track.id}">
        </div>

    `;

    timeline.appendChild(div);

    bindTrack(track);
}

/* =========================================
   BIND TRACK
========================================= */

function bindTrack(track){

    const recBtn =
        document.getElementById(
            "rec_" + track.id
        );

    const playBtn =
        document.getElementById(
            "play_" + track.id
        );

    const stopBtn =
        document.getElementById(
            "stop_" + track.id
        );

    const delBtn =
        document.getElementById(
            "del_" + track.id
        );

    /* =========================
       RECORD
    ========================= */

    recBtn.onclick = async () => {

        if(!track.recorder){

            const stream =
                await navigator
                .mediaDevices
                .getUserMedia({
                    audio:true
                });

            track.stream = stream;

            const recorder =
                new MediaRecorder(stream);

            const chunks = [];

            recorder.ondataavailable =
                e => chunks.push(e.data);

            recorder.onstop = async () => {

                const blob =
                    new Blob(chunks);

                const arrayBuffer =
                    await blob.arrayBuffer();

                const audioBuffer =
                    await audioContext
                    .decodeAudioData(arrayBuffer);

                const take = {

                    buffer: audioBuffer,

                    position:0,

                    width:
                        audioBuffer.duration *
                        PIXELS_PER_SECOND
                };

                track.takes.push(take);

                renderTake(track, take);
            };

            recorder.start();

            track.recorder = recorder;

            recBtn.classList.add(
                "recActive"
            );

        }else{

            track.recorder.stop();

            track.stream
                .getTracks()
                .forEach(t => t.stop());

            track.recorder = null;

            recBtn.classList.remove(
                "recActive"
            );
        }
    };

    /* =========================
       PLAY TRACK
    ========================= */

    playBtn.onclick = () => {

        stopTrack(track);

        const now =
            audioContext.currentTime;

        track.takes.forEach(take => {

            const source =
                audioContext
                .createBufferSource();

            source.buffer =
                take.buffer;

            source.connect(
                audioContext.destination
            );

            source.start(
                now +
                take.position /
                PIXELS_PER_SECOND
            );

            activeSources.push(source);

            track.currentSource = source;
        });
    };

    /* =========================
       STOP TRACK
    ========================= */

    stopBtn.onclick = () => {

        stopTrack(track);
    };

    /* =========================
       DELETE TRACK
    ========================= */

    delBtn.onclick = () => {

        stopTrack(track);

        tracks =
            tracks.filter(
                t => t.id !== track.id
            );

        document
            .getElementById(
                "track_" + track.id
            )
            .remove();
    };
}

/* =========================================
   STOP TRACK
========================================= */

function stopTrack(track){

    if(track.currentSource){

        try{
            track.currentSource.stop();
        }catch(e){}

        track.currentSource = null;
    }
}

/* =========================================
   RENDER TAKE
========================================= */

function renderTake(track, take){

    const lane =
        document.getElementById(
            "lane_" + track.id
        );

    const block =
        document.createElement("div");

    block.className = "audioBlock";

    block.style.left =
        take.position + "px";

    block.style.width =
        take.width + "px";

    /* =========================
       WAVEFORM CANVAS
    ========================= */

    const canvas =
        document.createElement("canvas");

    canvas.className = "waveCanvas";

    canvas.width = take.width;

    canvas.height = 80;

    block.appendChild(canvas);

    lane.appendChild(block);

    drawWaveform(
        canvas,
        take.buffer
    );

    /* =========================
       DRAG
    ========================= */

    let dragging = false;

    let offsetX = 0;

    block.onmousedown = e => {

        dragging = true;

        offsetX =
            e.clientX -
            block.offsetLeft;
    };

    document.onmousemove = e => {

        if(!dragging) return;

        let x =
            e.clientX - offsetX;

        if(x < 0) x = 0;

        take.position = x;

        block.style.left =
            x + "px";
    };

    document.onmouseup = () => {

        dragging = false;
    };
}

/* =========================================
   DRAW WAVEFORM
========================================= */

function drawWaveform(
    canvas,
    buffer
){

    const ctx =
        canvas.getContext("2d");

    const data =
        buffer.getChannelData(0);

    const step =
        Math.ceil(
            data.length /
            canvas.width
        );

    const amp =
        canvas.height / 2;

    ctx.fillStyle = "#1f1f1f";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.beginPath();

    ctx.strokeStyle = "#00ff99";

    for(let i=0;i<canvas.width;i++){

        let min = 1.0;
        let max = -1.0;

        for(
            let j=0;
            j<step;
            j++
        ){

            const datum =
                data[(i*step)+j];

            if(datum < min)
                min = datum;

            if(datum > max)
                max = datum;
        }

        ctx.moveTo(
            i,
            (1 + min) * amp
        );

        ctx.lineTo(
            i,
            (1 + max) * amp
        );
    }

    ctx.stroke();
}

/* =========================================
   PLAY ALL
========================================= */

document.getElementById("playAll")
.onclick = () => {

    stopAll();

    const now =
        audioContext.currentTime;

    playStart = now;

    playing = true;

    tracks.forEach(track => {

        track.takes.forEach(take => {

            const source =
                audioContext
                .createBufferSource();

            source.buffer =
                take.buffer;

            source.connect(
                audioContext.destination
            );

            source.start(
                now +
                take.position /
                PIXELS_PER_SECOND
            );

            activeSources.push(source);
        });
    });

    animatePlayhead();
};

/* =========================================
   PLAYHEAD
========================================= */

function animatePlayhead(){

    function loop(){

        if(!playing) return;

        const elapsed =
            audioContext.currentTime -
            playStart;

        playhead.style.left =
            (160 +
            elapsed *
            PIXELS_PER_SECOND)
            + "px";

        animationFrame =
            requestAnimationFrame(loop);
    }

    loop();
}

/* =========================================
   STOP ALL
========================================= */

document.getElementById("stopAll")
.onclick = () => {

    stopAll();
};

function stopAll(){

    activeSources.forEach(s => {

        try{
            s.stop();
        }catch(e){}
    });

    activeSources = [];

    playing = false;

    cancelAnimationFrame(
        animationFrame
    );

    playhead.style.left = "160px";
}

/* =========================================
   INIT
========================================= */

createTrack();

</script>

</body>
</html>
