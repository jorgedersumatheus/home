VOV FLOW MEMORY v7
INPUT ENGINE

<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width,initial-scale=1.0">

<title>
VOV FLOW MEMORY v7
</title>

<link rel="stylesheet"
      href="style.css">

</head>

<body>

<!-- =====================================
TOPBAR
===================================== -->

<div id="topbar">

    <button id="addTrackBtn">
        TRACK
    </button>

    <button id="rewBtn">
        <
    </button>

    <button id="playBtn">
        PLAY
    </button>

    <button id="stopBtn">
        STOP
    </button>

    <button id="ffBtn">
        >
    </button>

    <button id="exportTrackBtn">
        STEM
    </button>

    <button id="exportMixBtn">
        MIX
    </button>

</div>

<!-- =====================================
INPUT ENGINE
===================================== -->

<div id="inputBar">

    <div class="inputSection">

        <label>
            INPUT GAIN
        </label>

        <input
            type="range"
            id="inputGain"
            min="0"
            max="3"
            step="0.01"
            value="1"
        >

    </div>

    <div class="inputSection">

        <label>
            COMPRESS
        </label>

        <input
            type="range"
            id="compressAmount"
            min="0"
            max="1"
            step="0.01"
            value="0.4"
        >

    </div>

    <div class="inputSection">

        <label>
            MONITOR
        </label>

        <button id="monitorBtn">
            OFF
        </button>

    </div>

    <div class="meterWrap">

        <div id="inputMeter"></div>

    </div>

</div>

<!-- =====================================
TIMELINE
===================================== -->

<div id="timelineWrapper">

    <div id="timeline">

        <div id="playhead"></div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
