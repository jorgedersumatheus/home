<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>VOV Audio Core — Fluxo Vivo</title>

<style>
body {
    margin: 0;
    background: #0a0a0a;
    color: white;
    font-family: Arial;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

#core {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: #222;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
    user-select: none;
}

#core.flowing {
    background: radial-gradient(circle, red, darkred);
    box-shadow: 0 0 40px red;
    transform: scale(1.05);
}

#vu {
    width: 300px;
    height: 12px;
    background: #222;
    margin-top: 30px;
    border-radius: 10px;
    overflow: hidden;
}

#vuBar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, green, yellow, red);
}
</style>
</head>

<body>

<div id="core">VOV</div>
<div id="vu"><div id="vuBar"></div></div>

<script>
let audioContext;
let analyser;
let gainNode;
let stream;

let isFlowing = false;

const core = document.getElementById("core");
const vuBar = document.getElementById("vuBar");

core.onclick = async () => {
    if (!isFlowing) {
        await startFlow();
    } else {
        stopFlow();
    }
};

/* =========================
   START FLOW (estado vivo)
========================= */
async function startFlow() {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    audioContext = new AudioContext();

    const source = audioContext.createMediaStreamSource(stream);

    analyser = audioContext.createAnalyser();
    analyser.fftSize = 512;

    gainNode = audioContext.createGain();
    gainNode.gain.value = 2.0;

    source.connect(gainNode);
    gainNode.connect(analyser);

    isFlowing = true;

    core.classList.add("flowing");

    startVU();

    console.log("VOV FLOW STARTED");
}

/* =========================
   STOP FLOW (memória fecha)
========================= */
function stopFlow() {
    isFlowing = false;

    core.classList.remove("flowing");

    vuBar.style.width = "0%";

    if (stream) stream.getTracks().forEach(t => t.stop());
    if (audioContext) audioContext.close();

    console.log("VOV FLOW STOPPED");
}

/* =========================
   VU LÓGICA (fluxo vivo)
========================= */
function startVU() {
    const data = new Uint8Array(analyser.frequencyBinCount);

    function loop() {
        if (!isFlowing) return;

        analyser.getByteFrequencyData(data);

        let sum = 0;
        for (let i = 0; i < data.length; i++) sum += data[i];

        let avg = sum / data.length;
        let percent = Math.min(100, (avg / 128) * 100);

        vuBar.style.width = percent + "%";

        requestAnimationFrame(loop);
    }

    loop();
}
</script>

</body>
</html>
