<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>VOV Sync Core v1</title>

<style>
body {
    margin: 0;
    background: #0a0a0a;
    color: white;
    font-family: Arial;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 30px;
}

h2 { opacity: 0.8; }

.track {
    width: 360px;
    background: #111;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}

.rec {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #333;
    color: white;
}

.rec.active {
    background: red;
}

#play {
    margin-top: 20px;
    padding: 10px 16px;
    background: green;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>VOV Sync Core v1</h2>

<div class="track">
    <h3>Voz</h3>
    <button class="rec" id="rec1">REC</button>
</div>

<div class="track">
    <h3>Cavaquinho</h3>
    <button class="rec" id="rec2">REC</button>
</div>

<button id="play">PLAY SYNC</button>

<script>

let audioContext = new AudioContext();

/* =========================
   SESSION CLOCK (o coração)
========================= */
let sessionStart = audioContext.currentTime;

/* =========================
   TRACKS SYNCED
========================= */
let tracks = {
    1: [],
    2: []
};

let mediaRecorders = {};
let streams = {};
let startMarks = {};

/* =========================
   REC SETUP
========================= */
function setup(id, btnId) {

    const btn = document.getElementById(btnId);

    btn.onclick = async () => {

        if (!mediaRecorders[id]) {

            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

            streams[id] = stream;

            const recorder = new MediaRecorder(stream);

            const chunks = [];

            /* 🔥 MARCA TEMPO DE INÍCIO */
            const startTime = audioContext.currentTime - sessionStart;

            startMarks[id] = startTime;

            recorder.ondataavailable = e => chunks.push(e.data);

            recorder.onstop = () => {

                const blob = new Blob(chunks, { type: "audio/webm" });
                const url = URL.createObjectURL(blob);

                const endTime = audioContext.currentTime - sessionStart;

                tracks[id].push({
                    url,
                    start: startMarks[id],
                    end: endTime
                });

                console.log("TRACK", id, "SYNC SAVED", startMarks[id], endTime);
            };

            recorder.start();

            mediaRecorders[id] = recorder;

            btn.classList.add("active");

        } else {

            mediaRecorders[id].stop();

            streams[id].getTracks().forEach(t => t.stop());

            mediaRecorders[id] = null;

            btn.classList.remove("active");
        }
    };
}

/* =========================
   PLAY SYNC ENGINE
========================= */
document.getElementById("play").onclick = () => {

    const now = audioContext.currentTime;

    Object.keys(tracks).forEach(trackId => {

        tracks[trackId].forEach(m => {

            const delay = (m.start * 1000);

            setTimeout(() => {

                const audio = new Audio(m.url);
                audio.play();

            }, delay);

        });

    });

    console.log("SYNC PLAY STARTED");
};

/* INIT */
setup(1, "rec1");
setup(2, "rec2");

</script>

</body>
</html>
