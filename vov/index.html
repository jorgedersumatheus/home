<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>VOV Timeline Core v1</title>

<style>

body{
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

/* =========================================
   TOP BAR
========================================= */

#topbar{
    height:60px;
    background:#111;
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 15px;
    box-sizing:border-box;
    border-bottom:1px solid #222;
}

button{
    border:none;
    border-radius:8px;
    padding:10px 14px;
    cursor:pointer;
    font-weight:bold;
}

#addTrack{
    background:#1e1e1e;
    color:white;
}

#playBtn{
    background:green;
    color:white;
}

#stopBtn{
    background:#b00000;
    color:white;
}

/* =========================================
   TIMELINE
========================================= */

#timeline{
    position:relative;
    width:100%;
    height:calc(100vh - 60px);
    overflow:auto;
}

/* GRID */

.gridLine{
    position:absolute;
    top:0;
    width:1px;
    height:100%;
    background:#1b1b1b;
}

.gridLabel{
    position:absolute;
    top:0;
    font-size:10px;
    color:#555;
    padding-left:3px;
}

/* =========================================
   TRACK
========================================= */

.track{
    position:relative;
    height:100px;
    border-bottom:1px solid #1f1f1f;
    box-sizing:border-box;
}

.trackHeader{
    position:absolute;
    left:0;
    top:0;
    width:120px;
    height:100%;
    background:#111;
    border-right:1px solid #222;
    box-sizing:border-box;
    padding:10px;
    z-index:10;
}

.trackTitle{
    font-size:13px;
    opacity:0.8;
    margin-bottom:8px;
}

.trackControls{
    display:flex;
    flex-wrap:wrap;
    gap:4px;
}

.trackLane{
    position:absolute;
    left:120px;
    right:0;
    top:0;
    height:100%;
}

/* =========================================
   AUDIO BLOCK
========================================= */

.audioBlock{
    position:absolute;
    top:22px;
    height:56px;
    background:#2d2d2d;
    border:1px solid #555;
    border-radius:8px;
    cursor:grab;
    box-sizing:border-box;
    overflow:hidden;
    user-select:none;
}

.audioBlock:hover{
    background:#3a3a3a;
}

.blockLabel{
    font-size:11px;
    padding:6px;
    opacity:0.8;
}

/* =========================================
   PLAYHEAD
========================================= */

#playhead{
    position:absolute;
    top:0;
    left:120px;
    width:2px;
    height:100%;
    background:red;
    z-index:999;
    pointer-events:none;
}

</style>
</head>

<body>

<div id="topbar">

    <button id="addTrack">
        ADD TRACK
    </button>

    <button id="playBtn">
        PLAY
    </button>

    <button id="stopBtn">
        STOP
    </button>

</div>

<div id="timeline">

    <div id="playhead"></div>

</div>

<script>

/* =========================================
   AUDIO ENGINE
========================================= */

const audioContext =
    new AudioContext();

const timeline =
    document.getElementById("timeline");

const playhead =
    document.getElementById("playhead");

let tracks = [];

let trackCount = 0;

let activeSources = [];

let playing = false;

let playStartTime = 0;

let animationFrame;

/* =========================================
   TIMELINE SCALE
========================================= */

const PIXELS_PER_SECOND = 120;

/* =========================================
   GRID
========================================= */

for(let i=0;i<300;i++){

    const line =
        document.createElement("div");

    line.className = "gridLine";

    line.style.left =
        (120 + i * PIXELS_PER_SECOND) + "px";

    const label =
        document.createElement("div");

    label.className = "gridLabel";

    label.style.left =
        (122 + i * PIXELS_PER_SECOND) + "px";

    label.innerText = i + "s";

    timeline.appendChild(line);
    timeline.appendChild(label);
}

/* =========================================
   ADD TRACK
========================================= */

document.getElementById("addTrack")
.onclick = () => {

    createTrack();
};

function createTrack(){

    trackCount++;

    const track = {
        id: trackCount,
        takes: [],
        muted:false,
        solo:false
    };

    tracks.push(track);

    renderTrack(track);
}

/* =========================================
   RENDER TRACK
========================================= */

function renderTrack(track){

    const div =
        document.createElement("div");

    div.className = "track";

    div.id = "track_" + track.id;

    div.innerHTML = `

        <div class="trackHeader">

            <div class="trackTitle">
                TRACK ${track.id}
            </div>

            <div class="trackControls">

                <button onclick="recordTrack(${track.id})">
                    REC
                </button>

                <button onclick="deleteTrack(${track.id})">
                    DEL
                </button>

            </div>

        </div>

        <div class="trackLane"
             id="lane_${track.id}">
        </div>

    `;

    timeline.appendChild(div);
}

/* =========================================
   DELETE TRACK
========================================= */

function deleteTrack(id){

    tracks =
        tracks.filter(t => t.id !== id);

    const el =
        document.getElementById(
            "track_" + id
        );

    if(el) el.remove();
}

/* =========================================
   RECORD TRACK
========================================= */

async function recordTrack(id){

    const stream =
        await navigator.mediaDevices
        .getUserMedia({
            audio:true
        });

    const recorder =
        new MediaRecorder(stream);

    const chunks = [];

    recorder.ondataavailable =
        e => chunks.push(e.data);

    recorder.onstop = async () => {

        const blob =
            new Blob(chunks);

        const arrayBuffer =
            await blob.arrayBuffer();

        const audioBuffer =
            await audioContext
            .decodeAudioData(arrayBuffer);

        const track =
            tracks.find(t => t.id === id);

        const take = {

            buffer: audioBuffer,

            position: 0,

            width:
                audioBuffer.duration *
                PIXELS_PER_SECOND

        };

        track.takes.push(take);

        renderBlock(track, take);
    };

    recorder.start();

    setTimeout(() => {

        recorder.stop();

        stream
            .getTracks()
            .forEach(t => t.stop());

    }, 5000);
}

/* =========================================
   RENDER AUDIO BLOCK
========================================= */

function renderBlock(track, take){

    const lane =
        document.getElementById(
            "lane_" + track.id
        );

    const block =
        document.createElement("div");

    block.className = "audioBlock";

    block.style.left =
        take.position + "px";

    block.style.width =
        take.width + "px";

    block.innerHTML = `
        <div class="blockLabel">
            AUDIO
        </div>
    `;

    lane.appendChild(block);

    /* =========================
       DRAG SYSTEM
    ========================= */

    let dragging = false;

    let offsetX = 0;

    block.onmousedown = e => {

        dragging = true;

        offsetX =
            e.clientX -
            block.offsetLeft;

        block.style.cursor = "grabbing";
    };

    document.onmousemove = e => {

        if(!dragging) return;

        let x =
            e.clientX - offsetX;

        if(x < 0) x = 0;

        take.position = x;

        block.style.left =
            x + "px";
    };

    document.onmouseup = () => {

        dragging = false;

        block.style.cursor = "grab";
    };
}

/* =========================================
   PLAY ENGINE
========================================= */

document.getElementById("playBtn")
.onclick = () => {

    stopPlayback();

    const now =
        audioContext.currentTime;

    playStartTime = now;

    playing = true;

    tracks.forEach(track => {

        track.takes.forEach(take => {

            const source =
                audioContext
                .createBufferSource();

            source.buffer =
                take.buffer;

            source.connect(
                audioContext.destination
            );

            const timeOffset =
                take.position /
                PIXELS_PER_SECOND;

            source.start(
                now + timeOffset
            );

            activeSources.push(source);
        });
    });

    animatePlayhead();
};

/* =========================================
   PLAYHEAD
========================================= */

function animatePlayhead(){

    function loop(){

        if(!playing) return;

        const elapsed =
            audioContext.currentTime -
            playStartTime;

        playhead.style.left =
            (120 + elapsed *
            PIXELS_PER_SECOND) + "px";

        animationFrame =
            requestAnimationFrame(loop);
    }

    loop();
}

/* =========================================
   STOP
========================================= */

document.getElementById("stopBtn")
.onclick = () => {

    stopPlayback();
};

function stopPlayback(){

    activeSources.forEach(s => {

        try{
            s.stop();
        }catch(e){}
    });

    activeSources = [];

    playing = false;

    cancelAnimationFrame(
        animationFrame
    );

    playhead.style.left = "120px";
}

/* =========================================
   INIT
========================================= */

createTrack();

</script>

</body>
</html>
