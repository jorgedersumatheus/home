<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Contato | VOV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #ffffff;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .container {
      width: 90%;
      max-width: 500px;
      text-align: center;
    }

    h2 {
      font-weight: normal;
      margin-bottom: 30px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    button {
      padding: 14px;
      font-size: 16px;
      border: none;
      background: black;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.8;
    }

    .voltar {
      margin-top: 25px;
      display: block;
      text-decoration: none;
      color: #333;
      font-size: 14px;
    }

    .voltar:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>Contato</h2>

    <form id="form-vov">

  <input type="text" name="name" placeholder="Nome" required>

  <input type="email" name="email" placeholder="E-mail" required>

  <textarea name="message" placeholder="Mensagem" required></textarea>

  <button type="submit">Enviar</button>

</form>

    <a class="voltar" href="index.html">Voltar ao Portal</a>

  </div>

  
<script>
  document.getElementById("form-vov").addEventListener("submit", async function(e) {
    e.preventDefault();

    const form = e.target;
    const data = new FormData(form);

    try {
      await fetch("https://object-scanner-thumb-gps.trycloudflare.com/webhook/vov-contato", {
        method: "POST",
        body: data
      });

      window.location.href = "obrigado.html";

    } catch (error) {
      alert("Erro ao enviar. Tente novamente.");
    }
  });
</script>
</body>
</html>
