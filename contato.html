<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contato – Portal VOV</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #ffffff;
  color: #222;
  text-align: center;
}

h1 {
  margin-top: 40px;
  font-weight: normal;
}

p {
  max-width: 600px;
  margin: 10px auto;
  line-height: 1.6;
}

form {
  max-width: 500px;
  margin: 30px auto;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

input, textarea {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
}

textarea {
  resize: vertical;
  min-height: 120px;
}

button {
  padding: 12px;
  border: none;
  border-radius: 8px;
  background-color: #000;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background-color: #444;
}

#status {
  margin-top: 15px;
  font-size: 14px;
  color: #444;
}

footer {
  margin: 50px 0;
  font-size: 14px;
  color: #666;
}

a {
  color: #000;
  text-decoration: none;
  font-weight: bold;
}
</style>

</head>

<body>

<h1>Contato VOV</h1>

<p>
Entre em contato para parcerias, apresentações, projetos culturais ou troca de ideias.
</p>

<form id="formContato">

<input type="text" name="nome" placeholder="Seu nome" required>

<input type="email" name="email" placeholder="Seu e-mail" required>

<textarea name="mensagem" placeholder="Sua mensagem..." required></textarea>

<button type="submit">Enviar mensagem</button>

</form>

<p id="status"></p>

<footer>
<p>
Portal VOV • Jorge LA Matheus<br>
Música • Pensamento • Cultura
</p>

<p>
<a href="index.html">← Voltar ao Portal</a>
</p>
</footer>

<script>
document.getElementById("formContato").addEventListener("submit", async function(e) {
  e.preventDefault();

  const status = document.getElementById("status");
  status.innerText = "Enviando...";

  const data = {
    nome: this.nome.value,
    email: this.email.value,
    mensagem: this.mensagem.value
  };

  try {
    const response = await fetch("https://n8n-69-zkbi.onrender.com/webhook/contato", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    if (response.ok) {
      status.innerText = "Mensagem enviada com sucesso ✨";
      this.reset();
    } else {
      status.innerText = "Erro ao enviar.";
    }

  } catch (error) {
    status.innerText = "Erro de conexão.";
  }
});
</script>

</body>
</html>
