<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Contato – Portal VOV</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Fale com o VOV</h1>
<p>Escreva com calma. Sua mensagem será lida com atenção.</p>

<form action="https://app.jorgematheus.mus.br/webhook/contato" method="POST">

<div class="campo">
<label for="nome">Nome</label>
<input type="text" id="nome" name="nome" placeholder="Seu nome" required>
</div>

<div class="campo">
<label for="email">E-mail</label>
<input type="email" id="email" name="email" placeholder="seu@email.com" required>
</div>

<div class="campo">
<label for="mensagem">Mensagem</label>
<textarea id="mensagem" name="mensagem" placeholder="Escreva sua mensagem..." required></textarea>
</div>

<button type="submit">Enviar mensagem</button>

</form>

</div>

</body>
</html>
