<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Contato - VOV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 10px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #00c853;
      border: none;
      border-radius: 5px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #00b34a;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Fale com a VOV</h2>

    <form onsubmit="enviar(event)">
      <input type="text" name="name" placeholder="Seu nome" required>
      <input type="email" name="email" placeholder="Seu email" required>
      <textarea name="message" placeholder="Sua mensagem" rows="5" required></textarea>

      <button type="submit">Enviar</button>
    </form>
  </div>

  <script>
    async function enviar(e) {
      e.preventDefault();

      const nome = document.querySelector("[name=name]").value;
      const email = document.querySelector("[name=email]").value;
      const mensagem = document.querySelector("[name=message]").value;

      try {
        await fetch("https://webhook.site/12a9cf17-3592-4536-9d63-96c8f909fdb4", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name: nome,
            email: email,
            message: mensagem
          })
        });

        window.location.href = "obrigado.html";

      } catch (erro) {
        alert("Erro ao enviar o formulário.");
        console.error(erro);
      }
    }
  </script>

</body>
</html>
