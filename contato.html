<!DOCTYPE html>

<body>

<header>

  <nav>

    <a href="inteligencia-vital.html">Inteligência Vital</a>

  </nav>
</header>

<main>

<section class="contato">

  <h2>Escreva para a VOV</h2>
  <p>Sua mensagem. Em breve retornaremos.</p>

<form id="form-vov" class="form-vov">

  <label>Nome</label>
  <input type="text" name="name" required>

  <label>Email</label>
  <input type="email" name="email" required>

  <label>Mensagem</label>
  <textarea name="message" rows="6" required></textarea>

  <button type="submit">Enviar</button>

</form>
</section>

</main>

<footer>
  <p>V O V — Ver Ouvir Vendas</p>
</footer>
<script>
document.getElementById("form-vov").addEventListener("submit", async function(e) {
  e.preventDefault();

  const form = e.target;
  const data = new FormData(form);

  try {
    await fetch("https://formspree.io/f/xerppjre", {
      method: "POST",
      body: data,
      headers: {
        'Accept': 'application/json'
      }
    });

    // REDIRECIONAMENTO GARANTIDO
    window.location.href = "obrigado.html";

  } catch (error) {
    alert("Erro ao enviar. Tente novamente.");
  }
});
</script>
</body>
</html>
