<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Contato | VOV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: #ffffff;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #121826;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #ffd700;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: none;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
    }

    textarea {
      resize: none;
      height: 120px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #ffd700;
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #e6c200;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Fale com a VOV</h1>

  <form action="https://formspree.io/f/xeerpjre" method="POST">
    
    <input type="text" name="name" placeholder="Seu nome" required>

    <input type="email" name="email" placeholder="Seu email" required>

    <textarea name="message" placeholder="Sua mensagem"></textarea>

    <!-- Assunto do e-mail -->
    <input type="hidden" name="_subject" value="Novo contato do Portal VOV">

    <!-- Anti-spam -->
    <input type="text" name="_gotcha" style="display:none">

    <!-- Redirecionamento após envio -->
    <input type="hidden" name=" -next" value="https://jorgematheus.mus.br/obrigado.html">
    <input type="hidden" name=" _gotcha" style="display:none">
    <button type="submit">Enviar mensagem</button>

  </form>

  <div class="footer">
    Ver Ouvir Vendas ©
  </div>
</div>

</body>
</html>
