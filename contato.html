<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contato – VOV</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>VOV</h1>
<p class="subtitulo">Contato</p>

<nav>
<a href="index.html">Home</a>
<a href="radio.html">Rádio</a>
<a href="programas.html">Programas</a>
<a href="videos.html">Vídeos</a>
<a href="arquivo-musical.html">Arquivo</a>
<a href="inteligencia-vital.html">Inteligência Vital</a>
</nav>

</header>


<main>

<section>

<h2>Fale com a VOV</h2>

<p class="descricao">
Envie sua mensagem. Vamos ouvir você.
</p>

<form id="form-contato" class="formulario">

<label>Nome</label>
<input type="text" name="nome" required>

<label>E-mail</label>
<input type="email" name="email" required>

<label>Mensagem</label>
<textarea name="mensagem" rows="6" required></textarea>

<button type="submit">Enviar</button>

</form>

</section>

</main>


<footer>

<p>© Jorge L A Matheus – Portal VOV</p>

</footer>


<script>

document.getElementById('form-contato').addEventListener('submit', async function(e) {

  e.preventDefault();

  const formData = new FormData(this);

  const data = {
    nome: formData.get('nome'),
    email: formData.get('email'),
    mensagem: formData.get('mensagem')
  };

  try {

    const response = await fetch('/api/contato', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    if (response.ok) {
      window.location.href = 'obrigado.html';
    } else {
      alert('Erro ao enviar mensagem.');
    }

  } catch (error) {
    alert('Erro de conexão.');
  }

});

</script>

</body>
</html>
