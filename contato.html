<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Contato VOV</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #000000, #0a0a0a);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 12px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 0 20px rgba(255,255,255,0.1);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  letter-spacing: 2px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  border: none;
  border-radius: 6px;
}

button {
  width: 100%;
  padding: 12px;
  background: #00ffcc;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #00cc99;
}

#status {
  margin-top: 15px;
  text-align: center;
  font-weight: bold;
  opacity: 0;
  transition: opacity 0.5s;
}

.sucesso {
  color: #00ffcc;
}

.erro {
  color: #ff4d4d;
}
</style>
</head>

<body>

<div class="container">
  <h2>Escrever para VOV</h2>

  <form id="form-contato">
    <input type="text" name="name" placeholder="Seu nome" required>
    <input type="email" name="email" placeholder="Seu email" required>
    <textarea name="message" placeholder="Sua mensagem"></textarea>

    <button type="submit">ENVIAR</button>
  </form>

  <div id="status"></div>

  <p style="text-align:center; margin-top:20px; font-size:12px; opacity:0.6;">
    V O V — Ver • Ouvir • Vender
  </p>
</div>

<script>
const form = document.getElementById('form-contato');
const status = document.getElementById('status');

form.addEventListener('submit', async function(e) {
  e.preventDefault();

  status.style.opacity = 1;
  status.className = "";
  status.innerHTML = "⏳ Enviando...";

  const data = new FormData(form);

  try {
    const response = await fetch("https://formspree.io/f/xeerpjre", {
      method: "POST",
      body: data,
      headers: {
        'Accept': 'application/json'
      }
    });

    if (response.ok) {
      status.className = "sucesso";
      status.innerHTML = `
      ✨ Recebemos sua mensagem.<br>
      A VOV vê, ouve e responde.<br><br>
      Redirecionando...
      `;

      form.reset();

      setTimeout(() => {
        window.location.href = "obrigado.html";
      }, 2500);

    } else {
      status.className = "erro";
      status.innerHTML = "⚠️ Algo falhou. Tente novamente.";
    }

  } catch (error) {
    status.className = "erro";
    status.innerHTML = "❌ Falha de conexão.";
  }
});
</script>

</body>
</html>
