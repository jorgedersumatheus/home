<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="radio.html">Rádio</a></li>

    <li><a href="inteligencia-vital.html">Inteligência Vital</a></li>
    <li><a href="contato.html">Contato</a></li>
  </ul>
</nav>

<header>
  <h1>Fale Conosco</h1>
  <p>Envie sua mensagem para a equipe VOV</p>
</header>

<section>
  <form id="form-contato" onsubmit="return enviarFormulario();">
    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome" required>

    <label for="email">E-mail:</label>
    <input type="email" id="email" name="email" required>

    <label for="mensagem">Mensagem:</label>
    <textarea id="mensagem" name="mensagem" rows="5" required></textarea>

    <button type="submit">Enviar</button>
  </form>
</section>

<footer>
  <p>&copy; 2026 Ver Ouvir Vendas</p>
</footer>

<script>
async function enviarFormulario() {
  const form = document.getElementById('form-contato');
  const data = new FormData(form);

  try {
    await fetch('/webhook/contato', {
      method: 'POST',
      body: data
    });
    window.location.href = "obrigado.html"; // redireciona após envio
  } catch (err) {
    alert('Erro ao enviar. Tente novamente.');
  }

  return false; // previne reload
}
</script>

</body>
</html>
