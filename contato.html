<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Contato | VOV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0c10;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #1f2833;
      padding: 30px;
      border-radius: 10px;
      width: 100%;
      max-width: 400px;
    }

    input, select, textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #66fcf1;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Fale com a VOV</h2>

  <form id="vov-form">
    <input type="text" name="name" placeholder="Seu nome" required>

    <input type="email" name="email" placeholder="Seu melhor email" required>

    <select name="intention" required>
      <option value="">Qual seu interesse?</option>
      <option value="comprar">Quero comprar</option>
      <option value="aprender">Quero aprender</option>
      <option value="parceria">Quero parceria</option>
    </select>

    <textarea name="message" placeholder="Sua mensagem"></textarea>

    <button type="submit">Enviar</button>
  </form>

  <div class="status" id="status"></div>
</div>

<script>
document.getElementById("vov-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const status = document.getElementById("status");
  status.innerText = "Enviando...";

  const data = Object.fromEntries(new FormData(e.target));

  try {
    const response = await fetch("https://SEU-N8N/webhook/vov-leads", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    if (response.ok) {
      status.innerText = "Recebido! Verifique seu email.";
      e.target.reset();
    } else {
      status.innerText = "Erro ao enviar. Tente novamente.";
    }

  } catch (error) {
    status.innerText = "Falha de conexão.";
  }
});
</script>

</body>
</html>
