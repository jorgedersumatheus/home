<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Contato VOV</title>
</head>
<body>

<h2>Contato</h2>

<form onsubmit="enviar(event)">
  <input name="name" placeholder="Nome" required><br><br>
  <input name="email" type="email" placeholder="Email" required><br><br>
  <textarea name="message" placeholder="Mensagem" required></textarea><br><br>
  <button type="submit">Enviar</button>
</form>

<script>
async function enviar(e) {
  e.preventDefault();

  try {
    const res = await fetch("https://n8n-69-zkbi.onrender.com/webhook/contato", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        name: document.querySelector("[name=name]").value,
        email: document.querySelector("[name=email]").value,
        message: document.querySelector("[name=message]").value
      })
    });

    if (res.ok) {
      window.location.href = "/obrigado.html";
    } else {
      alert("Erro ao enviar.");
    }

  } catch (e) {
    alert("Falha de conexão.");
  }
}
</script>

</body>
</html>
