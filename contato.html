<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Contato | VOV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1a2b;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #132a44;
      padding: 20px;
      border-radius: 10px;
      width: 100%;
      max-width: 400px;
    }
    h2 {
      text-align: center;
      color: #f4c542;
    }
    input, textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 5px;
      border: none;
      font-size: 14px;
    }
    input, textarea {
      background: #0b1a2b;
      color: #fff;
    }
    button {
      background: #f4c542;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #ffd95e;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Contato com a VOV</h2>

  <form id="formContato">
    <input type="text" name="name" placeholder="Seu nome" required>
    <input type="email" name="email" placeholder="Seu email" required>
    <textarea name="message" placeholder="Sua mensagem" required></textarea>
    <button type="submit">Enviar</button>
  </form>
</div>

<script>
document.getElementById("formContato").addEventListener("submit", async function(e) {
  e.preventDefault();

  const form = e.target;

  const data = {
    name: form.name.value,
    email: form.email.value,
    message: form.message.value
  };

  console.log("Enviando dados:", data);

  try {
    const response = await fetch("https://n8n-69-zkbi.onrender.com/webhook/vovn8n", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    console.log("Status da resposta:", response.status);

    if (response.ok) {
      alert("✅ Mensagem enviada com sucesso!");
      form.reset();
    } else {
      alert("❌ Erro ao enviar. Status: " + response.status);
    }

  } catch (error) {
    console.error("Erro de conexão:", error);
    alert("❌ Falha na conexão com o servidor.");
  }
});
</script>

</body>
</html>
