<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Oráculo VOV Supremo</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: #fff;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px 20px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.hex {
  font-size: 24px;
  margin: 20px 0;
}

.resultado {
  margin-top: 20px;
  text-align: left;
}

.historico {
  margin-top: 30px;
  text-align: left;
}
</style>
</head>

<body>

<div class="container">

<h1>Oráculo VOV</h1>

<input id="pergunta" placeholder="Digite sua pergunta..." />

<br>

<button onclick="consultar()">Consultar</button>
<button onclick="limparHistorico()">Limpar Histórico</button>

<div class="hex" id="hexagrama"></div>

<div class="resultado" id="resultado"></div>

<div class="historico" id="historico"></div>

</div>

<script>

// GERAR LINHA (yin/yang)
function linha() {
  return Math.random() < 0.5 ? 0 : 1;
}

// GERAR HEXAGRAMA
function gerarHex() {
  let linhas = [];
  for(let i=0;i<6;i++) linhas.push(linha());

  let numero = parseInt(linhas.join(""),2)+1;

  return {linhas,numero};
}

// DESENHAR
function desenhar(linhas){
  return linhas.map(l =>
    l ? "___" : "_ _"
  ).reverse().join("<br>");
}

// BASE REAL (exemplo inicial correto)
const hexagramas = {
1:{nome:"O Criativo",vov:"Força que Inicia",estado:"impulso criador",risco:"arrogância",acao:"liderar com clareza"},
2:{nome:"O Receptivo",vov:"Campo que Sustenta",estado:"abertura total",risco:"passividade",acao:"sustentar com consciência"},
3:{nome:"Dificuldade Inicial",vov:"Caos Criador",estado:"início turbulento",risco:"desistência",acao:"organizar o começo"},
4:{nome:"Juventude Inexperiente",vov:"Aprender com o erro",estado:"inexperiência",risco:"teimosia",acao:"buscar orientação"},

// fallback automático até completar 64
};

for(let i=1;i<=64;i++){
  if(!hexagramas[i]){
    hexagramas[i]={
      nome:"Hexagrama "+i,
      vov:"Transmutação VOV",
      estado:"momento em leitura",
      risco:"interpretação superficial",
      acao:"observar profundamente"
    }
  }
}

// CONSULTA
function consultar(){

  let pergunta = document.getElementById("pergunta").value;

  if(!pergunta){
    alert("Digite uma pergunta.");
    return;
  }

  let h = gerarHex();
  let dados = hexagramas[h.numero];

  document.getElementById("hexagrama").innerHTML =
    "Hexagrama "+h.numero+"<br><br>"+desenhar(h.linhas);

  let texto = `
  <b>${dados.nome}</b><br><br>
  ${dados.vov}<br><br>
  <b>Estado:</b> ${dados.estado}<br>
  <b>Risco:</b> ${dados.risco}<br>
  <b>Ação:</b> ${dados.acao}
  `;

  document.getElementById("resultado").innerHTML = texto;

  narrar(dados);

  salvarHistorico(pergunta,h.numero,dados.nome);
}

// NARRADOR MELHOR
function narrar(d){
  let texto = `${d.nome}. ${d.vov}. Estado ${d.estado}. Atenção ao risco ${d.risco}. Ação recomendada ${d.acao}`;

  let msg = new SpeechSynthesisUtterance(texto);
  msg.rate = 0.95;
  msg.pitch = 1;
  msg.lang = "pt-BR";

  speechSynthesis.speak(msg);
}

// HISTÓRICO
function salvarHistorico(pergunta,numero,nome){
  let h = JSON.parse(localStorage.getItem("vov")||"[]");
  h.push({pergunta,numero,nome});
  localStorage.setItem("vov",JSON.stringify(h));
  mostrarHistorico();
}

function mostrarHistorico(){
  let h = JSON.parse(localStorage.getItem("vov")||"[]");

  let html = "<h3>Histórico</h3>";

  h.slice().reverse().forEach(i=>{
    html += `<p><b>${i.pergunta}</b><br>Hex ${i.numero} - ${i.nome}</p>`;
  });

  document.getElementById("historico").innerHTML = html;
}

function limparHistorico(){
  localStorage.removeItem("vov");
  mostrarHistorico();
}

mostrarHistorico();

</script>

</body>
</html>
