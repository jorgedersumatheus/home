<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>VOV — Oráculo Estratégico PRO</title>

<style>
body {
    background:#000;
    color:#fff;
    font-family:Arial;
    text-align:center;
    padding:30px;
}

h1 { color:#e60000; }

input, button {
    padding:12px;
    margin:10px;
    border:none;
    border-radius:5px;
}

input { width:300px; }

button {
    background:#e60000;
    color:#fff;
    cursor:pointer;
}

.linha {
    font-size:26px;
    letter-spacing:6px;
}

#resultado, #historico {
    margin-top:30px;
    max-width:600px;
    margin-left:auto;
    margin-right:auto;
}
</style>

</head>

<body>

<h1>V O V — Oráculo Estratégico PRO</h1>
<p>Ver • Ouvir • Vender</p>

<input type="text" id="pergunta" placeholder="Qual é a sua questão?">
<br>

<button onclick="consultar()">Consultar</button>
<button onclick="narrar()">Ouvir leitura</button>
<button onclick="exportar()">Exportar leitura</button>

<div id="hexagrama"></div>
<div id="resultado"></div>

<h2>Histórico</h2>
<div id="historico"></div>

<script>

// TRIGRAMAS
const trigramas = [
    {nome:"Céu", valor:7},
    {nome:"Terra", valor:0},
    {nome:"Trovão", valor:1},
    {nome:"Água", valor:2},
    {nome:"Montanha", valor:3},
    {nome:"Vento", valor:4},
    {nome:"Fogo", valor:5},
    {nome:"Lago", valor:6}
];

// LINHAS VOV
const linhasVOV = {
1:"Início imaturo. Evite pressa.",
2:"Ajuste correto. Avance com equilíbrio.",
3:"Zona de erro. Risco por impulsividade.",
4:"Transição. Prepare o movimento.",
5:"Centro de poder. Decisão favorecida.",
6:"Excesso. Tendência à ruptura."
};

// HEXAGRAMAS BASE
const hexagramas = {
"7-7":"Força Criativa",
"0-0":"Receptividade",
"0-7":"Harmonia",
"7-0":"Bloqueio",
"1-1":"Movimento",
"2-2":"Abismo",
"3-3":"Imobilidade",
"4-4":"Penetração",
"5-5":"Clareza",
"6-6":"Alegria"
};

// GERAR LINHA
function gerarLinha() {
    let v = Math.floor(Math.random()*4);
    return {
        valor: v % 2 === 0 ? 0 : 1,
        mutavel: v === 0 || v === 3
    };
}

// GERAR HEXAGRAMA
function gerarHexagrama() {
    let linhas = [];
    let mutaveis = [];

    for(let i=0;i<6;i++){
        let l = gerarLinha();
        linhas.push(l.valor);
        if(l.mutavel) mutaveis.push(i+1);
    }

    let baixo = parseInt(linhas.slice(0,3).join(''),2)%8;
    let cima = parseInt(linhas.slice(3,6).join(''),2)%8;

    return {linhas, mutaveis, baixo, cima};
}

// DESENHAR
function desenhar(linhas) {
    let html="";
    linhas.slice().reverse().forEach(l=>{
        html += `<div class="linha">${l ? "———" : "— —"}</div>`;
    });
    document.getElementById("hexagrama").innerHTML = html;
}

// INTERPRETAÇÃO
function interpretar(nome, mutaveis){

    let base = `<p><b>Estado:</b> ${nome}</p>`;

    let linhasTxt = "";

    if(mutaveis.length){
        linhasTxt += "<p><b>Tensão ativa:</b></p>";
        mutaveis.forEach(l=>{
            linhasTxt += `<p>Linha ${l}: ${linhasVOV[l]}</p>`;
        });
    } else {
        linhasTxt = "<p>Situação estável.</p>";
    }

    let decisao = "<p><b>Direção:</b> ";

    if(mutaveis.includes(3) || mutaveis.includes(6)){
        decisao += "Recuar e reavaliar.";
    } else if(mutaveis.includes(5)){
        decisao += "Avançar com confiança.";
    } else {
        decisao += "Aguardar e observar.";
    }

    decisao += "</p>";

    return base + linhasTxt + decisao;
}

// HISTÓRICO
function salvarConsulta(pergunta, nome){

    let historico = JSON.parse(localStorage.getItem("vov_historico")) || [];

    historico.unshift({
        data: new Date().toLocaleString(),
        pergunta,
        nome
    });

    localStorage.setItem("vov_historico", JSON.stringify(historico));

    renderHistorico();
}

function renderHistorico(){

    let historico = JSON.parse(localStorage.getItem("vov_historico")) || [];

    let html = "";

    historico.slice(0,10).forEach(item=>{
        html += `
        <div style="border-bottom:1px solid #333; margin:10px; padding:10px;">
            <p><b>${item.data}</b></p>
            <p>${item.pergunta}</p>
            <p><i>${item.nome}</i></p>
        </div>
        `;
    });

    document.getElementById("historico").innerHTML = html;
}

// LIMITE FREE
function podeConsultar(){

    let limite = 3;
    let total = parseInt(localStorage.getItem("vov_total")) || 0;

    if(total >= limite){
        alert("Limite gratuito atingido.");
        return false;
    }

    localStorage.setItem("vov_total", total+1);
    return true;
}

// DELAY
function delay(ms){
    return new Promise(r => setTimeout(r, ms));
}

// CONSULTA
async function consultar(){

    if(!podeConsultar()) return;

    let pergunta = document.getElementById("pergunta").value;

    document.getElementById("resultado").innerHTML = "Consultando...";

    await delay(800);

    let h = gerarHexagrama();

    desenhar(h.linhas);

    let chave = `${h.cima}-${h.baixo}`;
    let nome = hexagramas[chave] || "Transmutação";

    await delay(800);

    let interpretacao = interpretar(nome, h.mutaveis);

    document.getElementById("resultado").innerHTML = interpretacao;

    salvarConsulta(pergunta, nome);

    document.getElementById("pergunta").value = "";
}

// EXPORTAR
function exportar(){

    let texto = document.getElementById("resultado").innerText;

    let blob = new Blob([texto], {type: "text/plain"});
    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "leitura_vov.txt";
    a.click();
}

// ÁUDIO
function narrar(){

    let texto = document.getElementById("resultado").innerText;

    let fala = new SpeechSynthesisUtterance(texto);

    fala.lang = "pt-BR";

    speechSynthesis.speak(fala);
}

// INICIAR HISTÓRICO
renderHistorico();

</script>

</body>
</html>
