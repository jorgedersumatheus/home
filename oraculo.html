<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Oráculo VOV Supremo</title>

<style>
body {font-family: Arial; background:#0b0b0b; color:#fff; text-align:center;}
.container {max-width:650px; margin:auto;}
input {width:90%; padding:12px; border-radius:10px; border:none;}
button {padding:10px 20px; margin:5px; border-radius:10px; border:none; cursor:pointer;}
.hex {font-size:22px; margin:20px;}
.card {background:#111; padding:15px; border-radius:10px; margin-top:15px; text-align:left;}
</style>
</head>

<body>

<div class="container">

<h1>Oráculo VOV Supremo</h1>

<input id="pergunta" placeholder="Qual é a sua questão?" />

<br>

<button onclick="consultar()">Consultar</button>
<button onclick="ouvir()">Ouvir</button>
<button onclick="limparHistorico()">Limpar Tudo</button>

<div id="hexagrama"></div>
<div id="resultado"></div>
<div id="historico"></div>

</div>

<script>

// ================= BASE =================

function linha(){
  return Math.random() < 0.5 ? 0 : 1;
}

// MAPA CORRETO (Rei Wen)
const mapa = {
"111111":1,"000000":2,"100010":3,"010001":4,"111010":5,"010111":6,
"010000":7,"000010":8,"111011":9,"110111":10,"111000":11,"000111":12,
"101111":13,"111101":14,"001000":15,"000100":16,"100110":17,"011001":18,
"110000":19,"000011":20,"100101":21,"101001":22,"000001":23,"100000":24,
"100111":25,"111001":26,"100001":27,"011110":28,"010010":29,"101101":30,
"001110":31,"011100":32,"001111":33,"111100":34,"000101":35,"101000":36,
"101011":37,"110101":38,"001010":39,"010100":40,"110001":41,"100011":42,
"111110":43,"011111":44,"000110":45,"011000":46,"010110":47,"011010":48,
"101110":49,"011101":50,"100100":51,"001001":52,"001011":53,"110100":54,
"101100":55,"001101":56,"011011":57,"110110":58,"010011":59,"110010":60,
"110011":61,"001100":62,"010101":63,"101010":64
};

// ================= HEX =================

function gerarHex(){

  let linhas = [];

  // BASE → TOPO (fundamental)
  for(let i=0;i<6;i++){
    linhas.push(linha());
  }

  let inferior = linhas.slice(0,3).join(""); // base
  let superior = linhas.slice(3,6).join(""); // topo

  let chave = inferior + superior;
  let numero = mapa[chave];

  return {linhas,numero,chave};
}

// DESENHO REAL (topo em cima)
function desenhar(l){
  return [...l].reverse().map(x => x ? "━━━" : "━ ━").join("<br>");
}

// ================= DADOS =================

const nomes = {
1:"O Criativo",2:"O Receptivo",3:"Dificuldade Inicial",4:"Juventude Inexperiente",
5:"A Espera",6:"O Conflito",7:"O Exército",8:"A União",
9:"O Poder do Pequeno",10:"O Porte",11:"A Paz",12:"O Impasse",
13:"Comunhão",14:"Grande Posse",15:"Modéstia",16:"Entusiasmo",
17:"Seguir",18:"Correção",19:"Aproximação",20:"Contemplação",
21:"Morder",22:"Graça",23:"Desintegração",24:"Retorno",
25:"Inocência",26:"Grande Domínio",27:"Alimentação",28:"Excesso",
29:"Abismo",30:"Fogo",31:"Influência",32:"Duração",
33:"Retirada",34:"Grande Poder",35:"Progresso",36:"Escuridão",
37:"Família",38:"Oposição",39:"Obstáculo",40:"Liberação",
41:"Diminuição",42:"Aumento",43:"Ruptura",44:"Encontro",
45:"Reunião",46:"Ascensão",47:"Exaustão",48:"Poço",
49:"Revolução",50:"Caldeirão",51:"Trovão",52:"Montanha",
53:"Desenvolvimento",54:"Noiva",55:"Abundância",56:"Viajante",
57:"Suavidade",58:"Alegria",59:"Dispersão",60:"Limitação",
61:"Verdade Interior",62:"Pequeno Excesso",63:"Após Conclusão",64:"Antes da Conclusão"
};

let ultimaLeitura = "";

// ================= CONSULTA =================

function consultar(){

  speechSynthesis.cancel();

  let pergunta = document.getElementById("pergunta").value.trim();

  if(!pergunta){
    alert("Digite uma pergunta.");
    return;
  }

  // LIMPA TUDO ANTES
  document.getElementById("resultado").innerHTML = "";
  ultimaLeitura = "";

  let h = gerarHex();

  document.getElementById("hexagrama").innerHTML =
    "Hexagrama "+h.numero+"<br><br>"+desenhar(h.linhas);

  let texto = `${nomes[h.numero]}. 
Momento de leitura estratégica. Observe antes de agir.
Risco: agir sem consciência.
Ação: alinhar percepção e decisão.`;

  ultimaLeitura = texto;

  document.getElementById("resultado").innerHTML =
    `<div class="card">${texto}</div>`;

  salvar(pergunta,h.numero);
}

// ================= VOZ =================

function ouvir(){

  if(!ultimaLeitura){
    alert("Faça uma consulta primeiro.");
    return;
  }

  speechSynthesis.cancel();

  let msg = new SpeechSynthesisUtterance(ultimaLeitura);
  msg.lang="pt-BR";
  msg.rate=0.95;

  speechSynthesis.speak(msg);
}

// ================= HISTÓRICO =================

function salvar(p,n){
  let h = JSON.parse(localStorage.getItem("vov")||"[]");
  h.push({p,n});
  localStorage.setItem("vov",JSON.stringify(h));
  mostrar();
}

function mostrar(){
  let h = JSON.parse(localStorage.getItem("vov")||"[]");

  let html="<h3>Histórico</h3>";

  h.slice().reverse().forEach((i,idx)=>{
    html+=`
    <div class="card">
    <b>${i.p}</b><br>
    Hex ${i.n} - ${nomes[i.n]}<br>
    <button onclick="apagar(${idx})">Excluir</button>
    </div>`;
  });

  document.getElementById("historico").innerHTML=html;
}

function apagar(i){
  let h = JSON.parse(localStorage.getItem("vov")||"[]");
  h.splice(h.length-1-i,1);
  localStorage.setItem("vov",JSON.stringify(h));
  mostrar();
}

function limparHistorico(){
  localStorage.clear();
  document.getElementById("historico").innerHTML="";
}

mostrar();

</script>

</body>
</html>
