<body>

<div class="container">

<h1>🔮 Oráculo VOV Mestre</h1>

<input id="pergunta" placeholder="Qual é a sua questão?" />

<br>

<button onclick="consultar()">Consultar</button>
<button onclick="ouvir()">Ouvir</button>
<button onclick="limpar()">Limpar</button>

<div id="resultado"></div>
<div id="historico"></div>

</div>

<script>

// ===== LINHA COM MUTAÇÃO =====
function linha(){
  let r = Math.random();
  if(r < 0.25) return {v:0, m:true};   // yin mutante
  if(r < 0.5) return {v:1, m:false};  // yang
  if(r < 0.75) return {v:0, m:false}; // yin
  return {v:1, m:true};               // yang mutante
}

// ===== MAPA =====
const mapa = {
"111111":1,"000000":2,"100010":3,"010001":4,"111010":5,"010111":6,
"010000":7,"000010":8,"111011":9,"110111":10,"111000":11,"000111":12,
"101111":13,"111101":14,"001000":15,"000100":16,"100110":17,"011001":18,
"110000":19,"000011":20,"100101":21,"101001":22,"000001":23,"100000":24,
"100111":25,"111001":26,"100001":27,"011110":28,"010010":29,"101101":30,
"001110":31,"011100":32,"001111":33,"111100":34,"000101":35,"101000":36,
"101011":37,"110101":38,"001010":39,"010100":40,"110001":41,"100011":42,
"111110":43,"011111":44,"000110":45,"011000":46,"010110":47,"011010":48,
"101110":49,"011101":50,"100100":51,"001001":52,"001011":53,"110100":54,
"101100":55,"001101":56,"011011":57,"110110":58,"010011":59,"110010":60,
"110011":61,"001100":62,"010101":63,"101010":64
};

// ===== BASE COMPLETA =====
const HEX = {
1:"O Criativo",2:"O Receptivo",3:"Dificuldade Inicial",4:"Insensatez Juvenil",
5:"A Espera",6:"Conflito",7:"O Exército",8:"União",
9:"Domar do Pequeno",10:"Conduta",11:"Paz",12:"Estagnação",
13:"Comunidade",14:"Grandes Posses",15:"Modéstia",16:"Entusiasmo",
17:"Seguir",18:"Correção",19:"Aproximação",20:"Contemplação",
21:"Morder",22:"Graça",23:"Desintegração",24:"Retorno",
25:"Inocência",26:"Domar do Grande",27:"Alimentação",28:"Excesso",
29:"Abismo",30:"Fogo",31:"Influência",32:"Duração",
33:"Retirada",34:"Grande Poder",35:"Progresso",36:"Escuridão",
37:"Família",38:"Oposição",39:"Obstáculo",40:"Liberação",
41:"Diminuição",42:"Aumento",43:"Ruptura",44:"Encontro",
45:"Reunião",46:"Ascensão",47:"Exaustão",48:"Poço",
49:"Revolução",50:"Caldeirão",51:"Trovão",52:"Montanha",
53:"Desenvolvimento",54:"A Noiva",55:"Abundância",56:"Viajante",
57:"Suavidade",58:"Alegria",59:"Dispersão",60:"Limitação",
61:"Verdade Interior",62:"Pequeno Excesso",63:"Após Conclusão",64:"Antes da Conclusão"
};

// ===== DESENHO =====
function desenhar(linhas){
  return linhas.map(l=>{
    if(l.v===1) return l.m?"━━━ x":"━━━";
    return l.m?"━ ━ x":"━ ━";
  }).reverse().join("<br>");
}

// ===== CONSULTA =====
function consultar(){

let p = document.getElementById("pergunta").value.trim();
if(!p){ alert("Digite uma pergunta."); return; }

let linhas = [];
for(let i=0;i<6;i++) linhas.push(linha());

let base = linhas.map(l=>l.v).join("");
let num = mapa[base];

// MUTAÇÃO
let futuro = linhas.map(l=>{
  if(!l.m) return l.v;
  return l.v===1?0:1;
}).join("");

let numFuturo = mapa[futuro];

// RESULTADO
let html = `
<div class="card">
<strong>Hexagrama Atual ${num} — ${HEX[num]}</strong><br>
<div>${desenhar(linhas)}</div>

${linhas.some(l=>l.m)?`
<br><strong>Linhas Mutantes:</strong> Ativas<br>
<br><strong>Hexagrama Futuro ${numFuturo} — ${HEX[numFuturo]}</strong>
`:"<br><small>Sem mutação</small>"}

</div>
`;

document.getElementById("resultado").innerHTML = html;

let hist = document.getElementById("historico");
hist.innerHTML += "<hr>"+p+"<br>"+html;
}

// ===== VOZ =====
function ouvir(){
let txt = document.getElementById("resultado").innerText;
let u = new SpeechSynthesisUtterance(txt);
u.lang="pt-BR";
speechSynthesis.speak(u);
}

// ===== LIMPAR =====
function limpar(){
document.getElementById("resultado").innerHTML="";
document.getElementById("historico").innerHTML="";
document.getElementById("pergunta").value="";
}

</script>
