// ================= HEX =================
function gerarHex(){
  let linhas = [];
  for(let i=0;i<6;i++) linhas.push(linha());

  // linhas[0] = base, linhas[5] = topo
  let inferior = linhas.slice(0,3).join("");
  let superior = linhas.slice(3,6).join("");

  // chave correta para mapa
  let chave = inferior + superior;

  let numero = mapa[chave];
  return {linhas, numero};
}


  
function desenhar(l){ return l.map(x => x?"━━━":"━ ━").join("<br>"); }

// ================= CONSULTA =================
let ultimaLeitura = "";

function consultar(){
  speechSynthesis.cancel();
  let pergunta=document.getElementById("pergunta").value.trim();
  if(!pergunta){ alert("Digite uma pergunta."); return; }

  document.getElementById("resultado").innerHTML="";
  ultimaLeitura="";

  let h=gerarHex();

  document.getElementById("hexagrama").innerHTML =
    "Hexagrama "+h.numero+"<br><br>"+desenhar(h.linhas);

  let leitura=HEXAGRAMAS[h.numero]||{nome:"Desconhecido", essencia:"", diagnostico:"", direcao:""};
texto=`<div class="card">
<h2>${leitura.nome} – Hexagrama ${h.numero}</h2>
<p><strong>Essência:</strong> ${leitura.essencia}</p>
<p><strong>Diagnóstico:</strong> ${leitura.diagnostico}</p>
<p><strong>Direção:</strong> ${leitura.direcao}</p>
</div>`;

  ultimaLeitura = texto;
  document.getElementById("resultado").innerHTML = texto;

  let hist=document.getElementById("historico");
  hist.innerHTML = `<div class="card"><strong>Pergunta:</strong> ${pergunta}<br>${texto}</div>` + hist.innerHTML;

  // narração automática
  let fala = `Hexagrama ${h.numero}: ${leitura.nome}. Essência: ${leitura.essencia}. Diagnóstico: ${leitura.diagnostico}. Direção: ${leitura.direcao}.`;
  let msg = new SpeechSynthesisUtterance(fala);
  msg.lang="pt-BR";
  window.speechSynthesis.speak(msg);
}

// ================= AUDIO =================
function ouvir(){
  if(!ultimaLeitura) return;
  speechSynthesis.cancel();
  let msg = new SpeechSynthesisUtterance(ultimaLeitura.replace(/<[^>]*>?/gm,''));
  msg.lang="pt-BR";
  window.speechSynthesis.speak(msg);
}

function ouvirMantra(){
  let texto=document.getElementById("mantra").innerText;
  speechSynthesis.cancel();
  let msg=new SpeechSynthesisUtterance(texto);
  msg.lang="pt-BR";
  window.speechSynthesis.speak(msg);
}

function limparHistorico(){
  document.getElementById("historico").innerHTML="";

  document.getElementById("pergunta").value="";

}
