<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>VOV — Oráculo Estratégico PRO</title>

<style>
body {
    background:#000;
    color:#fff;
    font-family:Arial;
    text-align:center;
    padding:30px;
}
h1 { color:#e60000; }

input, textarea, button {
    padding:12px;
    margin:10px;
    border:none;
    border-radius:5px;
}

button {
    background:#e60000;
    color:#fff;
    cursor:pointer;
}

.linha {
    font-size:26px;
    letter-spacing:6px;
}

.bloco {
    margin-top:25px;
    padding:15px;
    border:1px solid #333;
}
</style>
</head>

<body>

<h1>V O V — Oráculo Estratégico PRO</h1>
<p>Ver • Ouvir • Vender</p>

<input type="text" id="pergunta" placeholder="Qual é a sua questão?"><br>

<button onclick="consultar()">Consultar</button>
<button onclick="narrar()">Ouvir</button>

<div id="presente" class="bloco"></div>
<div id="futuro" class="bloco"></div>

<hr>

<h2>Leitura Manual</h2>

<textarea id="manualLinhas" rows="6"
placeholder="Digite:
___
_ _
___
..."></textarea><br>

<button onclick="lerManual()">Interpretar Manual</button>

<script>

// =========================
// BASE (adicione os 64 depois)
// =========================

const hex64 = {
1:{nome:"Criativo",direcao:"iniciar",texto:"Força criativa pura."},
2:{nome:"Receptivo",direcao:"receber",texto:"Acolher e sustentar."},
29:{nome:"Abismo",direcao:"cautela",texto:"Perigo exige presença."},
30:{nome:"Clareza",direcao:"ver",texto:"A luz revela o caminho."},
41:{nome:"Diminuição",direcao:"reduzir",texto:"Menos é estratégia."},
42:{nome:"Aumento",direcao:"expandir",texto:"Expandir com base."}
};

// =========================
// MOTOR
// =========================

function gerarLinha(){
    let v = Math.floor(Math.random()*4);

    return {
        valor: v % 2,
        mutavel: v === 0 || v === 3
    };
}

function gerarHexagrama(){
    let linhas = [];
    let mutaveis = [];

    for(let i=0;i<6;i++){
        let l = gerarLinha();
        linhas.push(l.valor);
        if(l.mutavel) mutaveis.push(i);
    }

    return {linhas, mutaveis};
}

// =========================
// CÁLCULO REAL
// =========================

function calcularNumero(linhas){
    let num = 0;

    for(let i=0;i<6;i++){
        if(linhas[i] === 1){
            num += Math.pow(2, i);
        }
    }

    return num + 1;
}

// =========================
// MUTAÇÃO
// =========================

function mutarHexagrama(h){
    let novo = [...h.linhas];

    h.mutaveis.forEach(i=>{
        novo[i] = novo[i] === 1 ? 0 : 1;
    });

    return novo;
}

// =========================
// VISUAL
// =========================

function desenhar(linhas){
    return linhas.slice().reverse().map(l=>{
        return `<div class="linha">${l ? "___" : "_ _"}</div>`;
    }).join("");
}

// =========================
// INTERPRETAÇÃO
// =========================

function montarTexto(num){

    let h = hex64[num];

    if(!h){
        return `<p><b>Hexagrama ${num}</b><br>Em expansão VOV.</p>`;
    }

    return `
    <p><b>${num} — ${h.nome}</b></p>
    <p><b>Direção:</b> ${h.direcao}</p>
    <p>${h.texto}</p>
    `;
}

// =========================
// CONSULTA COMPLETA
// =========================

function consultar(){

    let h = gerarHexagrama();

    let num1 = calcularNumero(h.linhas);

    let linhasMutadas = mutarHexagrama(h);

    let num2 = calcularNumero(linhasMutadas);

    document.getElementById("presente").innerHTML = `
    <h3>Presente</h3>
    ${desenhar(h.linhas)}
    ${montarTexto(num1)}
    <p><b>Linhas mutáveis:</b> ${h.mutaveis.map(i=>i+1).join(", ") || "nenhuma"}</p>
    `;

    document.getElementById("futuro").innerHTML = `
    <h3>Transformação</h3>
    ${desenhar(linhasMutadas)}
    ${montarTexto(num2)}
    `;
}

// =========================
// MANUAL
// =========================

function converterManual(texto){

    let linhas = texto.trim().split("\n").map(l=>{
        return l.includes("___") ? 1 : 0;
    });

    return linhas.reverse();
}

function lerManual(){

    let texto = document.getElementById("manualLinhas").value;

    let linhas = converterManual(texto);

    let num1 = calcularNumero(linhas);

    let linhasMutadas = linhas.map(l=>l); // sem mutação manual

    let num2 = calcularNumero(linhasMutadas);

    document.getElementById("presente").innerHTML = `
    <h3>Leitura Manual</h3>
    ${desenhar(linhas)}
    ${montarTexto(num1)}
    `;

    document.getElementById("futuro").innerHTML = "";
}

// =========================
// ÁUDIO
// =========================

function narrar(){

    let texto = document.body.innerText;

    let fala = new SpeechSynthesisUtterance(texto);

    fala.lang = "pt-BR";
    fala.rate = 0.9;

    speechSynthesis.cancel();
    speechSynthesis.speak(fala);
}

</script>

</body>
</html>
