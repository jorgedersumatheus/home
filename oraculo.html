<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oráculo VOV — PRO FINAL</title>

<style>
body {
  font-family: Arial;
  background: #0b0f1a;
  color: #fff;
  text-align: center;
  padding: 20px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  background: #1f2a44;
  color: #fff;
  cursor: pointer;
}

button:hover {
  background: #2f3f66;
}

.hex {
  font-size: 22px;
  line-height: 1.6;
  margin: 20px;
}

#mutacao {
  margin-top: 10px;
  font-style: italic;
}

#historico {
  max-width: 760px;
  margin: auto;
  text-align: left;
  margin-top: 30px;
}

.item {
  border-bottom: 1px solid #333;
  padding: 10px 0;
}
</style>
</head>

<body>

<h1>ORÁCULO VOV — PRO FINAL</h1>

<button onclick="gerar()">Gerar</button>
<button onclick="narrar()">Ouvir</button>
<button onclick="limparHistorico()">Limpar Histórico</button>

<div id="numero"></div>
<div id="hex" class="hex"></div>
<div id="mutacao"></div>
<div id="texto"></div>

<div id="historico">

<div id="lista"></div>
</div>

"Inocência","Grande Domínio","Nutrição","Grande Excesso","Abismo","Fogo","Influência","Duração",
"Retirada","Grande Força","Progresso","Obscurecimento","Família","Oposição","Obstáculo","Liberação",
"Diminuição","Aumento","Decisão","Encontro","Reunião","Ascensão","Pressão","Poço",
"Revolução","Caldeirão","Trovão","Montanha","Desenvolvimento","Donzela","Abundância","Viagem",
"Suavidade","Alegria","Dispersão","Limitação","Verdade Interior","Pequeno Excesso","Após Conclusão","Antes da Conclusão"
];

const textos = [
"Inicie com força e clareza. A ação consciente abre caminhos.",
"Sustente o processo. A base bem cuidada garante o crescimento.",
"O início é difícil. Organize antes de avançar.",

"A disciplina constrói poder coletivo.",

"Pequenos avanços geram grandes conquistas.",
"Conduta correta abre portas invisíveis.",

"Energia alta pede direção.",

"Grande potencial exige estrutura.",

function gerarLinha() {
  let r = Math.random();
  if (r < 0.25) return {v:0, m:true};
  if (r < 0.5) return {v:1, m:false};
  if (r < 0.75) return {v:0, m:false};
  return {v:1, m:true};
}

function desenhar(hex) {
  return hex.map(l => l.v ? "___" : "_ _").join("<br>");
}

function inverter(hex) {
  return hex.map(l => l.m ? {v: l.v ? 0 : 1, m:false} : l);
}

function binarioParaIndice(hex) {
  let b = hex.map(l => l.v).reverse().join("");
  return parseInt(b, 2);
}

function gerar() {

  let hex = [];
  for (let i = 0; i < 6; i++) hex.push(gerarLinha());

  let idx = binarioParaIndice(hex);
  let nome = nomes[idx];
  let texto = textos[idx];

  let desenho = desenhar(hex);

  let mut = inverter(hex);
  let idx2 = binarioParaIndice(mut);
  let nome2 = nomes[idx2];

  document.getElementById("numero").innerHTML = `#${idx+1} - ${nome}`;
  document.getElementById("hex").innerHTML = desenho;
  document.getElementById("mutacao").innerHTML = `→ Mutação: #${idx2+1} - ${nome2}`;
  document.getElementById("texto").innerHTML = texto;

  window.textoAtual = nome + ". " + texto;

  salvarHistorico(idx+1, nome, desenho, texto, nome2);
}

function narrar() {
  if (!window.textoAtual) return;

  let msg = new SpeechSynthesisUtterance(window.textoAtual);
  msg.lang = "pt-BR";
  msg.rate = 0.9;

  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

function salvarHistorico(num, nome, desenho, texto, mut) {

  let lista = document.getElementById("lista");

  let item = document.createElement("div");
  item.className = "item";

  item.innerHTML = `
    <strong>#${num} - ${nome}</strong><br>
    ${desenho}<br>
    ${texto}<br>
    <em>Mutação → ${mut}</em>
  `;

  lista.prepend(item);

  localStorage.setItem("vov_hist", lista.innerHTML);
}

function carregarHistorico() {
  let data = localStorage.getItem("vov_hist");
  if (data) document.getElementById("lista").innerHTML = data;
}

function limparHistorico() {
  document.getElementById("lista").innerHTML = "";
  localStorage.removeItem("vov_hist");
}

carregarHistorico();

</script>

</body>
</html>
