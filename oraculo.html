<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>VOV — Oráculo Estratégico PRO</title>

<style>
body {
    background:#000;
    color:#fff;
    font-family:Arial;
    text-align:center;
    padding:30px;
}
h1 { color:#e60000; }

input, textarea, button {
    padding:12px;
    margin:10px;
    border:none;
    border-radius:5px;
}

button {
    background:#e60000;
    color:#fff;
    cursor:pointer;
}

.linha {
    font-size:26px;
    letter-spacing:6px;
}

.bloco {
    margin-top:25px;
    padding:15px;
    border:1px solid #333;
}

#historico {
    margin-top:30px;
    text-align:left;
    max-width:600px;
    margin-left:auto;
    margin-right:auto;
}
</style>
</head>

<body>

<h1>V O V — Oráculo Estratégico PRO</h1>
<p>Ver • Ouvir • Vender</p>

<input type="text" id="pergunta" placeholder="Qual é a sua questão?"><br>

<button onclick="consultar()">Consultar</button>
<button onclick="narrar()">Ouvir</button>

<div id="presente" class="bloco"></div>
<div id="futuro" class="bloco"></div>

<hr>

<h2>Leitura Manual</h2>

<textarea id="manualLinhas" rows="6"
placeholder="___
_ _
___
..."></textarea><br>

<button onclick="lerManual()">Interpretar Manual</button>

<h2>Histórico</h2>
<div id="historico"></div>

<script>

// =========================
// 64 HEXAGRAMAS VOV
// =========================

const hex64 = {};

const nomes = [
"Criação","Recepção","Dificuldade Inicial","Juventude","Esperar","Conflito","Exército","Solidariedade",
"Pequeno Domar","Conduta","Paz","Estagnação","Comunidade","Grande Possuir","Modéstia","Entusiasmo",
"Seguir","Corrigir","Aproximação","Contemplação","Morder","Graça","Fragmentação","Retorno",
"Inocência","Grande Domar","Nutrição","Excesso","Abismo","Clareza","Influência","Duração",
"Retirada","Grande Poder","Progresso","Escurecimento","Família","Oposição","Obstrução","Libertação",
"Diminuição","Aumento","Ruptura","Encontro","Reunião","Ascensão","Exaustão","Poço",
"Revolução","Caldeirão","Trovão","Montanha","Desenvolvimento","Noiva","Abundância","Viajante",
"Suave","Alegria","Dispersão","Limitação","Verdade Interior","Pequeno Excesso","Após Conclusão","Antes da Conclusão"
];

// cria base automática
for(let i=1;i<=64;i++){
    hex64[i] = {
        nome: nomes[i-1],
        direcao: "interpretar",
        texto: `Hexagrama ${i} — ${nomes[i-1]}

Aqui não há acaso.

O que se apresenta é um padrão em movimento.

Leia assim:
→ O que precisa ser visto?
→ O que precisa ser ajustado?
→ O que precisa ser feito agora?

VOV diz:
Ver com lucidez.
Ouvir com presença.
Vender com verdade.

Movimento consciente muda destino.`
    };
}

// =========================
// MOTOR
// =========================

function gerarLinha(){
    let v = Math.floor(Math.random()*4);

    return {
        valor: v % 2,
        mutavel: v === 0 || v === 3
    };
}

function gerarHexagrama(){
    let linhas = [];
    let mutaveis = [];

    for(let i=0;i<6;i++){
        let l = gerarLinha();
        linhas.push(l.valor);
        if(l.mutavel) mutaveis.push(i);
    }

    return {linhas, mutaveis};
}

// =========================
// CÁLCULO
// =========================

function calcularNumero(linhas){
    let num = 0;

    for(let i=0;i<6;i++){
        if(linhas[i] === 1){
            num += Math.pow(2, i);
        }
    }

    return num + 1;
}

// =========================
// MUTAÇÃO
// =========================

function mutarHexagrama(h){
    let novo = [...h.linhas];

    h.mutaveis.forEach(i=>{
        novo[i] = novo[i] === 1 ? 0 : 1;
    });

    return novo;
}

// =========================
// VISUAL
// =========================

function desenhar(linhas){
    return linhas.slice().reverse().map(l=>{
        return `<div class="linha">${l ? "___" : "_ _"}</div>`;
    }).join("");
}

// =========================
// TEXTO
// =========================

function montarTexto(num){
    let h = hex64[num];

    return `
    <p><b>${num} — ${h.nome}</b></p>
    <p>${h.texto.replace(/\n/g,"<br>")}</p>
    `;
}

// =========================
// CONSULTA
// =========================

function consultar(){

    let pergunta = document.getElementById("pergunta").value;

    let h = gerarHexagrama();

    let num1 = calcularNumero(h.linhas);
    let linhasMutadas = mutarHexagrama(h);
    let num2 = calcularNumero(linhasMutadas);

    let texto1 = montarTexto(num1);
    let texto2 = montarTexto(num2);

    document.getElementById("presente").innerHTML = `
    <h3>Presente</h3>
    ${desenhar(h.linhas)}
    ${texto1}
    <p><b>Linhas mutáveis:</b> ${h.mutaveis.map(i=>i+1).join(", ") || "nenhuma"}</p>
    `;

    document.getElementById("futuro").innerHTML = `
    <h3>Transformação</h3>
    ${desenhar(linhasMutadas)}
    ${texto2}
    `;

    salvar(pergunta, num1, num2);
}

// =========================
// HISTÓRICO
// =========================

function salvar(pergunta, n1, n2){

    let h = JSON.parse(localStorage.getItem("vov_hist")) || [];

    h.unshift({
        data: new Date().toLocaleString(),
        pergunta,
        presente: n1,
        futuro: n2
    });

    localStorage.setItem("vov_hist", JSON.stringify(h));

    renderHistorico();
}

function renderHistorico(){

    let h = JSON.parse(localStorage.getItem("vov_hist")) || [];

    let html = "";

    h.slice(0,10).forEach(i=>{
        html += `
        <div style="border-bottom:1px solid #333; margin:10px;">
            <p><b>${i.data}</b></p>
            <p>${i.pergunta}</p>
            <p>→ ${i.presente} → ${i.futuro}</p>
        </div>
        `;
    });

    document.getElementById("historico").innerHTML = html;
}

renderHistorico();

// =========================
// MANUAL
// =========================

function converterManual(texto){
    let linhas = texto.trim().split("\n").map(l=>{
        return l.includes("___") ? 1 : 0;
    });
    return linhas.reverse();
}

function lerManual(){

    let texto = document.getElementById("manualLinhas").value;

    let linhas = converterManual(texto);

    let num = calcularNumero(linhas);

    document.getElementById("presente").innerHTML = `
    <h3>Manual</h3>
    ${desenhar(linhas)}
    ${montarTexto(num)}
    `;

    document.getElementById("futuro").innerHTML = "";
}

// =========================
// ÁUDIO
// =========================

function narrar(){

    let texto = document.body.innerText;

    let fala = new SpeechSynthesisUtterance(texto);

    fala.lang = "pt-BR";
    fala.rate = 0.9;

    speechSynthesis.cancel();
    speechSynthesis.speak(fala);
}

</script>

</body>
</html>
