"110011":61,"001100":62,"010101":63,"101010":64

function gerarHex(){
  let linhas = [];
  for(let i=0;i<6;i++) linhas.push(linha());
  let inferior = linhas.slice(0,3).join("");
  let superior = linhas.slice(3,6).join("");
  let chave = superior + inferior;
  let numero = mapa[chave] || 1;
  return {linhas,numero};
}

function desenhar(l){
  return l.map(x => x ? "━━━" : "━ ━").join("<br>");
}

let ultimaLeitura = "";

// ================= FUNÇÕES DE CONSULTA =================
function consultar(){
  speechSynthesis.cancel();
  let pergunta = document.getElementById("pergunta").value.trim();
  if(!pergunta){ alert("Digite uma pergunta."); return; }

  let h = gerarHex();
  document.getElementById("hexagrama").innerHTML = "Hexagrama "+h.numero+"<br><br>"+desenhar(h.linhas);

  let leitura = HEXAGRAMAS[h.numero] || {nome:"Desconhecido", essencia:"", diagnostico:"", direcao:""};
  ultimaLeitura = `Hexagrama ${h.numero} — ${leitura.nome}. ${leitura.essencia} ${leitura.diagnostico} ${leitura.direcao}`;
  document.getElementById("resultado").innerHTML = `<div class="card"><strong>Hexagrama ${h.numero} — ${leitura.nome}</strong><br><br>${leitura.essencia}<br><br>${leitura.diagnostico}<br><br>${leitura.direcao}</div>`;

  salvar(pergunta,h.numero);
}

// ================= FUNÇÕES DE VOZ =================
function ouvir(){
  if(!ultimaLeitura) return alert("Faça uma consulta.");
  speechSynthesis.cancel();
  let msg = new SpeechSynthesisUtterance(ultimaLeitura);
  msg.lang="pt-BR";
  speechSynthesis.speak(msg);
}

function ouvirMantra(){
  speechSynthesis.cancel();
  let msg = new SpeechSynthesisUtterance(document.getElementById("mantra").innerText);
  msg.lang="pt-BR";
  msg.rate=0.9;
  speechSynthesis.speak(msg);
}

// ================= HISTÓRICO =================
function salvar(p,n){
  let h = JSON.parse(localStorage.getItem("vov")||"[]");
  h.push({p,n});
  localStorage.setItem("vov",JSON.stringify(h));
  mostrar();
}

function mostrar(){
  let h = JSON.parse(localStorage.getItem("vov")||"[]");
  let html="<h3>Histórico</h3>";
  h.slice().reverse().forEach((i)=>{ html+=`<div class="card"><b>${i.p}</b><br>Hex ${i.n} - ${HEXAGRAMAS[i.n].nome}</div>`; });
  document.getElementById("historico").innerHTML=html;
}

function limparHistorico(){
  localStorage.removeItem("vov");
  document.getElementById("resultado").innerHTML = "";
  document.getElementById("hexagrama").innerHTML = "";
  document.getElementById("pergunta").value = "";
  ultimaLeitura = "";
  speechSynthesis.cancel();
  mostrar();
}

// Carrega histórico ao abrir a página
