<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>VOV — Oráculo Estratégico PRO</title>

<style>
body {
    background:#000;
    color:#fff;
    font-family:Arial;
    text-align:center;
    padding:30px;
}

h1 { color:#e60000; }

input, textarea, button {
    padding:12px;
    margin:10px;
    border:none;
    border-radius:5px;
}

input, textarea { width:300px; }

button {
    background:#e60000;
    color:#fff;
    cursor:pointer;
}

.linha {
    font-size:26px;
    letter-spacing:6px;
}

#resultado, #historico {
    margin-top:30px;
    max-width:600px;
    margin-left:auto;
    margin-right:auto;
    text-align:left;
}
</style>

</head>

<body>

<h1>V O V — Oráculo Estratégico PRO</h1>
<p>Ver • Ouvir • Vender</p>

<input type="text" id="pergunta" placeholder="Qual é a sua questão?">
<br>

<button onclick="consultar()">Consultar</button>
<button onclick="narrar()">Ouvir leitura</button>
<button onclick="exportar()">Exportar leitura</button>

<div id="hexagrama"></div>
<div id="resultado"></div>

<hr>

<h2>Leitura Manual</h2>

<input type="text" id="manualNumero" placeholder="Digite o número (1–64)">
<br>

<textarea id="manualLinhas" rows="6"
placeholder="Cole as linhas:
___
_ _
_ _
___
..."></textarea>
<br>

<button onclick="lerManual()">Ler manualmente</button>

<h2>Histórico</h2>
<div id="historico"></div>

<script>

// =========================
// HEXAGRAMAS (com texto)
// =========================

const hex64 = {

41:{
nome:"Diminuição",
direcao:"reduzir",
texto:`Diminuição não é perda, é estratégia.

Cortar o excesso fortalece o essencial.
Simplificar cria direção.

O momento pede redução consciente.
Menos dispersão, mais foco.

Reduza agora para crescer depois.`
},

42:{
nome:"Aumento",
direcao:"expandir",
texto:`Aumento acontece quando há base.

Expandir sem estrutura gera colapso.
Com alinhamento, o crescimento é natural.

Avance, mas com consciência.

Expanda sem perder o centro.`
},

29:{
nome:"Abismo",
direcao:"cautela",
texto:`O abismo exige presença.

Não é momento de pressa.
Cada passo deve ser consciente.

Disciplina emocional atravessa o risco.

Permaneça firme no centro.`
},

30:{
nome:"Clareza",
direcao:"iluminar",
texto:`Clareza revela padrões.

Ver corretamente muda tudo.

A luz não força — mostra.

Use inteligência antes da ação.`
}

};

// =========================
// LINHAS
// =========================

const linhasVOV = {
1:"Início imaturo.",
2:"Ajuste correto.",
3:"Risco de erro.",
4:"Transição.",
5:"Decisão forte.",
6:"Excesso."
};

// =========================
// MOTOR
// =========================

function gerarLinha() {
    let v = Math.floor(Math.random()*4);
    return {
        valor: v % 2 === 0 ? 0 : 1,
        mutavel: v === 0 || v === 3
    };
}

function gerarHexagrama() {
    let linhas = [];
    let mutaveis = [];

    for(let i=0;i<6;i++){
        let l = gerarLinha();
        linhas.push(l.valor);
        if(l.mutavel) mutaveis.push(i+1);
    }

    return {linhas, mutaveis};
}

// =========================
// DESENHO
// =========================

function desenhar(linhas) {
    let html="";
    linhas.slice().reverse().forEach(l=>{
        html += `<div class="linha">${l ? "___" : "_ _"}</div>`;
    });
    document.getElementById("hexagrama").innerHTML = html;
}

// =========================
// LEITURA AUTOMÁTICA
// =========================

function interpretar(h){

    // simplificado (exemplo)
    let num = 41;

    let data = hex64[num];

    let texto = `
    <p><b>Hexagrama ${num} — ${data.nome}</b></p>
    <p><b>Direção:</b> ${data.direcao}</p>
    <p>${data.texto.replace(/\n/g,"<br>")}</p>
    `;

    return texto;
}

// =========================
// CONSULTA
// =========================

async function consultar(){

    let pergunta = document.getElementById("pergunta").value;

    let h = gerarHexagrama();

    desenhar(h.linhas);

    let resultado = interpretar(h);

    document.getElementById("resultado").innerHTML = resultado;

    salvarConsulta(pergunta, resultado);

    document.getElementById("pergunta").value = "";
}

// =========================
// MANUAL
// =========================

function lerManual(){

    let num = document.getElementById("manualNumero").value;

    if(hex64[num]){
        let h = hex64[num];

        document.getElementById("resultado").innerHTML = `
        <p><b>Hexagrama ${num} — ${h.nome}</b></p>
        <p><b>Direção:</b> ${h.direcao}</p>
        <p>${h.texto.replace(/\n/g,"<br>")}</p>
        `;
    } else {
        document.getElementById("resultado").innerHTML = "Hexagrama não disponível ainda.";
    }
}

// =========================
// HISTÓRICO
// =========================

function salvarConsulta(pergunta, resultado){

    let historico = JSON.parse(localStorage.getItem("vov_historico")) || [];

    historico.unshift({
        data: new Date().toLocaleString(),
        pergunta,
        resultado
    });

    localStorage.setItem("vov_historico", JSON.stringify(historico));

    renderHistorico();
}

function renderHistorico(){

    let historico = JSON.parse(localStorage.getItem("vov_historico")) || [];

    let html = "";

    historico.slice(0,10).forEach(item=>{
        html += `
        <div style="border-bottom:1px solid #333; margin:10px;">
            <p><b>${item.data}</b></p>
            <p>${item.pergunta}</p>
        </div>
        `;
    });

    document.getElementById("historico").innerHTML = html;
}

// =========================
// ÁUDIO
// =========================

function narrar(){

    let texto = document.getElementById("resultado").innerText;

    if(!texto){
        alert("Faça uma leitura primeiro.");
        return;
    }

    let fala = new SpeechSynthesisUtterance(texto);

    fala.lang = "pt-BR";
    fala.rate = 0.9;

    speechSynthesis.cancel();
    speechSynthesis.speak(fala);
}

// =========================
// EXPORTAR
// =========================

function exportar(){

    let texto = document.getElementById("resultado").innerText;

    let blob = new Blob([texto], {type: "text/plain"});
    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "leitura_vov.txt";
    a.click();
}

renderHistorico();

</script>

</body>
</html>
