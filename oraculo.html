<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>VOV — Oráculo Estratégico PRO</title>

<style>
body {
    background:#000;
    color:#fff;
    font-family:Arial;
    text-align:center;
    padding:30px;
}
h1 { color:#e60000; }

input, textarea, button {
    padding:12px;
    margin:10px;
    border:none;
    border-radius:5px;
}

button {
    background:#e60000;
    color:#fff;
    cursor:pointer;
}

.linha {
    font-size:26px;
    letter-spacing:6px;
}

.bloco {
    margin-top:25px;
    padding:15px;
    border:1px solid #333;
    text-align:left;
}

#historico {
    margin-top:30px;
    max-width:600px;
    margin:auto;
    text-align:left;
}
</style>
</head>

<body>

<h1>V O V — Oráculo Estratégico PRO</h1>
<p>Ver • Ouvir • Vender</p>

<input type="text" id="pergunta" placeholder="Qual é a sua questão?"><br>

<button onclick="consultar()">Consultar</button>
<button onclick="narrar()">Ouvir leitura</button>

<div id="presente" class="bloco"></div>
<div id="futuro" class="bloco"></div>

<div id="leitura" style="display:none;"></div>

<hr>

<h2>Leitura Manual</h2>

<textarea id="manualLinhas" rows="6"></textarea><br>
<button onclick="lerManual()">Interpretar Manual</button>

<h2>Histórico</h2>
<div id="historico"></div>

<script>

// =========================
// MAPA REI WEN
// =========================

const mapaHexagramas = {
"111111":1,"000000":2,"010001":3,"100010":4,
"010111":5,"111010":6,"000010":7,"010000":8,
"110111":9,"111011":10,"000111":11,"111000":12,
"111101":13,"101111":14,"000100":15,"001000":16,
"011001":17,"100110":18,"000011":19,"110000":20,
"101001":21,"100101":22,"000001":23,"100000":24,
"111001":25,"100111":26,"100001":27,"011110":28,
"010010":29,"101101":30,"011100":31,"001110":32,
"111100":33,"001111":34,"101000":35,"000101":36,
"101011":37,"110101":38,"001010":39,"010100":40,
"110001":41,"100011":42,"111110":43,"011111":44,
"000110":45,"011000":46,"010110":47,"011010":48,
"101110":49,"011101":50,"001001":51,"100100":52,
"110100":53,"001011":54,"001101":55,"101100":56,
"110110":57,"011011":58,"110010":59,"010011":60,
"110011":61,"001100":62,"101010":63,"010101":64
};

// =========================
// NOMES
// =========================

const nomes = [
"Criação","Recepção","Dificuldade Inicial","Juventude","Esperar","Conflito","Exército","União",
"Pequeno Domar","Conduta","Paz","Estagnação","Comunidade","Grande Possuir","Modéstia","Entusiasmo",
"Seguir","Corrigir","Aproximação","Contemplação","Morder","Graça","Fragmentação","Retorno",
"Inocência","Grande Domar","Nutrição","Excesso","Abismo","Clareza","Influência","Duração",
"Retirada","Grande Poder","Progresso","Escuridão","Família","Oposição","Obstrução","Libertação",
"Diminuição","Aumento","Ruptura","Encontro","Reunião","Ascensão","Exaustão","Poço",
"Revolução","Caldeirão","Trovão","Montanha","Desenvolvimento","Noiva","Abundância","Viajante",
"Suavidade","Alegria","Dispersão","Limitação","Verdade Interior","Pequeno Excesso","Conclusão","Início"
];

// =========================
// TEXTOS PROFUNDOS VOV
// =========================

const hex64 = {};

for(let i=1;i<=64;i++){

    hex64[i] = {
        nome: nomes[i-1],

        texto: `
Hexagrama ${i} — ${nomes[i-1]}

VER:
A realidade está se revelando em camadas.
Nem tudo é imediato — observe padrões, não eventos isolados.

OUVIR:
Existe um movimento mais sutil por trás da situação.
Escute sinais, pessoas e também o silêncio.

VENDER:
A ação correta aqui não é forçar — é alinhar.
Quando visão e escuta convergem, a ação se torna inevitável.

VOV:
Clareza antes da pressa.
Presença antes da decisão.
Movimento com propósito.`
    };
}

// =========================
// MOTOR
// =========================

function gerarLinha(){
    let v = Math.floor(Math.random()*4);
    return { valor: v % 2, mutavel: v === 0 || v === 3 };
}

function gerarHexagrama(){
    let linhas = [], mutaveis = [];
    for(let i=0;i<6;i++){
        let l = gerarLinha();
        linhas.push(l.valor);
        if(l.mutavel) mutaveis.push(i);
    }
    return {linhas, mutaveis};
}

// =========================
// CALCULO
// =========================

function calcularNumero(linhas){
    let chave = linhas.map(l=>l?1:0).join("");
    return mapaHexagramas[chave];
}

// =========================
// MUTAÇÃO
// =========================

function mutarHexagrama(h){
    let novo = [...h.linhas];
    h.mutaveis.forEach(i=>{
        novo[i] = novo[i] ? 0 : 1;
    });
    return novo;
}

// =========================
// VISUAL
// =========================

function desenhar(linhas){
    return linhas.slice().reverse().map(l=>{
        return `<div class="linha">${l?"___":"_ _"}</div>`;
    }).join("");
}

// =========================
// CONSULTA
// =========================

function consultar(){

    let pergunta = document.getElementById("pergunta").value;

    let h = gerarHexagrama();
    let num1 = calcularNumero(h.linhas);

    let mutado = mutarHexagrama(h);
    let num2 = calcularNumero(mutado);

    document.getElementById("presente").innerHTML = `
    <h3>Presente</h3>
    ${desenhar(h.linhas)}
    <p><b>${num1} — ${hex64[num1].nome}</b></p>
    <p>${hex64[num1].texto.replace(/\n/g,"<br>")}</p>
    `;

    document.getElementById("futuro").innerHTML = `
    <h3>Transformação</h3>
    ${desenhar(mutado)}
    <p><b>${num2} — ${hex64[num2].nome}</b></p>
    <p>${hex64[num2].texto.replace(/\n/g,"<br>")}</p>
    `;

    document.getElementById("leitura").innerText =
    `Pergunta: ${pergunta}

Presente:
${hex64[num1].texto}

Transformação:
${hex64[num2].texto}`;

    salvar(pergunta, num1, num2);
}

// =========================
// HISTÓRICO
// =========================

function salvar(p,n1,n2){

    let h = JSON.parse(localStorage.getItem("vov_hist")) || [];

    h.unshift({
        data:new Date().toLocaleString(),
        pergunta:p,
        p:n1,
        f:n2
    });

    localStorage.setItem("vov_hist", JSON.stringify(h));
    renderHistorico();
}

function renderHistorico(){

    let h = JSON.parse(localStorage.getItem("vov_hist")) || "";

    let html="";

    (h||[]).slice(0,10).forEach(i=>{
        html+=`
        <div style="border-bottom:1px solid #333;margin:10px;">
        <p><b>${i.data}</b></p>
        <p>${i.pergunta}</p>
        <p>${i.p} → ${i.f}</p>
        </div>`;
    });

    document.getElementById("historico").innerHTML = html;
}

renderHistorico();

// =========================
// MANUAL
// =========================

function lerManual(){

    let linhas = document.getElementById("manualLinhas").value
        .trim().split("\n")
        .map(l=>l.includes("___")?1:0)
        .reverse();

    let num = calcularNumero(linhas);

    document.getElementById("presente").innerHTML = `
    <h3>Manual</h3>
    ${desenhar(linhas)}
    <p><b>${num} — ${hex64[num].nome}</b></p>
    <p>${hex64[num].texto.replace(/\n/g,"<br>")}</p>
    `;

    document.getElementById("futuro").innerHTML="";
}

// =========================
// NARRADOR
// =========================

function narrar(){

    let texto = document.getElementById("leitura").innerText;

    if(!texto) return alert("Faça uma leitura.");

    let fala = new SpeechSynthesisUtterance(texto);

    fala.lang="pt-BR";
    fala.rate=0.9;

    speechSynthesis.cancel();
    speechSynthesis.speak(fala);
}

</script>

</body>
</html>
